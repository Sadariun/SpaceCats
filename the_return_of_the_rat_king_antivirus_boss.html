<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <title>Возвращение крысиного короля</title>
        <style>
            * {
                box-sizing: border-box;
                user-select: none;
                -webkit-user-select: none;
                margin: 0;
                padding: 0;
            }
            body,
            html {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background-color: #1a1a1a;
                font-family: monospace;
            }
            canvas {
                display: block;
                width: 100vw;
                height: 100vh;
            }
            #upgrade-screen {
                display: none;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(26, 26, 26, 0.98);
                border: 2px solid #ffffff;
                padding: 25px;
                width: 95%;
                max-width: 460px;
                text-align: center;
                color: #ffffff;
                z-index: 100;
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            }
            #upgrade-screen h2 {
                margin-bottom: 25px;
                font-size: 20px;
                letter-spacing: 2px;
                border-bottom: 1px solid #ffffff;
                padding-bottom: 10px;
            }
            #options-container {
                display: flex;
                justify-content: center;
                gap: 15px;
                margin-top: 15px;
            }
            .upgrade-option {
                background: #1a1a1a;
                border: 2px solid #ffffff;
                color: #ffffff;
                padding: 15px 10px;
                cursor: pointer;
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 120px;
                transition: all 0.2s ease;
            }
            .upgrade-option:hover {
                background: #ffffff;
                color: #1a1a1a;
            }
            .upgrade-option:hover canvas {
                filter: invert(1);
            }
            .icon-container {
                position: relative;
                width: 80px;
                height: 80px;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .level-badge {
                position: absolute;
                bottom: -5px;
                right: -5px;
                background: #1a1a1a;
                color: #ffffff;
                border: 1px solid #ffffff;
                font-size: 11px;
                font-weight: bold;
                padding: 2px 5px;
                font-family: monospace;
            }
            .upgrade-option:hover .level-badge {
                background: #ffffff;
                color: #1a1a1a;
                border-color: #1a1a1a;
            }
            .weapon-name {
                margin-top: 12px;
                font-size: 11px;
                text-align: center;
                text-transform: uppercase;
                letter-spacing: 1px;
                font-weight: bold;
            }

            #preloader {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #111111;
                z-index: 1000;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                color: #ffffff;
            }
            #loader-bar-bg {
                width: 80%;
                max-width: 400px;
                height: 12px;
                border: 2px solid #ffffff;
                padding: 2px;
                margin-top: 24px;
            }
            #loader-bar-fill {
                width: 0%;
                height: 100%;
                background-color: #ffffff;
                box-shadow: 0 0 10px #ffffff;
                transition: width 0.1s linear;
            }

            #pause-button:active {
                transform: scale(0.95);
                background: #ffffff;
                color: #1a1a1a;
            }
        </style>
    </head>
    <body>
        <div id="preloader">
            <h1
                class="text-xl md:text-2xl font-bold tracking-widest text-center"
                style="font-family: monospace; letter-spacing: 2px"
            >
                ИНИЦИАЛИЗАЦИЯ ИГРОВЫХ РЕСУРСОВ
            </h1>
            <div id="loader-bar-bg">
                <div id="loader-bar-fill"></div>
            </div>
            <p
                id="loader-info"
                class="mt-4 text-xs opacity-75"
                style="margin-top: 15px; font-size: 12px"
            >
                Прогресс: 0%
            </p>
            <p
                id="loader-status"
                class="mt-2 text-[10px] opacity-40"
                style="margin-top: 5px; font-size: 10px"
            >
                Подключение к сети ресурсов...
            </p>
        </div>

        <canvas id="gameCanvas"></canvas>
        <button
            id="pause-button"
            style="
                position: absolute;
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background: rgba(26, 26, 26, 0.9);
                border: 2px solid #ffffff;
                color: #ffffff;
                font-size: 24px;
                font-family: monospace;
                cursor: pointer;
                z-index: 90;
                display: flex;
                align-items: center;
                justify-content: center;
                backdrop-filter: blur(4px);
                transition: all 0.2s ease;
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            "
        >
            ⏸
        </button>
        <div id="upgrade-screen">
            <h2>ВЫБОР МОДИФИКАТОРА</h2>
            <div id="options-container"></div>
        </div>

        <script>

                    world3: "https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=400&auto=format&fit=crop&q=60",
                },

                    enemy_normal:
                        "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=120&auto=format&fit=crop&q=60",
                    enemy_shooter:
                        "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=120&auto=format&fit=crop&q=60",
                    enemy_exploder:
                        "https://images.unsplash.com/photo-1504051771394-dd2e66b2e08f?w=120&auto=format&fit=crop&q=60",

                },
                bullets: {

                    dart: "https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=60&auto=format&fit=crop&q=60",

                    Blast: "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?w=120&auto=format&fit=crop&q=80",

                    Rain: "https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=120&auto=format&fit=crop&q=80",
                    Mine: "https://images.unsplash.com/photo-1504051771394-dd2e66b2e08f?w=120&auto=format&fit=crop&q=80",
                    Chain: "https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=120&auto=format&fit=crop&q=80",
                    Spiral: "https://images.unsplash.com/photo-1508614589041-895b88991e3e?w=120&auto=format&fit=crop&q=80",
                    Vortex: "https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=120&auto=format&fit=crop&q=80",
                    Echo: "https://images.unsplash.com/photo-1508615070457-7baeba4003ab?w=120&auto=format&fit=crop&q=80",
                    Crystal:
                        "https://images.unsplash.com/photo-1605640840605-14ac185e7f3b?w=120&auto=format&fit=crop&q=80",
                },
            };

            const ASSETS = { images: {}, patterns: {}, weaponIcons: {} };
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");

            const STATES = {
                LOADING: -1,
                MENU: 0,
                PLAYING: 1,
                PORTAL_OPEN: 2,
                BOSS_SPAWN: 3,
                BOSS_FIGHT: 4,
                GAMEOVER: 5,
                UPGRADE: 6,
                PAUSED: 7,
            };
            let gameState = STATES.LOADING;
            let previousState = STATES.PLAYING;

            // Глобальный пул для предупреждений появления мобов
            const spawnWarnings = [];

            class QT_Rectangle {
                constructor(x, y, w, h) {
                    this.x = x;
                    this.y = y;
                    this.w = w;
                    this.h = h;
                }
                contains(obj) {
                    return (
                        obj.x >= this.x - this.w &&
                        obj.x <= this.x + this.w &&
                        obj.y >= this.y - this.h &&
                        obj.y <= this.y + this.h
                    );
                }
                intersects(range) {
                    return !(
                        range.x - range.w > this.x + this.w ||
                        range.x + range.w < this.x - this.w ||
                        range.y - range.h > this.y + this.h ||
                        range.y + range.h < this.y - this.h
                    );
                }
            }

            class QuadTree {
                constructor(boundary, capacity) {
                    this.boundary = boundary;
                    this.capacity = capacity;
                    this.objects = [];
                    this.divided = false;
                }
                subdivide() {
                    let x = this.boundary.x;
                    let y = this.boundary.y;
                    let w = this.boundary.w / 2;
                    let h = this.boundary.h / 2;

                    let ne = new QT_Rectangle(x + w, y - h, w, h);
                    this.northeast = new QuadTree(ne, this.capacity);
                    let nw = new QT_Rectangle(x - w, y - h, w, h);
                    this.northwest = new QuadTree(nw, this.capacity);
                    let se = new QT_Rectangle(x + w, y + h, w, h);
                    this.southeast = new QuadTree(se, this.capacity);
                    let sw = new QT_Rectangle(x - w, y + h, w, h);
                    this.southwest = new QuadTree(sw, this.capacity);

                    this.divided = true;
                }
                insert(obj) {
                    if (!this.boundary.contains(obj)) {
                        return false;
                    }

                    if (this.objects.length < this.capacity) {
                        this.objects.push(obj);
                        return true;
                    }

                    if (!this.divided) {
                        this.subdivide();
                    }

                    if (this.northeast.insert(obj)) return true;
                    if (this.northwest.insert(obj)) return true;
                    if (this.southeast.insert(obj)) return true;
                    if (this.southwest.insert(obj)) return true;

                    return false;
                }
                query(range, found) {
                    if (!found) found = [];
                    if (!this.boundary.intersects(range)) {
                        return found;
                    }

                    for (let i = 0; i < this.objects.length; i++) {
                        let obj = this.objects[i];
                        if (range.contains(obj)) {
                            found.push(obj);
                        }
                    }

                    if (this.divided) {
                        this.northeast.query(range, found);
                        this.northwest.query(range, found);
                        this.southeast.query(range, found);
                        this.southwest.query(range, found);
                    }

                    return found;
                }
            }

            let enemyQuadTree = new QuadTree(new QT_Rectangle(0, 0, 1, 1), 4);

            class FastPool {
                constructor(ClassRef, size) {
                    this.objects = [];
                    this.activeCount = 0;
                    for (let i = 0; i < size; i++) {
                        let obj = new ClassRef();
                        obj.poolIndex = i;
                        this.objects.push(obj);
                    }
                }
                get() {
                    if (this.activeCount < this.objects.length) {
                        let obj = this.objects[this.activeCount];
                        this.activeCount++;
                        return obj;
                    }
                    return null;
                }
                release(obj) {
                    if (obj.poolIndex < this.activeCount) {
                        this.activeCount--;
                        let lastObj = this.objects[this.activeCount];
                        this.objects[obj.poolIndex] = lastObj;
                        this.objects[this.activeCount] = obj;
                        lastObj.poolIndex = obj.poolIndex;
                        obj.poolIndex = this.activeCount;
                        obj.active = false;
                    }
                }
                updateAll() {
                    for (let i = 0; i < this.activeCount; i++)
                        this.objects[i].update();
                }
                drawAll() {
                    for (let i = 0; i < this.activeCount; i++)
                        this.objects[i].draw();
                }
                clear() {
                    while (this.activeCount > 0) {
                        this.objects[this.activeCount - 1].active = false;
                        this.activeCount--;
                    }
                }
            }

            const toasts = [];
            let unlockedWeapons = [
                "Dart",
                "Orbit",
                "Aura",
                "Bounce",
                "Rain",
                "Cross",
            ];
            const ACHIEVEMENT_LIST = [
                { id: "Pulse", cond: "Пройти Мир 1" },
                { id: "Beam", cond: "Убить Антивируса (Мир 2)" },
                { id: "Chain", cond: "Убить Сбой Ядра (Мир 3)" },
                {
                    id: "Секреты",
                    cond: "Играйте, чтобы открыть больше оружия!",
                },
            ];

            function preloadImages() {
                const list = [];
                for (const key in ASSETS_CONFIG.backgrounds)
                    list.push({
                        type: "bg",
                        id: key,
                        url: ASSETS_CONFIG.backgrounds[key],
                    });
                for (const key in ASSETS_CONFIG.sprites)
                    list.push({
                        type: "sprite",
                        id: key,
                        url: ASSETS_CONFIG.sprites[key],
                    });
                for (const key in ASSETS_CONFIG.bullets)
                    list.push({
                        type: "bullet",
                        id: key,
                        url: ASSETS_CONFIG.bullets[key],
                    });
                for (const key in ASSETS_CONFIG.weapon_icons)
                    list.push({
                        type: "weapon_icon",
                        id: key,
                        url: ASSETS_CONFIG.weapon_icons[key],
                    });

                let loadedCount = 0;
                const totalCount = list.length;

                if (totalCount === 0) {
                    finishPreload();
                    return;
                }

                list.forEach((item) => {
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.onload = () => handleResourceLoaded(item, img);
                    img.onerror = () => {
                        console.warn(
                            `Ресурс не найден или заблокирован CORS: ${item.id}. Fallback.`,
                        );
                        handleResourceLoaded(item, null);
                    };
                    img.src = item.url;
                });

                function handleResourceLoaded(item, img) {
                    loadedCount++;
                    const progress = Math.round(
                        (loadedCount / totalCount) * 100,
                    );
                    document.getElementById("loader-bar-fill").style.width =
                        `${progress}%`;
                    document.getElementById("loader-info").innerText =
                        `Прогресс: ${progress}%`;
                    document.getElementById("loader-status").innerText =
                        `Загружено: [${item.type}] ${item.id}`;

                    if (img) {
                        if (item.type === "weapon_icon")
                            ASSETS.weaponIcons[item.id] = img;
                        else ASSETS.images[`${item.type}_${item.id}`] = img;
                    }

                    if (loadedCount >= totalCount)
                        setTimeout(finishPreload, 400);
                }
            }

            function finishPreload() {
                for (const key in ASSETS_CONFIG.backgrounds) {
                    const img = ASSETS.images[`bg_${key}`];
                    if (img) {
                        try {
                            ASSETS.patterns[key] = ctx.createPattern(
                                img,
                                "repeat",
                            );
                        } catch (e) {
                            console.error(`Ошибка генерации паттерна:`, e);
                        }
                    }
                }
                document.getElementById("preloader").style.display = "none";
                gameState = STATES.MENU;
                lastTime = performance.now();
            }

            function drawWithAssetFallback(
                assetKey,
                x,
                y,
                width,
                height,
                angle,
                fallbackDrawFn,
            ) {
                const img = ASSETS.images[assetKey];
                if (img && img.complete && img.naturalWidth !== 0) {
                    ctx.save();
                    ctx.translate(x - camera.x, y - camera.y);
                    if (angle !== undefined && angle !== 0) ctx.rotate(angle);
                    ctx.drawImage(img, -width / 2, -height / 2, width, height);
                    ctx.restore();
                } else {
                    fallbackDrawFn();
                }
            }

            const WORLD_DURATION = 300;
            let gameTimer = 0,
                secondsTimer = 0,
                currentWorld = 1,
                difficultyMultiplier = 1.0;
            let score = 0,
                pendingUpgrades = 0,
                bossSpawnTimer = 0,
                activeBossRef = null;
            let lastTime = performance.now();
            const TARGET_FPS = 60,
                STEP = 1000 / TARGET_FPS;
            let dtAccumulator = 0;
            const bossArena = { x: 0, y: 0, size: 600, active: false };
            const camera = { x: 0, y: 0 };
            let zoom = 1.0;

            function updateZoom() {
                const minDim = Math.min(window.innerWidth, window.innerHeight);
                if (minDim < 600) {
                    zoom = minDim / 600;
                    if (zoom < 0.5) zoom = 0.5;
                } else {
                    zoom = 1.0;
                }
            }

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                updateZoom();
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();

            class Player {
                constructor() {
                    this.x = 0;
                    this.y = 0;
                    this.radius = 12;
                    this.speed = 3.6;
                    this.hp = 100;
                    this.maxHp = 100;
                    this.level = 1;
                    this.xp = 0;
                    this.xpNeeded = 12;
                    this.lastVx = 1;
                    this.lastVy = 0;
                }
                update() {
                    let moveX = 0,
                        moveY = 0;
                    if (keys["KeyW"] || keys["ArrowUp"]) moveY -= 1;
                    if (keys["KeyS"] || keys["ArrowDown"]) moveY += 1;
                    if (keys["KeyA"] || keys["ArrowLeft"]) moveX -= 1;
                    if (keys["KeyD"] || keys["ArrowRight"]) moveX += 1;
                    if (joystick.active) {
                        moveX = joystick.vx;
                        moveY = joystick.vy;
                    }

                    if (moveX !== 0 && moveY !== 0 && !joystick.active) {
                        moveX *= 0.7071;
                        moveY *= 0.7071;
                    }
                    this.x += moveX * this.speed;
                    this.y += moveY * this.speed;

                    if (bossArena.active) {
                        let half = bossArena.size / 2;
                        if (this.x < bossArena.x - half + this.radius)
                            this.x = bossArena.x - half + this.radius;
                        if (this.x > bossArena.x + half - this.radius)
                            this.x = bossArena.x + half - this.radius;
                        if (this.y < bossArena.y - half + this.radius)
                            this.y = bossArena.y - half + this.radius;
                        if (this.y > bossArena.y + half - this.radius)
                            this.y = bossArena.y + half - this.radius;
                    }

                    if (moveX !== 0 || moveY !== 0) {
                        let len = Math.hypot(moveX, moveY);
                        this.lastVx = moveX / len;
                        this.lastVy = moveY / len;
                    }
                }
                draw() {
                    drawWithAssetFallback(
                        "sprite_player",
                        this.x,
                        this.y,
                        this.radius * 2.2,
                        this.radius * 2.2,
                        0,
                        () => {
                            ctx.fillStyle = "#FFFFFF";
                            ctx.beginPath();
                            ctx.arc(
                                this.x - camera.x,
                                this.y - camera.y,
                                this.radius,
                                0,
                                Math.PI * 2,
                            );
                            ctx.fill();
                        },
                    );

                    let hpRingRadius = this.radius + 6;
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(
                        this.x - camera.x,
                        this.y - camera.y,
                        hpRingRadius,
                        0,
                        Math.PI * 2,
                    );
                    ctx.stroke();

                    ctx.strokeStyle = "#FFFFFF";
                    ctx.beginPath();
                    let hpPct = Math.max(0, this.hp) / this.maxHp;
                    ctx.arc(
                        this.x - camera.x,
                        this.y - camera.y,
                        hpRingRadius,
                        -Math.PI / 2,
                        -Math.PI / 2 + Math.PI * 2 * hpPct,
                    );
                    ctx.stroke();
                }
            }
            const player = new Player();

            class Enemy {
                constructor() {
                    this.active = false;
                    this.poolIndex = -1;
                }
                spawn(x, y, variant = "normal") {
                    this.x = x;
                    this.y = y;
                    this.variant = variant;
                    this.active = true;
                    this.shootTimer = 0;
                    this.aiTimer = Math.floor(Math.random() * 10);
                    this.vx = 0;
                    this.vy = 0;
                    this.slowTimer = 0;
                    this.flashTimer = 0;
                    this.visualAngle = 0;
                    this.antivirusPhase = 0;
                    this.phaseTimer = 0;

                    if (variant === "boss_rat_king") {
                        this.name = "КРЫСИНЫЙ КОРОЛЬ [RAT.KING]";
                        this.radius = 42;
                        this.hp = 8000 * difficultyMultiplier;
                        this.speed = 1.0;
                        activeBossRef = this;
                    } else if (variant === "boss_antivirus") {
                        this.name = "АНТИВИРУС [SYSTEM.ANTIVIRUS]";
                        this.radius = 45;
                        this.hp = 12000 * difficultyMultiplier;
                        this.speed = 0.0;
                        activeBossRef = this;
                    } else if (variant === "boss_kernel_panic") {

                        this.radius = 50;

                                this.laserAngle + Math.PI / 2,

                                this.laserAngle + (3 * Math.PI) / 2,
                            ];
                            angles.forEach((angle) => {
                                ctx.save();
                                ctx.rotate(angle);
                                if (this.antivirusPhase === 13) {
                                    ctx.strokeStyle =
                                        "rgba(255, 255, 255, 0.45)";
                                    ctx.lineWidth = 1.5;
                                    ctx.setLineDash([4, 6]);
                                    ctx.beginPath();
                                    ctx.moveTo(0, 0);
                                    ctx.lineTo(500, 0);
                                    ctx.stroke();
                                } else {
                                    ctx.strokeStyle = "rgba(255, 0, 0, 0.4)";
                                    ctx.lineWidth =
                                        14 + Math.sin(Date.now() / 20) * 4;
                                    ctx.beginPath();
                                    ctx.moveTo(0, 0);
                                    ctx.lineTo(500, 0);
                                    ctx.stroke();

                                    ctx.strokeStyle = "#FFFFFF";
                                    ctx.lineWidth = 4;
                                    ctx.beginPath();
                                    ctx.moveTo(0, 0);
                                    ctx.lineTo(500, 0);
                                    ctx.stroke();
                                }
                                ctx.restore();
                            });
                            ctx.restore();
                        }

                        if (
                            (this.antivirusPhase === 2 ||
                                this.antivirusPhase === 12) &&
                            this.gridCells
                        ) {
                            ctx.save();
                            for (let i = 0; i < 36; i++) {
                                let cell = this.gridCells[i];
                                if (cell.state > 0) {
                                    let cellX =
                                        bossArena.x -
                                        300 +
                                        (i % 6) * 100 -
                                        camera.x;
                                    let cellY =
                                        bossArena.y -
                                        300 +
                                        Math.floor(i / 6) * 100 -
                                        camera.y;

                                    if (cell.state === 1) {
                                        ctx.fillStyle =
                                            "rgba(255, 165, 0, 0.12)";
                                        ctx.fillRect(cellX, cellY, 100, 100);
                                        ctx.strokeStyle =
                                            "rgba(255, 165, 0, 0.4)";
                                        ctx.lineWidth = 2;
                                        ctx.strokeRect(cellX, cellY, 100, 100);

                                        ctx.beginPath();
                                        ctx.moveTo(cellX, cellY);
                                        ctx.lineTo(cellX + 100, cellY + 100);
                                        ctx.moveTo(cellX + 100, cellY);
                                        ctx.lineTo(cellX, cellY + 100);
                                        ctx.stroke();
                                    } else if (cell.state === 2) {
                                        ctx.fillStyle = "rgba(255, 0, 0, 0.45)";
                                        ctx.fillRect(cellX, cellY, 100, 100);
                                        ctx.strokeStyle = "#FF0000";
                                        ctx.lineWidth = 3;
                                        ctx.strokeRect(cellX, cellY, 100, 100);
                                    }
                                }
                            }
                            ctx.restore();
                        }

                        let alpha =
                            this.antivirusPhase === 3 ||
                            this.antivirusPhase === 13
                                ? 1.0
                                : 0.4;

                        ctx.save();
                        ctx.globalAlpha = alpha;
                        drawWithAssetFallback(
                            "sprite_enemy_boss",
                            this.x,
                            this.y,
                            this.radius * 2.2,
                            this.radius * 2.2,
                            this.visualAngle,
                            () => {
                                ctx.save();
                                ctx.translate(drawX, drawY);
                                ctx.rotate(this.visualAngle);
                                ctx.strokeStyle = isFlashing
                                    ? "#FFFFFF"
                                    : "#FF0000";
                                ctx.lineWidth = 4;

                                ctx.beginPath();
                                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                                ctx.stroke();

                                ctx.rotate(-this.visualAngle * 1.8);
                                ctx.strokeStyle = "#FFFFFF";
                                ctx.lineWidth = 2;
                                for (let i = 0; i < 8; i++) {
                                    ctx.rotate(Math.PI / 4);
                                    ctx.strokeRect(
                                        -this.radius * 0.4,
                                        -this.radius * 0.4,
                                        this.radius * 0.8,
                                        this.radius * 0.8,
                                    );
                                }

                                ctx.fillStyle =
                                    this.antivirusPhase === 3
                                        ? "#FF0000"
                                        : "#FFFFFF";
                                ctx.beginPath();
                                ctx.arc(
                                    0,
                                    0,
                                    this.radius * 0.35 +
                                        Math.sin(Date.now() / 80) * 3,
                                    0,
                                    Math.PI * 2,
                                );
                                ctx.fill();
                                ctx.restore();
                            },
                        );
                        if (isFlashing && ASSETS.images.sprite_enemy_boss) {
                            ctx.save();
                            ctx.translate(drawX, drawY);
                            ctx.rotate(this.visualAngle);
                            ctx.globalCompositeOperation = "source-atop";
                            ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
                            ctx.fillRect(
                                -this.radius,
                                -this.radius,
                                this.radius * 2,
                                this.radius * 2,
                            );
                            ctx.restore();
                        }
                        ctx.restore();

                        if (this.antivirusPhase >= 12) {
                            ctx.save();
                            ctx.fillStyle = "#FF3300";
                            ctx.font = "bold 11px monospace";
                            ctx.textAlign = "center";
                            let bounce =
                                Math.sin(Date.now() / 100) * 3 -
                                this.radius -
                                18;
                            ctx.fillText(
                                "[ ATTENTION: SYSTEM PURGE ]",
                                drawX,
                                drawY + bounce,
                            );
                            ctx.restore();
                        }
                        return;
                    }

                    if (this.variant === "boss_kernel_panic") {
                        ctx.save();
                        if (
                            (this.antivirusPhase === 2 ||
                                this.antivirusPhase === 12) &&
                            this.panicSectors
                        ) {
                            this.panicSectors.forEach((sector) => {
                                let cellVal =
                                    sector.val -
                                    (sector.isHoriz ? camera.y : camera.x);
                                ctx.save();
                                if (sector.active) {
                                    ctx.fillStyle = "rgba(255, 0, 255, 0.38)";
                                    if (sector.isHoriz)
                                        ctx.fillRect(
                                            0,
                                            cellVal - 22,
                                            canvas.width,
                                            44,
                                        );
                                    else
                                        ctx.fillRect(
                                            cellVal - 22,
                                            0,
                                            44,
                                            canvas.height,
                                        );

                                    ctx.strokeStyle = "#FF00FF";
                                    ctx.lineWidth = 3;
                                    ctx.beginPath();
                                    if (sector.isHoriz) {
                                        ctx.moveTo(0, cellVal);
                                        ctx.lineTo(canvas.width, cellVal);
                                    } else {
                                        ctx.moveTo(cellVal, 0);
                                        ctx.lineTo(cellVal, canvas.height);
                                    }
                                    ctx.stroke();
                                } else {
                                    ctx.strokeStyle = "rgba(255, 0, 255, 0.5)";
                                    ctx.lineWidth = 1.5;
                                    ctx.setLineDash([6, 6]);
                                    ctx.beginPath();
                                    if (sector.isHoriz) {
                                        ctx.moveTo(0, cellVal);
                                        ctx.lineTo(canvas.width, cellVal);
                                    } else {
                                        ctx.moveTo(cellVal, 0);
                                        ctx.lineTo(cellVal, canvas.height);
                                    }
                                    ctx.stroke();
                                }
                                ctx.restore();
                            });
                        }

                        if (this.antivirusPhase === 4) {
                            ctx.save();
                            ctx.translate(drawX, drawY);
                            let grad = ctx.createRadialGradient(
                                0,
                                0,
                                5,
                                0,
                                0,
                                220,
                            );
                            grad.addColorStop(0, "rgba(255, 0, 255, 0.3)");
                            grad.addColorStop(0.5, "rgba(0, 191, 255, 0.08)");
                            grad.addColorStop(1, "rgba(0, 0, 0, 0)");
                            ctx.fillStyle = grad;
                            ctx.beginPath();
                            ctx.arc(0, 0, 220, 0, Math.PI * 2);
                            ctx.fill();

                            ctx.strokeStyle = "rgba(255, 0, 255, 0.25)";
                            ctx.lineWidth = 1.5;
                            ctx.rotate(-this.visualAngle * 1.5);
                            for (let i = 0; i < 6; i++) {
                                ctx.rotate(Math.PI / 3);
                                ctx.beginPath();
                                ctx.moveTo(40, 0);
                                ctx.quadraticCurveTo(100, 40, 200, 0);
                                ctx.stroke();
                            }
                            ctx.restore();
                        }

                        let activeFlash = this.flashTimer > 0;
                        drawWithAssetFallback(
                            "sprite_enemy_boss",
                            this.x,
                            this.y,
                            this.radius * 2.2,
                            this.radius * 2.2,
                            this.visualAngle,
                            () => {
                                ctx.save();
                                ctx.translate(drawX, drawY);
                                ctx.rotate(this.visualAngle);

                                ctx.strokeStyle = activeFlash
                                    ? "#FFFFFF"
                                    : "#FF00FF";
                                ctx.lineWidth = 4;
                                ctx.beginPath();
                                for (let i = 0; i < 6; i++) {
                                    let angle = (Math.PI / 3) * i;
                                    let px = Math.cos(angle) * this.radius;
                                    let py = Math.sin(angle) * this.radius;
                                    if (i === 0) ctx.moveTo(px, py);
                                    else ctx.lineTo(px, py);
                                }
                                ctx.closePath();
                                ctx.stroke();

                                ctx.rotate(-this.visualAngle * 2.2);
                                ctx.strokeStyle = "#00FFFF";
                                ctx.lineWidth = 2.5;
                                ctx.strokeRect(
                                    -this.radius * 0.5,
                                    -this.radius * 0.5,
                                    this.radius,
                                    this.radius,
                                );

                                ctx.fillStyle = activeFlash
                                    ? "#FFFFFF"
                                    : "rgba(255, 0, 255, 0.85)";
                                ctx.beginPath();
                                ctx.arc(
                                    0,
                                    0,
                                    this.radius * 0.25 +
                                        Math.sin(Date.now() / 60) * 4,
                                    0,
                                    Math.PI * 2,
                                );
                                ctx.fill();

                                ctx.fillStyle = "#FFFFFF";
                                for (let i = 0; i < 5; i++) {
                                    let px =
                                        Math.sin(Date.now() / 50 + i) *
                                        this.radius *
                                        0.7;
                                    let py =
                                        Math.cos(Date.now() / 40 + i) *
                                        this.radius *
                                        0.7;
                                    ctx.fillRect(px, py, 3, 3);
                                }
                                ctx.restore();
                            },
                        );

                        if (this.antivirusPhase >= 12) {
                            ctx.save();
                            ctx.fillStyle = "#FF00FF";
                            ctx.font = "bold 11px monospace";
                            ctx.textAlign = "center";
                            let bounce =
                                Math.sin(Date.now() / 100) * 3 -
                                this.radius -
                                18;
                            ctx.fillText(
                                "[ EMERGENCY: KERNEL ERROR ]",
                                drawX,
                                drawY + bounce,
                            );
                            ctx.restore();
                        }
                        ctx.restore();
                        return;
                    }

                    if (this.variant === "panic_decoy") {
                        ctx.save();
                        ctx.translate(drawX, drawY);
                        ctx.rotate(Date.now() * 0.005);
                        ctx.strokeStyle = "rgba(0, 191, 255, 0.85)";
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.moveTo(0, -this.radius * 1.5);
                        ctx.lineTo(this.radius, this.radius);
                        ctx.lineTo(-this.radius, this.radius);
                        ctx.closePath();
                        ctx.stroke();

                        if (Math.random() < 0.25) {
                            ctx.strokeStyle = "rgba(255, 0, 255, 0.7)";
                            ctx.strokeRect(
                                -this.radius + (Math.random() - 0.5) * 10,
                                -this.radius,
                                this.radius * 2,
                                this.radius * 2,
                            );
                        }
                        ctx.restore();
                        return;
                    }

                    drawWithAssetFallback(
                        key,
                        this.x,
                        this.y,
                        this.radius * 2.5,
                        this.radius * 2.5,
                        0,
                        () => {
                            ctx.fillStyle = isFlashing ? "#FFFFFF" : "#FF0000";
                            if (this.variant === "normal") {
                                ctx.fillRect(
                                    drawX - this.radius,
                                    drawY - this.radius,
                                    this.radius * 2,
                                    this.radius * 2,
                                );
                            } else if (this.variant === "shooter") {
                                ctx.beginPath();
                                ctx.moveTo(drawX, drawY - this.radius);
                                ctx.lineTo(
                                    drawX + this.radius,
                                    drawY + this.radius,
                                );
                                ctx.lineTo(
                                    drawX - this.radius,
                                    drawY + this.radius,
                                );
                                ctx.closePath();
                                ctx.fill();
                            } else if (this.variant === "exploder") {
                                ctx.beginPath();
                                ctx.arc(
                                    drawX,
                                    drawY,
                                    this.radius,
                                    0,
                                    Math.PI * 2,
                                );
                                ctx.fill();
                                ctx.strokeStyle = "#1A1A1A";
                                ctx.lineWidth = 2;
                                ctx.stroke();
                            }
                        },
                    );

                    if (isFlashing && ASSETS.images[key]) {
                        ctx.save();
                        ctx.translate(drawX, drawY);
                        ctx.globalCompositeOperation = "source-atop";
                        ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
                        ctx.fillRect(
                            -this.radius,
                            -this.radius,
                            this.radius * 2,
                            this.radius * 2,
                        );
                        ctx.restore();
                    }
                }
            }

            class Bullet {
                constructor() {
                    this.active = false;
                    this.poolIndex = -1;
                }
                spawn(
                    x,
                    y,
                    vx,
                    vy,
                    size,
                    isPlayer,
                    life,
                    type = "normal",
                    extra = 0,
                    damage = 20,
                ) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.radius = size;
                    this.isPlayer = isPlayer;
                    this.life = life;
                    this.maxLife = life;
                    this.type = type;
                    this.extra = extra;
                    this.damage = damage;
                    this.active = true;
                    this.pierce = 1;
                }
                update() {
                    if (
                        [
                            "normal",
                            "bounce",
                            "boomerang",
                            "crystal",
                            "dart",
                            "cross",
                            "rain",
                        ].includes(this.type)
                    ) {
                        this.x += this.vx;
                        this.y += this.vy;
                    }
                    if (this.type === "boomerang") {
                        if (this.life === Math.floor(this.maxLife / 2)) {
                            this.vx = -this.vx;
                            this.vy = -this.vy;
                        }
                    } else if (this.type === "spiral") {
                        this.extra += 0.06;
                        let radiusFactor = (this.maxLife - this.life) * 2.8;
                        this.x = player.x + Math.cos(this.extra) * radiusFactor;
                        this.y = player.y + Math.sin(this.extra) * radiusFactor;
                    }

                    this.life--;
                    if (this.life <= 0) {
                        if (this.type === "crystal") this.shatter();
                        removeBullet(this);
                        return;
                    }

                    if (this.isPlayer) {
                        let rangeSize = this.radius + 32;
                        let range = new QT_Rectangle(
                            this.x,
                            this.y,
                            rangeSize,
                            rangeSize,
                        );
                        let candidateEnemies = [];
                        enemyQuadTree.query(range, candidateEnemies);

                        for (let i = 0; i < candidateEnemies.length; i++) {
                            let enemy = candidateEnemies[i];
                            if (!enemy.active) continue;

                            let dx = enemy.x - this.x;
                            let dy = enemy.y - this.y;
                            let minDist = enemy.radius + this.radius;

                            if (dx * dx + dy * dy < minDist * minDist) {
                                damageEnemy(enemy, this.damage);
                                if (this.type === "crystal") {
                                    this.shatter();
                                    removeBullet(this);
                                    return;
                                }
                                if (this.type === "bounce" && this.extra > 0) {
                                    this.extra--;

                                    let bounceRange = new QT_Rectangle(
                                        this.x,
                                        this.y,
                                        250,
                                        250,
                                    );
                                    let candidatesForBounce = [];
                                    enemyQuadTree.query(
                                        bounceRange,
                                        candidatesForBounce,
                                    );

                                    let next = null,
                                        bestDSqr = 250 * 250;
                                    for (
                                        let j = 0;
                                        j < candidatesForBounce.length;
                                        j++
                                    ) {
                                        let e = candidatesForBounce[j];
                                        if (e !== enemy && e.active) {
                                            let bDx = e.x - this.x;
                                            let bDy = e.y - this.y;
                                            let dSqr = bDx * bDx + bDy * bDy;
                                            if (dSqr < bestDSqr) {
                                                bestDSqr = dSqr;
                                                next = e;
                                            }
                                        }
                                    }
                                    if (next) {
                                        let a = Math.atan2(
                                            next.y - this.y,
                                            next.x - this.x,
                                        );
                                        let spd = Math.hypot(this.vx, this.vy);
                                        this.vx = Math.cos(a) * spd;
                                        this.vy = Math.sin(a) * spd;
                                    } else {
                                        this.vx = -this.vx;
                                        this.vy = -this.vy;
                                    }
                                } else {
                                    if (this.type !== "crystal") {
                                        this.pierce--;
                                        if (this.pierce <= 0) {
                                            removeBullet(this);
                                            return;
                                        }
                                    }
                                }
                                break;
                            }
                        }
                    } else {
                        let dx = player.x - this.x;
                        let dy = player.y - this.y;
                        let minDist = player.radius + this.radius;
                        if (dx * dx + dy * dy < minDist * minDist) {
                            player.hp -= 6;
                            removeBullet(this);
                            if (player.hp <= 0) gameState = STATES.GAMEOVER;
                        }
                    }
                }
                shatter() {
                    let frags = this.extra === 5 ? 12 : 3 + this.extra;
                    for (let j = 0; j < frags; j++) {
                        let fa = ((Math.PI * 2) / frags) * j;
                        let b = bulletPool.get();
                        if (b) {
                            b.spawn(
                                this.x,
                                this.y,
                                Math.cos(fa) * 5.5,
                                Math.sin(fa) * 5.5,
                                3,
                                true,
                                45,
                                "normal",
                                0,
                                16,
                            );
                            if (this.extra === 5) b.pierce = 2;
                        }
                    }
                }
                draw() {
                    let key = this.isPlayer
                        ? `bullet_${this.type}`
                        : "bullet_enemy";
                    if (!this.isPlayer) {
                        drawWithAssetFallback(
                            key,
                            this.x,
                            this.y,
                            this.radius * 2.5,
                            this.radius * 2.5,
                            0,
                            () => {
                                ctx.fillStyle = "#FF0000";
                                ctx.beginPath();
                                ctx.arc(
                                    this.x - camera.x,
                                    this.y - camera.y,
                                    this.radius,
                                    0,
                                    Math.PI * 2,
                                );
                                ctx.fill();
                            },
                        );
                        return;
                    }
                    let rot = 0;
                    if (this.type === "dart")
                        rot = Math.atan2(this.vy, this.vx);
                    if (this.type === "spiral") rot = this.extra * 2.5;

                    drawWithAssetFallback(
                        key,
                        this.x,
                        this.y,
                        this.radius * 2.6,
                        this.radius * 2.6,
                        rot,
                        () => {
                            ctx.fillStyle = "#FFFFFF";
                            ctx.strokeStyle = "#FFFFFF";
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            if (this.type === "mine") {
                                ctx.moveTo(
                                    this.x - camera.x,
                                    this.y - camera.y - this.radius,
                                );
                                ctx.lineTo(
                                    this.x - camera.x + this.radius,
                                    this.y - camera.y + this.radius,
                                );
                                ctx.lineTo(
                                    this.x - camera.x - this.radius,
                                    this.y - camera.y + this.radius,
                                );
                                ctx.closePath();
                                ctx.fill();
                            } else if (this.type === "dart") {
                                ctx.save();
                                ctx.translate(
                                    this.x - camera.x,
                                    this.y - camera.y,
                                );
                                ctx.rotate(rot);
                                ctx.beginPath();
                                ctx.moveTo(this.radius * 1.6, 0);
                                ctx.lineTo(-this.radius, -this.radius);
                                ctx.lineTo(-this.radius / 2, 0);
                                ctx.lineTo(-this.radius, this.radius);
                                ctx.closePath();
                                ctx.fill();
                                ctx.restore();
                            } else if (
                                this.type === "cross" ||
                                this.type === "boomerang"
                            ) {
                                ctx.moveTo(
                                    this.x - camera.x - this.radius,
                                    this.y - camera.y,
                                );
                                ctx.lineTo(
                                    this.x - camera.x + this.radius,
                                    this.y - camera.y,
                                );
                                ctx.moveTo(
                                    this.x - camera.x,
                                    this.y - camera.y - this.radius,
                                );
                                ctx.lineTo(
                                    this.x - camera.x,
                                    this.y - camera.y + this.radius,
                                );
                                ctx.stroke();
                            } else if (this.type === "bounce") {
                                ctx.strokeRect(
                                    this.x - camera.x - this.radius,
                                    this.y - camera.y - this.radius,
                                    this.radius * 2,
                                    this.radius * 2,
                                );
                            } else if (this.type === "rain") {
                                ctx.moveTo(
                                    this.x - camera.x,
                                    this.y - camera.y - this.radius * 1.4,
                                );
                                ctx.lineTo(
                                    this.x - camera.x,
                                    this.y - camera.y + this.radius * 1.4,
                                );
                                ctx.stroke();
                            } else if (this.type === "crystal") {
                                ctx.moveTo(
                                    this.x - camera.x,
                                    this.y - camera.y - this.radius * 1.3,
                                );
                                ctx.lineTo(
                                    this.x - camera.x + this.radius * 0.8,
                                    this.y - camera.y,
                                );
                                ctx.lineTo(
                                    this.x - camera.x,
                                    this.y - camera.y + this.radius * 1.3,
                                );
                                ctx.lineTo(
                                    this.x - camera.x - this.radius * 0.8,
                                    this.y - camera.y,
                                );
                                ctx.closePath();
                                ctx.fill();
                            } else if (this.type === "spiral") {
                                ctx.save();
                                ctx.translate(
                                    this.x - camera.x,
                                    this.y - camera.y,
                                );
                                ctx.rotate(rot);
                                ctx.strokeRect(
                                    -this.radius,
                                    -this.radius,
                                    this.radius * 2,
                                    this.radius * 2,
                                );
                                ctx.restore();
                            } else {
                                ctx.arc(
                                    this.x - camera.x,
                                    this.y - camera.y,
                                    this.radius,
                                    0,
                                    Math.PI * 2,
                                );
                                ctx.fill();
                            }
                        },
                    );
                }
            }

            function removeBullet(b) {
                if (b.isPlayer) bulletPool.release(b);
                else enemyBulletPool.release(b);
            }

            class XP {
                constructor() {
                    this.active = false;
                    this.poolIndex = -1;
                }
                spawn(x, y) {
                    this.x = x;
                    this.y = y;
                    this.radius = 3;
                    this.active = true;
                }
                update() {
                    let dx = player.x - this.x,
                        dy = player.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < 140) {
                        this.x += (dx / dist) * 7;
                        this.y += (dy / dist) * 7;
                    }
                    if (dist < player.radius + this.radius) {
                        xpPool.release(this);
                        addXP(1);
                    }
                }
                draw() {
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(
                        this.x - camera.x - this.radius,
                        this.y - camera.y - this.radius,
                        this.radius * 2,
                        this.radius * 2,
                    );
                }
            }

            class FloatingText {
                constructor() {
                    this.active = false;
                    this.poolIndex = -1;
                }
                spawn(x, y, text, color = "#FFFFFF") {
                    this.x = x;
                    this.y = y;
                    this.text = text;
                    this.color = color;
                    this.life = 35;
                    this.maxLife = 35;
                    this.active = true;
                    this.vx = (Math.random() - 0.5) * 1.6;
                    this.vy = -1.5 - Math.random() * 1.2;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy *= 0.95;
                    this.life--;
                    if (this.life <= 0) floatingTextPool.release(this);
                }
                draw() {
                    let alpha = Math.min(1, this.life / 10);
                    ctx.save();
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = alpha;
                    ctx.font = "bold 12px monospace";
                    ctx.textAlign = "center";
                    ctx.fillText(
                        this.text,
                        this.x - camera.x,
                        this.y - camera.y,
                    );
                    ctx.restore();
                }
            }

            class StaticEffect {
                constructor() {
                    this.active = false;
                    this.poolIndex = -1;
                }
                spawn(x, y, radius, duration, type = "blast") {
                    this.x = x;
                    this.y = y;
                    this.radius = radius;
                    this.duration = duration;
                    this.maxDuration = duration;
                    this.type = type;
                    this.active = true;
                }
                update() {
                    this.duration--;
                    if (this.duration <= 0) {
                        effectPool.release(this);
                        return;
                    }
                    if (this.type === "vortex") {
                        let range = new QT_Rectangle(
                            this.x,
                            this.y,
                            this.radius,
                            this.radius,
                        );
                        let candidates = [];
                        enemyQuadTree.query(range, candidates);

                        for (let i = 0; i < candidates.length; i++) {
                            let e = candidates[i];
                            if (!e.active) continue;
                            let dx = this.x - e.x;
                            let dy = this.y - e.y;
                            let dSqr = dx * dx + dy * dy;
                            let radiusSqr = this.radius * this.radius;

                            if (dSqr < radiusSqr && dSqr > 0.01) {
                                let d = Math.sqrt(dSqr);
                                e.x += (dx / d) * 2.4;
                                e.y += (dy / d) * 2.4;
                            }
                        }
                        if (this.duration === 1) {
                            effectPool
                                .get()
                                ?.spawn(
                                    this.x,
                                    this.y,
                                    this.radius * 1.2,
                                    15,
                                    "blast",
                                );
                            dealAreaDamage(
                                this.x,
                                this.y,
                                this.radius * 1.2,
                                45,
                            );
                        }
                    }
                    if (this.type === "pulse_wave") {
                        let p = 1 - this.duration / this.maxDuration;
                        let currentRadius = this.radius * p;

                        let range = new QT_Rectangle(
                            player.x,
                            player.y,
                            this.radius,
                            this.radius,
                        );
                        let candidates = [];
                        enemyQuadTree.query(range, candidates);

                        for (let i = 0; i < candidates.length; i++) {
                            let e = candidates[i];
                            if (!e.active) continue;

                            let dx = player.x - e.x;
                            let dy = player.y - e.y;
                            let dSqr = dx * dx + dy * dy;
                            let d = Math.sqrt(dSqr);

                            if (Math.abs(d - currentRadius) < 24) {
                                if (WEAPONS.Pulse.level === 5) e.slowTimer = 75;
                                damageEnemy(e, 0.4 + WEAPONS.Pulse.level * 0.3);
                            }
                        }
                    }
                }
                draw() {
                    let p = 1 - this.duration / this.maxDuration;
                    if (this.type === "beam_visual") {
                        let alpha = 1,
                            maxW = 32;
                        if (p < 0.2) {
                            maxW = (p / 0.2) * 32;
                            alpha = 0.4 + Math.random() * 0.6;
                        } else if (p > 0.6) {
                            maxW = ((1 - p) / 0.4) * 32;
                            alpha = (1 - p) / 0.4;
                        }
                        ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.22})`;
                        ctx.fillRect(
                            0,
                            player.y - camera.y - maxW / 2,
                            canvas.width,
                            maxW,
                        );
                        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.fillRect(
                            0,
                            player.y - camera.y - maxW / 6,
                            canvas.width,
                            maxW / 3,
                        );
                        if (WEAPONS.Beam.level === 5) {
                            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.22})`;
                            ctx.fillRect(
                                player.x - camera.x - maxW / 2,
                                0,
                                maxW,
                                canvas.height,
                            );
                            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                            ctx.fillRect(
                                player.x - camera.x - maxW / 6,
                                0,
                                maxW / 3,
                                canvas.height,
                            );
                        }
                        return;
                    }
                    ctx.strokeStyle =
                        this.type === "enemy_exp" ? "#FF0000" : "#FFFFFF";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    if (
                        this.type === "blast" ||
                        this.type === "enemy_exp" ||
                        this.type === "pulse_wave"
                    ) {
                        let cx = this.type === "pulse_wave" ? player.x : this.x;
                        let cy = this.type === "pulse_wave" ? player.y : this.y;
                        ctx.arc(
                            cx - camera.x,
                            cy - camera.y,
                            this.radius * p,
                            0,
                            Math.PI * 2,
                        );
                        ctx.stroke();
                    } else if (this.type === "vortex") {
                        ctx.arc(
                            this.x - camera.x,
                            this.y - camera.y,
                            this.radius * (1 - p * 0.15),
                            0,
                            Math.PI * 2,
                        );
                        ctx.stroke();
                        ctx.setLineDash([4, 12]);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }
            }

            class Portal {
                constructor() {
                    this.active = false;
                    this.x = 0;
                    this.y = 0;
                    this.radius = 32;
                }
                spawn(x, y) {
                    this.x = x;
                    this.y = y;
                    this.active = true;
                }
                update() {
                    if (!this.active) return;
                    let dx = player.x - this.x;
                    let dy = player.y - this.y;
                    let minDist = player.radius + this.radius;
                    if (dx * dx + dy * dy < minDist * minDist) {
                        this.active = false;
                        if (gameState === STATES.PORTAL_OPEN)
                            prepareBossSpawn();
                        else if (gameState === STATES.BOSS_FIGHT)
                            goToNextWorld();
                    }
                }
                draw() {
                    if (!this.active) return;
                    ctx.strokeStyle = "#FFFFFF";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(
                        this.x - camera.x,
                        this.y - camera.y,
                        this.radius + Math.sin(Date.now() / 110) * 4,
                        0,
                        Math.PI * 2,
                    );
                    ctx.stroke();
                }
            }

            function createSpawnWarning(x, y, variant, duration = 90) {
                spawnWarnings.push({
                    x: x,

                    maxTimer: duration,
                });
            }

            function getClosestEnemy() {
                let range = new QT_Rectangle(player.x, player.y, 800, 800);
                let candidates = [];
                enemyQuadTree.query(range, candidates);

                let closest = null;
                let bestDSqr = Infinity;
                for (let i = 0; i < candidates.length; i++) {
                    let e = candidates[i];
                    if (!e.active) continue;
                    let dx = e.x - player.x;
                    let dy = e.y - player.y;
                    let dSqr = dx * dx + dy * dy;
                    if (dSqr < bestDSqr) {
                        bestDSqr = dSqr;
                        closest = e;
                    }
                }
                return closest;
            }

            function checkLevelProgression() {
                if (player.level === 5) {
                    unlockWeapon("Blast");
                    unlockWeapon("Spiral");
                }
                if (player.level === 10) {
                    unlockWeapon("Mine");
                    unlockWeapon("Vortex");
                }
                if (player.level === 15) {
                    unlockWeapon("Echo");
                }
            }

            function checkScoreProgression() {
                if (score >= 500 && !unlockedWeapons.includes("Crystal")) {
                    unlockWeapon("Crystal");
                }
            }

            function unlockWeapon(id) {
                if (!unlockedWeapons.includes(id)) {
                    unlockedWeapons.push(id);
                    toasts.push({
                        title: "РАЗБЛОКИРОВАНО",
                        desc: `Оружие: ${id}`,
                        timer: 150,
                    });
                    try {
                        localStorage.setItem(
                            "wvr_unlocked_weapons",
                            JSON.stringify(unlockedWeapons),
                        );
                    } catch (e) {}
                }
            }

            function triggerUpgradeScreen() {
                gameState = STATES.UPGRADE;
                const screen = document.getElementById("upgrade-screen");
                const container = document.getElementById("options-container");
                screen.style.display = "block";
                container.innerHTML = "";

                let available = Object.keys(WEAPONS).filter(
                    (k) => WEAPONS[k].level < 5 && unlockedWeapons.includes(k),
                );
                if (available.length === 0) {
                    pendingUpgrades = 0;
                    screen.style.display = "none";
                    gameState = STATES.PLAYING;
                    return;
                }

                let options = [];
                while (options.length < Math.min(3, available.length)) {
                    let rand =
                        available[Math.floor(Math.random() * available.length)];
                    if (!options.includes(rand)) options.push(rand);
                }

                options.forEach((opt) => {
                    let div = document.createElement("div");
                    div.className = "upgrade-option";
                    let nextLevel = WEAPONS[opt].level + 1;
                    let iconUrl = ASSETS.weaponIcons[opt]
                        ? ASSETS.weaponIcons[opt].src
                        : null;
                    div.innerHTML = `
                        <div class="icon-container">
                            ${
                                iconUrl
                                    ? `<img class="weapon-img" src="${iconUrl}" alt="${opt}" style="width:80px;height:80px;background:#222;display:flex;align-items:center;justify-content:center;border-radius:8px;"/>`
                                    : `<div style="width:80px;height:80px;background:#222;display:flex;align-items:center;justify-content:center;border-radius:8px;">⚔️</div>`
                            }
                            <div class="level-badge">LVL ${nextLevel}</div>
                        </div>
                        <div class="weapon-name">${WEAPONS[opt].name || opt}</div>
                        <div class="weapon-desc">+ улучшение</div>
                    `;
                    div.onclick = () => {
                        WEAPONS[opt].level++;
                        if (WEAPONS[opt].upgrade)
                            WEAPONS[opt].upgrade(WEAPONS[opt]);
                        pendingUpgrades--;
                        screen.style.display = "none";
                        if (pendingUpgrades > 0) triggerUpgradeScreen();
                        else {
                            gameState = STATES.PLAYING;
                            lastTime = performance.now();
                        }
                    };
                    container.appendChild(div);
                });
            }

            window.addEventListener("click", () => {
