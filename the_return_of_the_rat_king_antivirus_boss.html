            function damageEnemy(enemy, damageAmount) {
                if (!enemy.active) return false;

                if (enemy.variant === "panic_decoy") {
                    if (Math.random() < 0.15) {
                        let a = Math.atan2(
                            player.y - enemy.y,
                            player.x - enemy.x,
                        );
                        enemyBulletPool
                            .get()
                            ?.spawn(
                                enemy.x,
                                enemy.y,
                                Math.cos(a) * 3.5,
                                Math.sin(a) * 3.5,
                                4,
                                false,
                                90,
                                "normal",
                            );
                    }
                }

                enemy.hp -= damageAmount;
                enemy.flashTimer = 5;
                let textStr =
                    damageAmount < 1
                        ? damageAmount.toFixed(1)
                        : Math.round(damageAmount).toString();
                let color = damageAmount >= 30 ? "#FFFF00" : "#FFFFFF";
                let rx = enemy.x + (Math.random() - 0.5) * 16,
                    ry = enemy.y - enemy.radius - Math.random() * 8;
                floatingTextPool.get()?.spawn(rx, ry, textStr, color);
                if (enemy.hp <= 0) {
                    destroyEnemy(enemy);
                    return true;
                }
                return false;
            }

            function dealAreaDamage(x, y, radius, damage) {
                let range = new QT_Rectangle(x, y, radius, radius);
                let candidates = [];
                enemyQuadTree.query(range, candidates);

                for (let i = 0; i < candidates.length; i++) {
                    let e = candidates[i];
                    if (!e.active) continue;
                    let dx = e.x - x;
                    let dy = e.y - y;
                    let minDist = radius + e.radius;
                    if (dx * dx + dy * dy < minDist * minDist) {
                        damageEnemy(e, damage);
                    }
                }
            }

            function destroyEnemy(enemy) {
                enemyPool.release(enemy);
                score += 100;
                checkScoreProgression();

                if (gameState === STATES.PLAYING) {
                    gameTimer += 2;
                }

                if (
                    enemy.variant === "boss_rat_king" ||
                    enemy.variant === "boss_antivirus" ||
                    enemy.variant === "boss_kernel_panic"
                )
                    handleBossDeath();
                else {
                    xpPool.get()?.spawn(enemy.x, enemy.y);
                    if (enemy.variant === "exploder") {
                        effectPool
                            .get()
                            ?.spawn(enemy.x, enemy.y, 55, 15, "enemy_exp");
                        let dx = player.x - enemy.x;
                        let dy = player.y - enemy.y;
                        let minDist = 55 + player.radius;
                        if (dx * dx + dy * dy < minDist * minDist) {
                            player.hp -= 12;
                            if (player.hp <= 0) gameState = STATES.GAMEOVER;
                        }
                    }
                }
            }

            function addXP(amount) {
                player.xp += amount;
                while (player.xp >= player.xpNeeded) {
                    player.xp -= player.xpNeeded;
                    player.level++;
                    player.xpNeeded = Math.floor(player.xpNeeded * 1.35);
                    pendingUpgrades++;
                    checkLevelProgression();
                }
            }

            function renderBackground() {
                if (bossArena.active) {
                    ctx.strokeStyle = "#FF0000";
                    ctx.lineWidth = 4;
                    let half = bossArena.size / 2;
                    ctx.strokeRect(
                        bossArena.x - half - camera.x,
                        bossArena.y - half - camera.y,
                        bossArena.size,
                        bossArena.size,
                    );
                    ctx.strokeStyle = "rgba(255, 0, 0, 0.02)";
                    ctx.lineWidth = 1;
                    for (let i = -half; i <= half; i += 40) {
                        ctx.beginPath();
                        ctx.moveTo(
                            bossArena.x + i - camera.x,
                            bossArena.y - half - camera.y,
                        );
                        ctx.lineTo(
                            bossArena.x + i - camera.x,
                            bossArena.y + half - camera.y,
                        );
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(
                            bossArena.x - half - camera.x,
                            bossArena.y + i - camera.y,
                        );
                        ctx.lineTo(
                            bossArena.x + half - camera.x,
                            bossArena.y + i - camera.y,
                        );
                        ctx.stroke();
                    }
                    return;
                }

                const patternKey = `world${currentWorld}`;
                const pattern = ASSETS.patterns[patternKey];

                if (pattern) {
                    ctx.save();
                    ctx.translate(-camera.x, -camera.y);
                    ctx.fillStyle = pattern;
                    ctx.fillRect(
                        camera.x,
                        camera.y,
                        canvas.width / zoom,
                        canvas.height / zoom,
                    );
                    ctx.restore();
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.02)";
                    ctx.lineWidth = 1;
                    let gridSize = 100;
                    let sX = Math.floor(camera.x / gridSize) * gridSize;
                    let sY = Math.floor(camera.y / gridSize) * gridSize;
                    for (
                        let x = sX - gridSize;
                        x < sX + canvas.width / zoom + gridSize;
                        x += gridSize
                    ) {
                        ctx.beginPath();
                        ctx.moveTo(x - camera.x, 0);
                        ctx.lineTo(x - camera.x, canvas.height / zoom);
                        ctx.stroke();
                    }
                    for (
                        let y = sY - gridSize;
                        y < sY + canvas.height / zoom + gridSize;
                        y += gridSize
                    ) {
                        ctx.beginPath();
                        ctx.moveTo(0, y - camera.y);
                        ctx.lineTo(canvas.width / zoom, y - camera.y);
                        ctx.stroke();
                    }
                } else {
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
                    ctx.lineWidth = 1;
                    let gridSize = 60 + ((currentWorld * 8) % 32);
                    let sX =
                        Math.floor((camera.x - canvas.width / 2) / gridSize) *
                        gridSize;
                    let sY =
                        Math.floor((camera.y - canvas.height / 2) / gridSize) *
                        gridSize;
                    for (
                        let x = sX;
                        x < sX + canvas.width + gridSize * 2;
                        x += gridSize
                    ) {
                        ctx.beginPath();
                        ctx.moveTo(x - camera.x, 0);
                        ctx.lineTo(x - camera.x, canvas.height);
                        ctx.stroke();
                    }
                    for (
                        let y = sY;
                        y < sY + canvas.height + gridSize * 2;
                        y += gridSize
                    ) {
                        ctx.beginPath();
                        ctx.moveTo(0, y - camera.y);
                        ctx.lineTo(canvas.width, y - camera.y);
                        ctx.stroke();
                    }
                }
            }

            function drawLightnings() {
                activeLightnings.forEach((lt) => {
                    let alpha = lt.life / lt.maxLife;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = 3.5 * alpha;
                    ctx.beginPath();
                    let p0 = lt.points[0];
                    ctx.moveTo(p0.x - camera.x, p0.y - camera.y);
                    for (let i = 1; i < lt.points.length; i++) {
                        let pStart = lt.points[i - 1],
                            pEnd = lt.points[i];
                        let dx = pEnd.x - pStart.x,
                            dy = pEnd.y - pStart.y;
                        let dist = Math.hypot(dx, dy),
                            segments = Math.max(3, Math.floor(dist / 22));
                        for (let s = 1; s < segments; s++) {
                            let t = s / segments,
                                px = pStart.x + dx * t,
                                py = pStart.y + dy * t;
                            let nx = -dy / dist,
                                ny = dx / dist,
                                offset = (Math.random() - 0.5) * 14;
                            ctx.lineTo(
                                px + nx * offset - camera.x,
                                py + ny * offset - camera.y,
                            );
                        }
                        ctx.lineTo(pEnd.x - camera.x, pEnd.y - camera.y);
                    }
                    ctx.stroke();
                });
            }

                ctx.strokeStyle = "#FFFFFF";
                ctx.strokeRect(bx, by, bw, bh);
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(
                    bx,
                    by,
                    bw * (Math.max(0, player.hp) / player.maxHp),
                    bh,
                );

                if (
                    gameState === STATES.BOSS_FIGHT &&
                    activeBossRef &&
                    activeBossRef.active
                ) {
                    let bbw = canvas.width * 0.6,

                    ctx.lineWidth = 1;
                    ctx.strokeRect(bbx, bby, bbw, bbh);

                    // СИСТЕМНЫЙ БАННЕР ПРЕДУПРЕЖДЕНИЯ ДЛЯ СМЕНЫ ФАЗ
                    let totalCycle =
                        activeBossRef.variant === "boss_rat_king" ? 900 : 1200;
                    let currentCycleTime =
                        activeBossRef.phaseTimer % totalCycle;
                    let subCycleLength =
                        activeBossRef.variant === "boss_rat_king" ? 300 : 400;
                    let subTimeWarn = currentCycleTime % subCycleLength;

                    if (subTimeWarn < 90) {
                        let phaseNum =
                            Math.floor(currentCycleTime / subCycleLength) + 1;
                        let warningText = "";
                        let subText = "";

                        if (activeBossRef.variant === "boss_rat_king") {
                            if (phaseNum === 2) {
                                warningText =
                                    "SYSTEM NOTICE: PLAGUE STORM DETECTED";
                                subText =
                                    "CONVERGING SPIRAL EMISSION IN " +
                                    Math.ceil((90 - subTimeWarn) / 60) +
                                    "s";
                            } else if (phaseNum === 3) {
                                warningText = "ALARM: ENEMY OUTPOST RESPONDING";
                                subText =
                                    "SUMMONING RAT INFESTATION IN " +
                                    Math.ceil((90 - subTimeWarn) / 60) +
                                    "s";
                            }
                        } else if (activeBossRef.variant === "boss_antivirus") {
                            if (phaseNum === 1) {
                                warningText =
                                    "SYSTEM NOTICE: SECTOR SANITIZATION IMMINENT";
                                subText =
                                    "CONFIGURING SCAN GRID IN " +
                                    Math.ceil((90 - subTimeWarn) / 60) +
                                    "s";
                            } else if (phaseNum === 2) {
                                warningText =
                                    "SECURITY BREACH: FULL DIAGNOSTIC SCAN LOCK-ON";
                                subText =
                                    "CHARGING OPTICAL DISK SYSTEM IN " +
                                    Math.ceil((90 - subTimeWarn) / 60) +
                                    "s";
                            } else {
                                warningText =
                                    "ALARM: ISOLATION PROTOCOLS ENGAGED";
                                subText =
                                    "DEPLOYING QUARANTINE BOT HUNTERS IN " +
                                    Math.ceil((90 - subTimeWarn) / 60) +
                                    "s";
                            }
                        } else if (
                            activeBossRef.variant === "boss_kernel_panic"
                        ) {
                            if (phaseNum === 1) {
                                warningText =
                                    "KERNEL EXCEPTION: MEMORY LEAK DETECTED";
                                subText =
                                    "INITIATING SECTOR PURGE IN " +
                                    Math.ceil((90 - subTimeWarn) / 60) +
                                    "s";
                            } else if (phaseNum === 2) {
                                warningText =
                                    "ALARM: SUBPROCESS FORKING DETECTED";
                                subText =
                                    "CREATING DECOY INSTANCES IN " +
                                    Math.ceil((90 - subTimeWarn) / 60) +
                                    "s";
                            } else {
                                warningText =
                                    "EMERGENCY: SYSTEM MELTDOWN DETECTED";
                                subText =
                                    "GRAVITATIONAL COLLAPSE IMMINENT IN " +
                                    Math.ceil((90 - subTimeWarn) / 60) +
                                    "s";
                            }
                        }

                        if (warningText !== "") {
                            ctx.save();
                            ctx.fillStyle = "rgba(255, 51, 0, 0.18)";
                            ctx.fillRect(0, 110, canvas.width, 50);
                            ctx.strokeStyle = "#FF3300";
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.moveTo(0, 110);
                            ctx.lineTo(canvas.width, 110);
                            ctx.moveTo(0, 160);
                            ctx.lineTo(canvas.width, 160);
                            ctx.stroke();

                            ctx.fillStyle = "#FF3300";

                            ctx.textAlign = "center";

                        dy = worldPortal.y - player.y;
                    if (Math.hypot(dx, dy) > canvas.width / 2.4) {
                        let angle = Math.atan2(dy, dx);
                        let ax = canvas.width / 2 + Math.cos(angle) * 140,
                            ay = canvas.height / 2 + Math.sin(angle) * 140;
                        ctx.fillStyle = "#FFFFFF";
                        ctx.beginPath();
                        ctx.moveTo(ax, ay);
                        ctx.lineTo(
                            ax - 12 * Math.cos(angle - 0.38),
                            ay - 12 * Math.sin(angle - 0.38),
                        );
                        ctx.lineTo(
                            ax - 12 * Math.cos(angle + 0.38),
                            ay - 12 * Math.sin(angle + 0.38),
                        );
                        ctx.closePath();
                        ctx.fill();
                    }

                if (joystick.active) {
                    ctx.strokeStyle = "rgba(255,255,255,0.08)";
                    ctx.lineWidth = 2;

                        joystick.startY,

                    ctx.arc(
                        joystick.currentX,
                        joystick.currentY,
                        15,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fill();
                }

                for (let i = toasts.length - 1; i >= 0; i--) {
                    let t = toasts[i];
                    t.timer--;
                    if (t.timer <= 0) {
                        toasts.splice(i, 1);
                        continue;
                    }
                    let alpha = Math.min(1, t.timer / 25);
                    ctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.9})`;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = 1.5;
                    let tw = 260,
                        th = 46,
                        tx = canvas.width - tw - 15,
                        ty = 20 + i * (th + 10);

                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.font = "bold 11px monospace";
                    ctx.textAlign = "left";
                    ctx.fillText(t.title, tx + 12, ty + 18);
                    ctx.font = "10px monospace";
                    ctx.fillStyle = `rgba(180, 180, 180, ${alpha})`;
                    ctx.fillText(t.desc, tx + 12, ty + 33);
                }
            }

            function gameTick() {
                if (
                    pendingUpgrades > 0 &&
                    gameState !== STATES.UPGRADE &&
                    gameState !== STATES.BOSS_SPAWN &&
                    gameState !== STATES.PAUSED
                ) {
                    triggerUpgradeScreen();
                }

                if (
                    gameState !== STATES.UPGRADE &&
                    gameState !== STATES.BOSS_SPAWN &&
                    gameState !== STATES.PAUSED
                ) {
                    secondsTimer++;
                    if (secondsTimer >= 60) {
                        secondsTimer = 0;
                        if (gameState === STATES.PLAYING) {
                            gameTimer++;
                            if (gameTimer >= WORLD_DURATION)
                                triggerPortalPhase();
                        }
                    }

                    player.update();
                    enemyPool.updateAll();

                    for (let i = spawnWarnings.length - 1; i >= 0; i--) {
                        let sw = spawnWarnings[i];
                        sw.timer--;
                        if (sw.timer <= 0) {
                            enemyPool.get()?.spawn(sw.x, sw.y, sw.variant);
                            spawnWarnings.splice(i, 1);
                        }
                    }

                    let qtBoundary = new QT_Rectangle(
                        player.x,
                        player.y,
                        2000,
                        2000,
                    );
                    enemyQuadTree = new QuadTree(qtBoundary, 4);
                    for (let i = 0; i < enemyPool.activeCount; i++) {
                        enemyQuadTree.insert(enemyPool.objects[i]);
                    }

                    Object.keys(WEAPONS).forEach((k) => {
                        let w = WEAPONS[k];
                        if (w.level > 0) {
                            if (w.fire) {
                                w.timer++;
                                if (w.timer >= w.cd) {
                                    w.timer = 0;
                                    w.fire();
                                }
                            }
                            if (w.update) w.update();
                        }
                    });

                    bulletPool.updateAll();
                    enemyBulletPool.updateAll();
                    xpPool.updateAll();
                    effectPool.updateAll();
                    floatingTextPool.updateAll();
                    worldPortal.update();
                    if (!bossArena.active) spawnWave();

                    for (let i = activeLightnings.length - 1; i >= 0; i--) {
                        activeLightnings[i].life--;
                        if (activeLightnings[i].life <= 0)
                            activeLightnings.splice(i, 1);
                    }
                }

                if (gameState === STATES.BOSS_SPAWN) {
                    bossSpawnTimer--;
                    if (bossSpawnTimer <= 0) gameState = STATES.BOSS_FIGHT;
                }
            }

            function gameLoop(currentTime) {
                if (gameState === STATES.LOADING) {
                    requestAnimationFrame(gameLoop);
                    return;
                }

                let elapsed = currentTime - lastTime;
                if (elapsed > 1000) elapsed = STEP;
                lastTime = currentTime;
                dtAccumulator += elapsed;

                while (dtAccumulator >= STEP) {
                    if (
                        [
                            STATES.PLAYING,
                            STATES.PORTAL_OPEN,
                            STATES.BOSS_SPAWN,
                            STATES.BOSS_FIGHT,
                            STATES.UPGRADE,
                            STATES.PAUSED,
                        ].indexOf(gameState) !== -1
                    ) {
                        gameTick();
                    }
                    dtAccumulator -= STEP;
                }

                ctx.fillStyle = "#1A1A1A";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (
                    [
                        STATES.PLAYING,
                        STATES.PORTAL_OPEN,
                        STATES.BOSS_SPAWN,
                        STATES.BOSS_FIGHT,
                        STATES.UPGRADE,
                        STATES.PAUSED,
                    ].indexOf(gameState) !== -1
                ) {
                    camera.x +=
                        (player.x - canvas.width / zoom / 2 - camera.x) * 0.1;
                    camera.y +=
                        (player.y - canvas.height / zoom / 2 - camera.y) * 0.1;

                    ctx.save();
                    ctx.scale(zoom, zoom);
                    renderBackground();
                    xpPool.drawAll();
                    worldPortal.draw();
                    player.draw();
                    enemyPool.drawAll();

                    spawnWarnings.forEach((sw) => {
                        let pct = sw.timer / sw.maxTimer;
                        ctx.save();
                        ctx.translate(sw.x - camera.x, sw.y - camera.y);

                        ctx.strokeStyle = "#FF3300";
                        ctx.lineWidth = 2;

                        ctx.beginPath();
                        ctx.arc(0, 0, 35 * pct + 10, 0, Math.PI * 2);
                        ctx.stroke();

                        ctx.fillStyle = `rgba(255, 51, 0, ${0.2 + Math.sin(Date.now() / 80) * 0.15})`;
                        ctx.beginPath();
                        ctx.arc(0, 0, 10, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = "#FF3300";
                        ctx.font = "bold 9px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText("! WARNING !", 0, -20);
                        ctx.restore();
                    });

                    bulletPool.drawAll();
                    enemyBulletPool.drawAll();
                    effectPool.drawAll();
                    if (WEAPONS.Orbit.draw) WEAPONS.Orbit.draw();
                    if (WEAPONS.Aura.draw) WEAPONS.Aura.draw();
                    drawLightnings();
                    floatingTextPool.drawAll();
                    ctx.restore();

                    renderUI();

                    if (gameState === STATES.BOSS_SPAWN) {
                        if (bossSpawnTimer > 76) {
                            ctx.fillStyle = "#FFFFFF";
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                        ctx.fillStyle = "rgba(26,26,26,0.95)";
                        ctx.fillRect(
                            0,
                            canvas.height / 2 - 60,
                            canvas.width,
                            120,
                        );
                        ctx.fillStyle = "#FF0000";
                        ctx.font = "bold 20px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText(
                            "ОБНАРУЖЕНА УГРОЗА БЕЗОПАСНОСТИ",
                            canvas.width / 2,
                            canvas.height / 2 - 12,
                        );
                        ctx.fillStyle = "#FFFFFF";
                        ctx.font = "15px monospace";
                        ctx.fillText(
                            activeBossRef ? activeBossRef.name : "",
                            canvas.width / 2,
                            canvas.height / 2 + 24,
                        );
                    }

                    if (gameState === STATES.PAUSED) {
                        ctx.fillStyle = "rgba(26, 26, 26, 0.82)";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = "#FFFFFF";
                        ctx.textAlign = "center";
                        ctx.font = "bold 26px monospace";
                        ctx.fillText(
                            "ПАУЗА СИСТЕМЫ",
                            canvas.width / 2,
                            canvas.height / 2 - 15,
                        );
                        ctx.fillStyle = "rgba(255,255,255,0.4)";
                        ctx.font = "12px monospace";
                        ctx.fillText(
                            "НАЖМИТЕ ESC ИЛИ P ДЛЯ ПРОДОЛЖЕНИЯ",
                            canvas.width / 2,
                            canvas.height / 2 + 20,
                        );
                    }
                } else if (gameState === STATES.MENU) {
                    ctx.fillStyle = "#FFFFFF";
                    ctx.font = "28px monospace";
                    ctx.textAlign = "center";
                    ctx.fillText(
                        "WHITE VS RED",
                        canvas.width / 2,
                        canvas.height / 2 - 120,
                    );
                    ctx.font = "12px monospace";
                    ctx.fillText(
                        "КЛИКНИТЕ ЭКРАН ДЛЯ ЗАПУСКА",
                        canvas.width / 2,
                        canvas.height / 2 - 85,
                    );
                    ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                    ctx.font = "11px monospace";
                    ctx.fillText(
                        "— МЕТА-ДОСТИЖЕНИЯ И РАЗБЛОКИРОВКА —",
                        canvas.width / 2,
                        canvas.height / 2 - 35,
                    );

                    let startY = canvas.height / 2 - 10;
                    ACHIEVEMENT_LIST.forEach((ach, index) => {
                        let isUnl =
                            unlockedWeapons.includes(ach.id) ||
                            ach.id === "Секреты";
                        ctx.fillStyle = isUnl
                            ? "#FFFFFF"
                            : "rgba(255, 255, 255, 0.15)";
                        ctx.textAlign = index % 2 === 0 ? "right" : "left";
                        let posX =
                            canvas.width / 2 + (index % 2 === 0 ? -20 : 20);
                        let posY = startY + Math.floor(index / 2) * 22;
                        let symbol = isUnl ? "✔" : "🔒";
                        ctx.fillText(
                            `${symbol} ${ach.cond} -> ${ach.id}`,
                            posX,
                            posY,
                        );
                    });
                } else if (gameState === STATES.GAMEOVER) {
                    ctx.fillStyle = "#FF0000";
                    ctx.font = "34px monospace";
                    ctx.textAlign = "center";
                    ctx.fillText(
                        "АННИГИЛЯЦИЯ",
                        canvas.width / 2,
                        canvas.height / 2 - 15,
                    );
                    ctx.fillStyle = "#FFFFFF";
                    ctx.font = "14px monospace";
                    ctx.fillText(
                        `Пройдено миров: ${currentWorld} | Очки: ${score}`,
                        canvas.width / 2,
                        canvas.height / 2 + 25,
                    );
                    ctx.fillText(
                        "Кликни для перезапуска",
                        canvas.width / 2,
                        canvas.height / 2 + 65,
                    );
                }

                requestAnimationFrame(gameLoop);
            }

            const keys = {};
            window.addEventListener("keydown", (e) => {
                keys[e.code] = true;
                if (e.code === "Escape" || e.code === "KeyP") {
                    if (
                        [
                            STATES.PLAYING,
                            STATES.PORTAL_OPEN,
                            STATES.BOSS_SPAWN,
                            STATES.BOSS_FIGHT,
                        ].includes(gameState)
                    ) {
                        previousState = gameState;
                        gameState = STATES.PAUSED;
                    } else if (gameState === STATES.PAUSED) {
                        gameState = previousState;
                    }
                }
            });
            window.addEventListener("keyup", (e) => (keys[e.code] = false));

            const joystick = {
                active: false,
                startX: 0,
                startY: 0,
                currentX: 0,
                currentY: 0,
                vx: 0,
                vy: 0,
            };
            window.addEventListener(
                "touchstart",
                (e) => {
                    if (
                        [
                            STATES.PLAYING,
                            STATES.PORTAL_OPEN,
                            STATES.BOSS_FIGHT,
                        ].indexOf(gameState) === -1
                    )
                        return;
                    const touch = e.touches[0];
                    if (touch.clientX < canvas.width / 2) {
                        joystick.active = true;
                        joystick.startX = touch.clientX;
                        joystick.startY = touch.clientY;
                        joystick.currentX = touch.clientX;
                        joystick.currentY = touch.clientY;
                    }
                },
                { passive: true },
            );

            window.addEventListener(
                "touchmove",
                (e) => {
                    if (!joystick.active) return;
                    const touch = e.touches[0];
                    joystick.currentX = touch.clientX;
                    joystick.currentY = touch.clientY;
                    let dx = joystick.currentX - joystick.startX,
                        dy = joystick.currentY - joystick.startY;
                    let dist = Math.hypot(dx, dy),
                        maxDist = 50;
                    if (dist > maxDist) {
                        dx = (dx / dist) * maxDist;
                        dy = (dy / dist) * maxDist;
                    }
                    joystick.vx = dx / maxDist;
                    joystick.vy = dy / maxDist;
                },
                { passive: true },
            );

            window.addEventListener("touchend", () => {
                joystick.active = false;
                joystick.vx = 0;
                joystick.vy = 0;
            });

            function resetGame() {
                player.x = 0;
                player.y = 0;
                player.hp = 100;
                player.level = 1;
                player.xp = 0;
                player.xpNeeded = 12;
                gameTimer = 0;
                secondsTimer = 0;
                currentWorld = 1;
                difficultyMultiplier = 1.0;
                score = 0;
                pendingUpgrades = 0;
                activeBossRef = null;
                bossArena.active = false;

                spawnWarnings.length = 0;

                Object.keys(WEAPONS).forEach((k) => {
                    WEAPONS[k].level = k === "Dart" ? 1 : 0;
                    if (WEAPONS[k].timer) WEAPONS[k].timer = 0;
                    if (k === "Dart") {
                        WEAPONS[k].baseCd = 42;
                        WEAPONS[k].dmg = 20;
                    }
                    if (k === "Orbit") {
                        WEAPONS[k].speed = 0.04;
                        WEAPONS[k].size = 9;
                    }
                    if (k === "Aura") WEAPONS[k].radius = 70;
                    if (k === "Cross") {
                        WEAPONS[k].baseCd = 60;
                        WEAPONS[k].size = 5;
                    }
                    if (k === "Blast") WEAPONS[k].baseCd = 85;
                    if (k === "Beam") WEAPONS[k].baseCd = 150;
                    if (k === "Bounce") WEAPONS[k].baseCd = 75;
                    if (k === "Pulse") WEAPONS[k].baseCd = 60;
                    if (k === "Rain") WEAPONS[k].baseCd = 28;
                    if (k === "Mine") WEAPONS[k].baseCd = 95;
                    if (k === "Chain") WEAPONS[k].baseCd = 80;
                    if (k === "Spiral") WEAPONS[k].baseCd = 65;
                    if (k === "Vortex") WEAPONS[k].baseCd = 120;
                    if (k === "Echo") WEAPONS[k].baseCd = 180;
                    if (k === "Crystal") WEAPONS[k].baseCd = 85;
                });
                syncWeaponSpecs();

                enemyPool.clear();
                bulletPool.clear();
                enemyBulletPool.clear();
                xpPool.clear();
                effectPool.clear();
                floatingTextPool.clear();
                worldPortal.active = false;
                activeLightnings = [];
            }

            function spawnWave() {
                if (gameState !== STATES.PLAYING) return;
                let thirtySecSteps = Math.floor(gameTimer / 30);
                let baseRate = 45;
                let spawnInterval = Math.max(
                    8,
                    baseRate * Math.pow(0.82, thirtySecSteps),
                );

                if (Math.random() * 100 < 100 / spawnInterval) {
                    let angle = Math.random() * Math.PI * 2,
                        dist = Math.max(canvas.width, canvas.height) / 2 + 60;
                    let rx = player.x + Math.cos(angle) * dist,
                        ry = player.y + Math.sin(angle) * dist;
                    let typeRand = Math.random(),
                        variant = "normal";
                    if (currentWorld >= 2 && typeRand > 0.82)
                        variant =
                            currentWorld >= 3 && typeRand > 0.92
                                ? "shooter"
                                : "exploder";
                    enemyPool.get()?.spawn(rx, ry, variant);
                }
            }

            function triggerPortalPhase() {
                gameState = STATES.PORTAL_OPEN;
                for (let i = 0; i < enemyPool.activeCount; i++) {
                    let e = enemyPool.objects[i];
                    effectPool.get()?.spawn(e.x, e.y, 25, 10, "enemy_exp");
                }
                enemyPool.clear();
                for (let i = 0; i < xpPool.activeCount; i++) addXP(1);
                xpPool.clear();
                worldPortal.spawn(
                    player.x + (Math.random() - 0.5) * 180,
                    player.y + (Math.random() - 0.5) * 180,
                );
            }

            function prepareBossSpawn() {
                gameState = STATES.BOSS_SPAWN;
                bossSpawnTimer = 90;
                bossArena.x = player.x;
                bossArena.y = player.y;
                bossArena.active = true;
                enemyPool.clear();
                enemyBulletPool.clear();
                spawnWarnings.length = 0;

                if (currentWorld === 1) {
                    enemyPool
                        .get()
                        ?.spawn(bossArena.x, bossArena.y, "boss_rat_king");
                } else if (currentWorld === 2) {
                    enemyPool
                        .get()
                        ?.spawn(bossArena.x, bossArena.y, "boss_antivirus");
                } else {
                    enemyPool
                        .get()
                        ?.spawn(bossArena.x, bossArena.y, "boss_kernel_panic");
                }
            }

            function handleBossDeath() {
                enemyBulletPool.clear();
                activeBossRef = null;
                spawnWarnings.length = 0;

                if (currentWorld === 1) {
                    unlockWeapon("Pulse");
                    toasts.push({
                        title: "КРЫСИНЫЙ КОРОЛЬ ПОВЕРЖЕН",
                        desc: "Разблокирован Импульс (Pulse) и доступ во 2-й мир!",
                        timer: 240,
                    });
                } else if (currentWorld === 2) {
                    unlockWeapon("Beam");
                    toasts.push({
                        title: "АНТИВИРУС УДАЛЕН",
                        desc: "Разблокированы Лазеры (Beam) и доступ в 3-й мир!",
                        timer: 240,
                    });
                } else {
                    unlockWeapon("Chain");
                    toasts.push({
                        title: "ЯДРО ВОССТАНОВЛЕНО",
                        desc: "Разблокирована Цепная молния (Chain)!",
                        timer: 240,
                    });
                }

                worldPortal.spawn(bossArena.x, bossArena.y);
            }

            function goToNextWorld() {
                currentWorld++;
                difficultyMultiplier *= 1.5;
                gameTimer = 0;
                secondsTimer = 0;
                gameState = STATES.PLAYING;
                bossArena.active = false;
                spawnWarnings.length = 0;

                enemyPool.clear();
                bulletPool.clear();
                enemyBulletPool.clear();
                effectPool.clear();
                activeLightnings = [];
            }

            function loadMetaProgress() {
                try {
                    let saved = localStorage.getItem("wvr_unlocked_weapons");
                    if (saved) {
                        let parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) {
                            parsed.forEach((w) => {
                                if (!unlockedWeapons.includes(w) && WEAPONS[w])
                                    unlockedWeapons.push(w);
                            });
                        }
                    }
                } catch (e) {}
            }

            loadMetaProgress();
            preloadImages();

            requestAnimationFrame((timestamp) => {
                lastTime = timestamp;
                gameLoop(timestamp);
            });

            function initMobilePauseButton() {
                const pauseBtn = document.getElementById("pause-button");
                if (!pauseBtn) return;

                const isMobile =
                    /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
                        navigator.userAgent,
                    );

                if (isMobile) {
                    pauseBtn.style.display = "flex";
                    pauseBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if (
                            gameState === STATES.PLAYING ||
                            gameState === STATES.PORTAL_OPEN ||
                            gameState === STATES.BOSS_SPAWN ||
                            gameState === STATES.BOSS_FIGHT
                        ) {
                            previousState = gameState;
                            gameState = STATES.PAUSED;
                        } else if (gameState === STATES.PAUSED) {
                            gameState = previousState;
                            lastTime = performance.now();
                        }
                    });
                } else {
                    pauseBtn.style.display = "none";
                }
            }

            initMobilePauseButton();

            window.addEventListener("resize", () => {
                initMobilePauseButton();
            });
        </script>
    </body>
</html>
