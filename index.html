                const barWidth = 220;
                const barHeight = 8;
                const barX = canvas.width / 2 - barWidth / 2;
                const barY = 25;
                const progress = Math.min(gameTimer / WORLD_DURATION, 1);

                ctx.strokeStyle = "#00ffff";
                ctx.strokeRect(barX, barY, barWidth, barHeight);
                ctx.fillStyle = "rgba(0, 255, 255, 0.15)";
                ctx.fillRect(barX, barY, barWidth, barHeight);
                ctx.fillStyle = "#00ffff";
                ctx.fillRect(barX, barY, barWidth * progress, barHeight);

                ctx.textAlign = "center";
                ctx.font = "bold 10px monospace";
                ctx.fillText("СТАБИЛИЗАЦИЯ ПОТОКА", canvas.width / 2, barY - 8);

                let bw = 220,
                    bh = 10,
                    bx = canvas.width / 2 - bw / 2,
                    by = canvas.height - 35;
                ctx.strokeStyle = "#ff3333";
                ctx.strokeRect(bx, by, bw, bh);
                ctx.fillStyle = "rgba(255, 51, 51, 0.15)";
                ctx.fillRect(bx, by, bw, bh);
                ctx.fillStyle = "#ff3333";
                ctx.shadowColor = "#ff3333";
                ctx.fillRect(
                    bx,
                    by,
                    bw * (Math.max(0, player.hp) / player.maxHp),
                    bh,
                );
                ctx.fillStyle = "#ffffff";
                ctx.shadowColor = "#ffffff";
                ctx.fillText("ЦЕЛОСТНОСТЬ ЯДРА", canvas.width / 2, by - 6);

                if (
                    gameState === STATES.BOSS_FIGHT &&
                    activeBossRef &&
                    activeBossRef.active
                ) {
                    let bbw = canvas.width * 0.6,
                        bbh = 12,
                        bbx = canvas.width / 2 - bbw / 2,
                        bby = 55;
                    ctx.fillStyle = "rgba(255,0,0,0.15)";
                    ctx.fillRect(bbx, bby, bbw, bbh);
                    ctx.fillStyle = "#FF0000";
                    ctx.fillRect(
                        bbx,
                        bby,
                        bbw *
                            (Math.max(0, activeBossRef.hp) /
                                activeBossRef.maxHp),
                        bbh,
                    );
                    ctx.strokeStyle = "#FFFFFF";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(bbx, bby, bbw, bbh);
                    ctx.fillStyle = "#FFFFFF";
                    ctx.font = "11px monospace";
                    ctx.fillText(activeBossRef.name, canvas.width / 2, bby - 6);
                }

                if (worldPortal.active) {
                    let dx = worldPortal.x - player.x,
                        dy = worldPortal.y - player.y;
                    if (Math.hypot(dx, dy) > canvas.width / 2.4) {
                        let angle = Math.atan2(dy, dx);
                        let ax = canvas.width / 2 + Math.cos(angle) * 140,
                            ay = canvas.height / 2 + Math.sin(angle) * 140;
                        ctx.fillStyle = "#ffffff";
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = "#ffffff";
                        ctx.beginPath();
                        ctx.moveTo(ax, ay);
                        ctx.lineTo(
                            ax - 12 * Math.cos(angle - 0.38),
                            ay - 12 * Math.sin(angle - 0.38),
                        );
                        ctx.lineTo(
                            ax - 12 * Math.cos(angle + 0.38),
                            ay - 12 * Math.sin(angle + 0.38),
                        );
                        ctx.closePath();
                        ctx.fill();
                    }
                }

                if (joystick.active) {
                    ctx.strokeStyle = "rgba(0, 255, 255, 0.2)";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(
                        joystick.startX,
                        joystick.startY,
                        45,
                        0,
                        Math.PI * 2,
                    );
                    ctx.stroke();
                    ctx.fillStyle = "rgba(0, 255, 255, 0.4)";
                    ctx.beginPath();
                    ctx.arc(
                        joystick.currentX,
                        joystick.currentY,
                        15,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fill();
                }

                for (let i = toasts.length - 1; i >= 0; i--) {
                    let t = toasts[i];
                    t.timer--;
                    if (t.timer <= 0) {
                        toasts.splice(i, 1);
                        continue;
                    }
                    let alpha = Math.min(1, t.timer / 25);
                    ctx.fillStyle = `rgba(10, 10, 15, ${alpha * 0.95})`;
                    ctx.strokeStyle = `rgba(0, 255, 255, ${alpha})`;
                    ctx.lineWidth = 1.5;
                    let tw = 260,
                        th = 48,
                        tx = canvas.width - tw - 20,
                        ty = 20 + i * (th + 10);
                    ctx.fillRect(tx, ty, tw, th);
                    ctx.strokeRect(tx, ty, tw, th);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.font = "bold 11px monospace";
                    ctx.textAlign = "left";
                    ctx.fillText(t.title, tx + 12, ty + 18);
                    ctx.font = "10px monospace";
                    ctx.fillStyle = `rgba(0, 255, 255, ${alpha})`;
                    ctx.fillText(t.desc, tx + 12, ty + 33);
                }
                ctx.restore();
            }

            function gameTick() {
                updatePauseButtonVisibility();
                if (
                    pendingUpgrades > 0 &&
                    gameState !== STATES.UPGRADE &&
                    gameState !== STATES.BOSS_SPAWN &&
                    gameState !== STATES.PAUSED &&
                    gameState !== STATES.REVIVING
                ) {
                    triggerUpgradeScreen();
                }

                if (bossDeathDelay) return;

                if (gameState === STATES.PAUSED && !reviveAnimationActive) {
                    document.getElementById("pause-menu-btn").style.display =
                        "block";
                    isMusicPlaying = false;
                    fadeOutMusic(() => {
                        sfx.stopMusic();
                    }, true);
                    return;
                } else {
                    document.getElementById("pause-menu-btn").style.display =
                        "none";
                }

                if (
                    gameState !== STATES.UPGRADE &&
                    gameState !== STATES.BOSS_SPAWN &&
                    gameState !== STATES.PAUSED
                ) {
                    const isGameplayActive = gameState !== STATES.REVIVING;

                    if (isGameplayActive) {
                        secondsTimer++;
                        if (secondsTimer >= 60) {
                            secondsTimer = 0;
                            if (gameState === STATES.PLAYING) {
                                gameTimer++;
                                if (gameTimer >= WORLD_DURATION)
                                    triggerPortalPhase();
                            }
                        }

                        player.update();
                        enemyPool.updateAll();

                        for (let i = spawnWarnings.length - 1; i >= 0; i--) {
                            let sw = spawnWarnings[i];
                            sw.timer--;
                            if (sw.timer <= 0) {
                                enemyPool.get()?.spawn(sw.x, sw.y, sw.variant);
                                spawnWarnings.splice(i, 1);
                            }
                        }

                        Object.keys(WEAPONS).forEach((k) => {
                            let w = WEAPONS[k];
                            if (w.level > 0) {
                                if (w.fire) {
                                    w.timer++;
                                    if (w.timer >= w.cd) {
                                        w.timer = 0;
                                        w.fire();
                                    }
                                }
                                if (w.update) w.update();
                            }
                        });

                        if (!bossArena.active) spawnWave();
                    }

                    bulletPool.updateAll();
                    enemyBulletPool.updateAll();
                    xpPool.updateAll();
                    effectPool.updateAll();
                    floatingTextPool.updateAll();
                    worldPortal.update();

                    let qtBoundary = new QT_Rectangle(
                        player.x,
                        player.y,
                        2000,
                        2000,
                    );
                    enemyQuadTree = new QuadTree(qtBoundary, 4);
                    for (let i = 0; i < enemyPool.activeCount; i++) {
                        enemyQuadTree.insert(enemyPool.objects[i]);
                    }

                    for (let i = activeLightnings.length - 1; i >= 0; i--) {
                        activeLightnings[i].life--;
                        if (activeLightnings[i].life <= 0)
                            activeLightnings.splice(i, 1);
                    }
                }

                if (gameState === STATES.BOSS_SPAWN) {
                    bossSpawnTimer--;
                    if (bossSpawnTimer <= 0) {
                        gameState = STATES.BOSS_FIGHT;
                        triggerYandexGameplayStart(); // Фактический старт интерактивного боя
                    }
                }

                ensureMusicState();
            }

            function gameLoop(currentTime) {
                if (gameState === STATES.LOADING) {
                    requestAnimationFrame(gameLoop);
                    return;
                }

                let elapsed = currentTime - lastTime;
                if (elapsed > 1000) elapsed = STEP;
                lastTime = currentTime;
                dtAccumulator += elapsed;

                while (dtAccumulator >= STEP) {
                    if (
                        [
                            STATES.PLAYING,
                            STATES.PORTAL_OPEN,
                            STATES.BOSS_SPAWN,
                            STATES.BOSS_FIGHT,
                            STATES.UPGRADE,
                            STATES.PAUSED,
                            STATES.REVIVING,
                        ].indexOf(gameState) !== -1
                    ) {
                        gameTick();
                    }
                    dtAccumulator -= STEP;
                }

                ctx.fillStyle = getBackgroundColor();
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (reviveAnimationActive) {
                    const scale =
                        1 + Math.sin(reviveAnimationProgress * 0.2) * 0.03;
                    ctx.save();
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.scale(scale, scale);
                    ctx.translate(-canvas.width / 2, -canvas.height / 2);

                    const vignette =
                        1 - Math.min(1, reviveAnimationProgress / 30) * 0.3;
                    const gradient = ctx.createRadialGradient(
                        canvas.width / 2,
                        canvas.height / 2,
                        50,
                        canvas.width / 2,
                        canvas.height / 2,
                        canvas.width * 0.8,
                    );
                    gradient.addColorStop(
                        0,
                        `rgba(255, 255, 255, ${0.05 * (1 - vignette)})`,
                    );
                    gradient.addColorStop(
                        1,
                        `rgba(0, 0, 0, ${0.3 * (1 - vignette)})`,
                    );
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.restore();

                    reviveAnimationProgress++;
                }

                if (
                    [
                        STATES.PLAYING,
                        STATES.PORTAL_OPEN,
                        STATES.BOSS_SPAWN,
                        STATES.BOSS_FIGHT,
                        STATES.UPGRADE,
                        STATES.PAUSED,
                        STATES.REVIVING,
                    ].indexOf(gameState) !== -1
                ) {
                    camera.x +=
                        (player.x - canvas.width / zoom / 2 - camera.x) * 0.1;
                    camera.y +=
                        (player.y - canvas.height / zoom / 2 - camera.y) * 0.1;

                    ctx.save();
                    ctx.scale(zoom, zoom);
                    renderBackground();
                    xpPool.drawAll();
                    worldPortal.draw();
                    player.draw();
                    enemyPool.drawAll();

                    spawnWarnings.forEach((sw) => {
                        let pct = sw.timer / sw.maxTimer;
                        ctx.save();
                        ctx.translate(sw.x - camera.x, sw.y - camera.y);

                        ctx.strokeStyle = "#ff3333";
                        ctx.lineWidth = 2;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = "#ff3333";

                        ctx.beginPath();
                        ctx.arc(0, 0, 35 * pct + 10, 0, Math.PI * 2);
                        ctx.stroke();

                        ctx.fillStyle = `rgba(255, 51, 51, ${0.25 + Math.sin(Date.now() / 80) * 0.15})`;
                        ctx.beginPath();
                        ctx.arc(0, 0, 10, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = "#ff3333";
                        ctx.font = "bold 9px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText("! СБОЙ СЕКТОРА !", 0, -22);
                        ctx.restore();
                    });

                    bulletPool.drawAll();
                    enemyBulletPool.drawAll();
                    effectPool.drawAll();
                    if (WEAPONS.Orbit.draw) WEAPONS.Orbit.draw();
                    if (WEAPONS.Aura.draw) WEAPONS.Aura.draw();
                    drawLightnings();
                    floatingTextPool.drawAll();
                    ctx.restore();

                    renderUI();

                    if (gameState === STATES.BOSS_SPAWN) {
                        if (bossSpawnTimer > 76) {
                            ctx.fillStyle = "#FFFFFF";
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                        ctx.fillStyle = "rgba(10,10,12,0.96)";
                        ctx.fillRect(
                            0,
                            canvas.height / 2 - 60,
                            canvas.width,
                            120,
                        );
                        ctx.fillStyle = "#ff3333";
                        ctx.font = "bold 20px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText(
                            "ОБНАРУЖЕНА СИСТЕМНАЯ УГРОЗА",
                            canvas.width / 2,
                            canvas.height / 2 - 12,
                        );
                        ctx.fillStyle = "#FFFFFF";
                        ctx.font = "15px monospace";
                        ctx.fillText(
                            activeBossRef ? activeBossRef.name : "",
                            canvas.width / 2,
                            canvas.height / 2 + 24,
                        );
                    }

                    if (gameState === STATES.PAUSED) {
                        ctx.fillStyle = "rgba(7, 7, 9, 0.85)";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = "#00ffff";
                        ctx.textAlign = "center";
                        ctx.font = "bold 26px monospace";
                        ctx.fillText(
                            "СИСТЕМА НА ПАУЗЕ",
                            canvas.width / 2,
                            canvas.height / 2 - 15,
                        );
                        if (window.innerWidth > 768) {
                            ctx.fillStyle = "rgba(255,255,255,0.4)";
                            ctx.font = "12px monospace";
                            ctx.fillText(
                                "НАЖМИТЕ P ИЛИ ПРОБЕЛ ДЛЯ СБРОСА ПАУЗЫ",
                                canvas.width / 2,
                                canvas.height / 2 + 20,
                            );
                        }
                    }
                }

                if (bossDeathDelay) {
                    ctx.save();
                    ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.restore();
                }

                requestAnimationFrame(gameLoop);
            }

            const keys = {};
            window.addEventListener("keydown", (e) => {
                keys[e.code] = true;
                if (e.code === "Space" || e.code === "KeyP") {
                    if (
                        [
                            STATES.PLAYING,
                            STATES.PORTAL_OPEN,
                            STATES.BOSS_SPAWN,
                            STATES.BOSS_FIGHT,
                        ].includes(gameState)
                    ) {
                        pauseGame(); // Пауза игрового процесса
                    } else if (gameState === STATES.PAUSED) {
                        resumeGame(); // Снятие с паузы
                    }
                }
            });

            let isTabHidden = false;

            window.addEventListener("blur", () => {
                isTabHidden = true;
                pauseGame(); // Полная пауза при потере фокуса
            });

            window.addEventListener("focus", () => {
                isTabHidden = false;
                // При снятии неактивности НЕ снимаем с паузы автоматически
                if (sfx && sfx.ctx && sfx.ctx.state === "suspended") {
                    sfx.ctx.resume();
                }
            });

            document.addEventListener("pause", () => {
                pauseGame(); // Полная пауза при событии приостановки платформы
            });

            document.addEventListener("resume", () => {
                // Не снимаем с паузы автоматически
                if (sfx && sfx.ctx && sfx.ctx.state === "suspended") {
                    sfx.ctx.resume();
                }
            });
            window.addEventListener("keyup", (e) => (keys[e.code] = false));

            function resetControls() {
                Object.keys(keys).forEach((key) => {
                    keys[key] = false;
                });
                joystick.active = false;
                joystick.vx = 0;
                joystick.vy = 0;
            }

            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    isTabHidden = true;
                    pauseGame(); // Полная и моментальная пауза при скрытии вкладки
                } else {
                    isTabHidden = false;
                    // Оставляем на паузе для повторного ручного запуска игроком
                    if (sfx && sfx.ctx && sfx.ctx.state === "suspended") {
                        sfx.ctx.resume();
                    }
                }
            });

            window.addEventListener("touchcancel", () => resetControls());
            window.addEventListener("touchend", () => resetControls());

            function handlePlayerDeath() {
                if (
                    gameState === STATES.GAMEOVER ||
                    gameState === STATES.REVIVING
                )
                    return;
                triggerYandexGameplayStop(); // Игровой процесс завершен (проигрыш)
                pauseMusic();
                gameState = STATES.GAMEOVER;

                const statsElem = document.getElementById("gameover-stats");
                statsElem.innerHTML = `Зачищено секторов: <span class="text-cyan-400 font-bold">${currentWorld}</span><br>Расшифровано данных (Счет): <span class="text-cyan-400 font-bold">${score}</span>`;

                const reviveBtn = document.getElementById("revive-ad-btn");
                if (adReviveUsedInCurrentRun) {
                    reviveBtn.style.opacity = "0.4";
                    reviveBtn.style.pointerEvents = "none";
                    reviveBtn.innerText = "РЕАНИМАЦИЯ ИСПОЛЬЗОВАНА";
                } else {
                    reviveBtn.style.opacity = "1";
                    reviveBtn.style.pointerEvents = "auto";
                    reviveBtn.innerText = "ВОССТАНОВИТЬ ЯДРО (100% HP) 📺";
                }

                document.getElementById("gameover-screen").style.display =
                    "block";
            }

            document
                .getElementById("revive-ad-btn")
                .addEventListener("click", (e) => {
                    e.stopPropagation();
                    if (adReviveUsedInCurrentRun) return;

                    showYandexRewarded(
                        () => {
                            adReviveUsedInCurrentRun = true;
                            document.getElementById(
                                "gameover-screen",
                            ).style.display = "none";
                            startReviveExplosionAnimation();
                        },
                        () => {
                            toasts.push({
                                title: "СБОЙ СИГНАЛА РЕКЛАМЫ",
                                desc: "Не удалось загрузить рекламный блок. Попробуйте снова.",
                                timer: 150,
                            });
                        },
                    );
                });

            document
                .getElementById("restart-game-btn")
                .addEventListener("click", (e) => {
                    e.stopPropagation();
                    document.getElementById("gameover-screen").style.display =
                        "none";

                    showYandexInterstitial(() => {
                        resetGame();
                        sfx.playUpgrade();
                        gameState = STATES.PLAYING;
                        lastTime = performance.now();
                        startMusic();
                        triggerYandexGameplayStart(); // Игровой процесс перезапущен
                    });
                });

            const joystick = {
                active: false,
                startX: 0,
                startY: 0,
                currentX: 0,
                currentY: 0,
                vx: 0,
                vy: 0,
            };
            window.addEventListener(
                "touchstart",
                (e) => {
                    if (
                        [
                            STATES.PLAYING,
                            STATES.PORTAL_OPEN,
                            STATES.BOSS_FIGHT,
                        ].indexOf(gameState) === -1
                    )
                        return;
                    sfx.init();

                    const touch = e.touches[0];
                    const touchX = touch.clientX;
                    joystick.active = true;
                    joystick.startX = touchX;
                    joystick.startY = touch.clientY;
                    joystick.currentX = touchX;
                    joystick.currentY = touch.clientY;
                },
                { passive: true },
            );

            window.addEventListener(
                "touchmove",
                (e) => {
                    if (!joystick.active) return;
                    const touch = e.touches[0];
                    joystick.currentX = touch.clientX;
                    joystick.currentY = touch.clientY;
                    let dx = joystick.currentX - joystick.startX,
                        dy = joystick.currentY - joystick.startY;
                    let dist = Math.hypot(dx, dy),
                        maxDist = 50;
                    if (dist > maxDist) {
                        dx = (dx / dist) * maxDist;
                        dy = (dy / dist) * maxDist;
                    }
                    joystick.vx = dx / maxDist;
                    joystick.vy = maxDist ? dy / maxDist : 0;
                },
                { passive: true },
            );

            window.addEventListener("touchend", () => {
                joystick.active = false;
                joystick.vx = 0;
                joystick.vy = 0;
            });

            function resetGame() {
                player.x = 0;
                player.y = 0;
                player.hp = 100;
                player.level = 1;
                player.xp = 0;
                player.xpNeeded = 12;
                gameTimer = 0;
                secondsTimer = 0;
                currentWorld = 1;
                difficultyMultiplier = 1.0;
                score = 0;
                pendingUpgrades = 0;
                activeBossRef = null;
                bossArena.active = false;
                adReviveUsedInCurrentRun = false;
                spawnWarnings.length = 0;

                Object.keys(WEAPONS).forEach((k) => {
                    WEAPONS[k].level = k === "Dart" ? 1 : 0;
                    if (WEAPONS[k].timer) WEAPONS[k].timer = 0;
                    if (k === "Dart") {
                        WEAPONS[k].baseCd = 42;
                        WEAPONS[k].dmg = 20;
                    }
                    if (k === "Orbit") {
                        WEAPONS[k].speed = 0.04;
                        WEAPONS[k].size = 9;
                    }
                    if (k === "Aura") WEAPONS[k].radius = 70;
                    if (k === "Cross") {
                        WEAPONS[k].baseCd = 60;
                        WEAPONS[k].size = 5;
                    }
                    if (k === "Blast") WEAPONS[k].baseCd = 85;
                    if (k === "Beam") WEAPONS[k].baseCd = 150;
                    if (k === "Bounce") WEAPONS[k].baseCd = 75;
                    if (k === "Pulse") WEAPONS[k].baseCd = 60;
                    if (k === "Rain") WEAPONS[k].baseCd = 28;
                    if (k === "Mine") WEAPONS[k].baseCd = 95;
                    if (k === "Chain") WEAPONS[k].baseCd = 80;
                    if (k === "Spiral") WEAPONS[k].baseCd = 65;
                    if (k === "Vortex") WEAPONS[k].baseCd = 120;
                    if (k === "Echo") WEAPONS[k].baseCd = 180;
                    if (k === "Crystal") WEAPONS[k].baseCd = 85;
                });

                enemyPool.clear();
                bulletPool.clear();
                enemyBulletPool.clear();
                xpPool.clear();
                effectPool.clear();
                floatingTextPool.clear();
                worldPortal.active = false;
                activeLightnings = [];
                document.getElementById("pause-menu-btn").style.display =
                    "none";
            }

            function spawnWave() {
                if (gameState !== STATES.PLAYING) return;
                let thirtySecSteps = Math.floor(gameTimer / 30);
                let baseRate = 43 - currentWorld * 3;
                let spawnInterval = Math.max(
                    8,
                    baseRate * Math.pow(0.82, thirtySecSteps),
                );

                if (Math.random() * 100 < 100 / spawnInterval) {
                    let angle = Math.random() * Math.PI * 2,
                        dist = Math.max(canvas.width, canvas.height) / 2 + 60;
                    let rx = player.x + Math.cos(angle) * dist,
                        ry = player.y + Math.sin(angle) * dist;
                    let typeRand = Math.random(),
                        variant = "normal";
                    if (currentWorld >= 2 && typeRand > 0.82) {
                        variant =
                            currentWorld >= 3 && typeRand > 0.92
                                ? "shooter"
                                : "exploder";
                    }
                    enemyPool.get()?.spawn(rx, ry, variant);
                }
            }

            function triggerPortalPhase() {
                gameState = STATES.PORTAL_OPEN;
                sfx.playWarning();
                for (let i = 0; i < enemyPool.activeCount; i++) {
                    let e = enemyPool.objects[i];
                    effectPool.get()?.spawn(e.x, e.y, 25, 10, "enemy_exp");
                }
                enemyPool.clear();
                for (let i = 0; i < xpPool.activeCount; i++) addXP(1);
                xpPool.clear();
                worldPortal.spawn(
                    player.x + (Math.random() - 0.5) * 180,
                    player.y + (Math.random() - 0.5) * 180,
                );
            }

            function prepareBossSpawn() {
                triggerYandexGameplayStop(); // Остановка фазы текущего уровня перед босс-ивент интро
                gameState = STATES.BOSS_SPAWN;
                bossSpawnTimer = 90;
                bossArena.x = player.x;
                bossArena.y = player.y;
                bossArena.active = true;

                player.x = bossArena.x - 220;
                player.y = bossArena.y - 220;

                enemyPool.clear();
                enemyBulletPool.clear();
                spawnWarnings.length = 0;

                if (currentWorld === 1)
                    enemyPool
                        .get()
                        ?.spawn(bossArena.x, bossArena.y, "boss_rat_king");
                else if (currentWorld === 2)
                    enemyPool
                        .get()
                        ?.spawn(bossArena.x, bossArena.y, "boss_antivirus");
                else
                    enemyPool
                        .get()
                        ?.spawn(bossArena.x, bossArena.y, "boss_kernel_panic");
            }

            let bossDeathDelay = false;

            function handleBossDeath() {
                enemyBulletPool.clear();
                activeBossRef = null;
                spawnWarnings.length = 0;
                sfx.playLevelUp();

                const healAmount = 30;
                player.hp = Math.min(player.hp + healAmount, player.maxHp);
                floatingTextPool
                    .get()
                    ?.spawn(
                        player.x,
                        player.y - 30,
                        `+${healAmount} HP`,
                        "#00ff00",
                    );

                triggerYandexGameplayStop(); // Прохождение босса (уровень завершен)
                bossDeathDelay = true;
                setTimeout(() => {
                    bossDeathDelay = false;
                    worldPortal.spawn(bossArena.x, bossArena.y);
                }, 1000);

                if (currentWorld === 1) {
                    unlockWeapon("Pulse");
                    toasts.push({
                        title: "ВИНЛОК ИЗГНАН",
                        desc: "Разблокирован Импульс [Pulse] и доступ во 2 сектор!",
                        timer: 240,
                    });
                } else if (currentWorld === 2) {
                    unlockWeapon("Beam");
                    toasts.push({
                        title: "АНТИВИРУС ДЕАКТИВИРОВАН",
                        desc: "Разблокирован Лазер [Beam] и доступ в 3 сектор!",
                        timer: 240,
                    });
                } else {
                    unlockWeapon("Chain");
                    toasts.push({
                        title: "СБОЙ ЯДРА УСТРАНЕН",
                        desc: "Разблокирована Цепная молния [Chain]!",
                        timer: 240,
                    });
                }
            }

            function goToNextWorld() {
                triggerYandexGameplayStop(); // Остановка игрового процесса завершенного уровня
                currentWorld++;
                difficultyMultiplier *= 1.45;
                gameTimer = 0;
                secondsTimer = 0;
                gameState = STATES.PLAYING;
                bossArena.active = false;
                spawnWarnings.length = 0;
                sfx.playLevelUp();

                enemyPool.clear();
                bulletPool.clear();
                enemyBulletPool.clear();
                effectPool.clear();
                activeLightnings = [];
                triggerYandexGameplayStart(); // Новый запуск игрового процесса
            }

            function initMobilePauseButton() {
                const pauseBtn = document.getElementById("pause-button");
                if (!pauseBtn) return;
                const isMobile = window.innerWidth < 1024;
                if (!isMobile) {
                    pauseBtn.style.display = "none";
                    if (gameState === STATES.PAUSED) {
                        gameState = previousState;
                        lastTime = performance.now();
                    }
                }
            }

            function startReviveExplosionAnimation() {
                reviveAnimationActive = true;
                reviveAnimationProgress = 0;
                gameState = STATES.REVIVING;

                const explosionCount = 12;
                for (let i = 0; i < explosionCount; i++) {
                    setTimeout(() => {
                        if (!reviveAnimationActive) return;
                        const angle = Math.random() * Math.PI * 2;
                        const dist = 100 + Math.random() * 350;
                        const x = player.x + Math.cos(angle) * dist;
                        const y = player.y + Math.sin(angle) * dist;

                        effectPool
                            .get()
                            ?.spawn(x, y, 80 + Math.random() * 60, 20, "blast");
                        sfx.playExplode();

                        for (let j = 0; j < 5; j++) {
                            const sx = x + (Math.random() - 0.5) * 60;
                            const sy = y + (Math.random() - 0.5) * 60;
                            effectPool
                                .get()
                                ?.spawn(
                                    sx,
                                    sy,
                                    20 + Math.random() * 30,
                                    10,
                                    "enemy_exp",
                                );
                        }
                    }, i * 80);
                }

                setTimeout(() => {
                    if (!reviveAnimationActive) return;

                    for (let i = 0; i < enemyPool.activeCount; i++) {
                        const enemy = enemyPool.objects[i];
                        if (enemy.active) {
                            effectPool
                                .get()
                                ?.spawn(enemy.x, enemy.y, 50, 15, "blast");
                            effectPool
                                .get()
                                ?.spawn(enemy.x, enemy.y, 30, 10, "enemy_exp");
                            enemyPool.release(enemy);
                        }
                    }

                    enemyBulletPool.clear();
                    reviveAnimationActive = false;
                    player.hp = 100;

                    effectPool
                        .get()
                        ?.spawn(player.x, player.y, 350, 45, "pulse_wave");
                    sfx.playLevelUp();

                    floatingTextPool
                        .get()
                        ?.spawn(
                            player.x,
                            player.y - 50,
                            "ЯДРО ВОССТАНОВЛЕНО!",
                            "#00ffff",
                        );
                    document.getElementById("gameover-screen").style.display =
                        "none";
                    gameState = STATES.PLAYING;
                    lastTime = performance.now();
                    resumeMusic();
                    triggerYandexGameplayStart(); // Возобновление игры после показа возрождающей рекламы
                }, 1500);
            }

            function updatePauseButtonVisibility() {
                const pauseBtn = document.getElementById("pause-button");
                const isVisible =
                    (gameState === STATES.PLAYING ||
                        gameState === STATES.PORTAL_OPEN ||
                        gameState === STATES.BOSS_SPAWN ||
                        gameState === STATES.BOSS_FIGHT ||
                        gameState === STATES.PAUSED) &&
                    window.innerWidth < 1024;
                pauseBtn.style.display = isVisible ? "flex" : "none";
            }

            const pauseBtnElement = document.getElementById("pause-button");
            if (pauseBtnElement) {
                pauseBtnElement.addEventListener("click", (e) => {
                    e.stopPropagation();
                    if (
                        gameState === STATES.PLAYING ||
                        gameState === STATES.PORTAL_OPEN ||
                        gameState === STATES.BOSS_SPAWN ||
                        gameState === STATES.BOSS_FIGHT
                    ) {
                        pauseGame(); // Пауза игрового процесса
                    } else if (gameState === STATES.PAUSED) {
                        resumeGame(); // Снятие с паузы
                    }
                });
            }

            initMobilePauseButton();
            window.addEventListener("resize", initMobilePauseButton);

            initYandexSDK();
            startPreloader();

            requestAnimationFrame((timestamp) => {
                lastTime = timestamp;
                gameLoop(timestamp);
            });
        </script>
    </body>
</html>
