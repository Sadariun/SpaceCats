                    upgrade: (w) => {
                        w.baseCd -= 6;
                    },
                },
                Echo: {
                    name: "Echo",
                    level: 0,
                    baseCd: 180,
                    cd: 180,
                    timer: 0,
                    fire: () => {
                        if (WEAPONS.Echo.level === 0) return;
                        let owned = Object.keys(WEAPONS).filter(
                            (k) =>
                                WEAPONS[k].level > 0 &&
                                WEAPONS[k].fire &&
                                k !== "Echo",
                        );
                        if (owned.length === 0) return;
                        let count = WEAPONS.Echo.level === 5 ? 4 : 1;
                        for (let i = 0; i < count; i++) {
                            setTimeout(() => {
                                if (
                                    [STATES.PLAYING, STATES.BOSS_FIGHT].indexOf(
                                        gameState,
                                    ) === -1
                                )
                                    return;
                                let key =
                                    owned[
                                        Math.floor(Math.random() * owned.length)
                                    ];
                                WEAPONS[key].fire();
                            }, i * 300);
                        }
                    },
                    upgrade: (w) => {
                        w.baseCd -= 10;
                    },
                },
                Crystal: {
                    name: "Crystal",
                    level: 0,
                    baseCd: 85,
                    cd: 85,
                    timer: 0,
                    fire: () => {
                        if (WEAPONS.Crystal.level === 0) return;
                        let target = getClosestEnemy();
                        let a = target
                            ? Math.atan2(
                                  target.y - player.y,
                                  target.x - player.x,
                              )
                            : Math.random() * Math.PI * 2;
                        bulletPool
                            .get()
                            ?.spawn(
                                player.x,
                                player.y,
                                Math.cos(a) * 3.4,
                                Math.sin(a) * 3.4,
                                10,
                                true,
                                100,
                                "crystal",
                                WEAPONS.Crystal.level,
                                35 + WEAPONS.Crystal.level * 10,
                            );
                    },
                    upgrade: (w) => {
                        w.baseCd -= 4;
                    },
                },
            };

            function renderBackground() {
                if (bossArena.active) {
                    ctx.strokeStyle = "#FF0000";
                    ctx.lineWidth = 4;
                    let half = bossArena.size / 2;
                    ctx.strokeRect(
                        bossArena.x - half - camera.x,
                        bossArena.y - half - camera.y,
                        bossArena.size,
                        bossArena.size,
                    );
                    ctx.strokeStyle = "rgba(255, 0, 0, 0.02)";
                    ctx.lineWidth = 1;
                    for (let i = -half; i <= half; i += 40) {
                        ctx.beginPath();
                        ctx.moveTo(
                            bossArena.x + i - camera.x,
                            bossArena.y - half - camera.y,
                        );
                        ctx.lineTo(
                            bossArena.x + i - camera.x,
                            bossArena.y + half - camera.y,
                        );
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(
                            bossArena.x - half - camera.x,
                            bossArena.y + i - camera.y,
                        );
                        ctx.lineTo(
                            bossArena.x + half - camera.x,
                            bossArena.y + i - camera.y,
                        );
                        ctx.stroke();
                    }
                    return;
                }

                const patternKey = `world${currentWorld}`;
                const pattern = ASSETS.patterns[patternKey];

                if (pattern) {
                    ctx.save();
                    ctx.translate(-camera.x, -camera.y);
                    ctx.fillStyle = pattern;
                    ctx.fillRect(
                        camera.x,
                        camera.y,
                        canvas.width / zoom,
                        canvas.height / zoom,
                    );
                    ctx.restore();
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.02)";
                    ctx.lineWidth = 1;
                    let gridSize = 100;
                    let sX = Math.floor(camera.x / gridSize) * gridSize;
                    let sY = Math.floor(camera.y / gridSize) * gridSize;
                    for (
                        let x = sX - gridSize;
                        x < sX + canvas.width / zoom + gridSize;
                        x += gridSize
                    ) {
                        ctx.beginPath();
                        ctx.moveTo(x - camera.x, 0);
                        ctx.lineTo(x - camera.x, canvas.height / zoom);
                        ctx.stroke();
                    }
                    for (
                        let y = sY - gridSize;
                        y < sY + canvas.height / zoom + gridSize;
                        y += gridSize
                    ) {
                        ctx.beginPath();
                        ctx.moveTo(0, y - camera.y);
                        ctx.lineTo(canvas.width / zoom, y - camera.y);
                        ctx.stroke();
                    }
                } else {
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
                    ctx.lineWidth = 1;
                    let gridSize = 60 + ((currentWorld * 8) % 32);
                    let sX =
                        Math.floor((camera.x - canvas.width / 2) / gridSize) *
                        gridSize;
                    let sY =
                        Math.floor((camera.y - canvas.height / 2) / gridSize) *
                        gridSize;
                    for (
                        let x = sX;
                        x < sX + canvas.width + gridSize * 2;
                        x += gridSize
                    ) {
                        ctx.beginPath();
                        ctx.moveTo(x - camera.x, 0);
                        ctx.lineTo(x - camera.x, canvas.height);
                        ctx.stroke();
                    }
                    for (
                        let y = sY;
                        y < sY + canvas.height + gridSize * 2;
                        y += gridSize
                    ) {
                        ctx.beginPath();
                        ctx.moveTo(0, y - camera.y);
                        ctx.lineTo(canvas.width, y - camera.y);
                        ctx.stroke();
                    }
                }
            }

            function drawLightnings() {
                activeLightnings.forEach((lt) => {
                    let alpha = lt.life / lt.maxLife;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = 3.5 * alpha;
                    ctx.beginPath();
                    let p0 = lt.points[0];
                    ctx.moveTo(p0.x - camera.x, p0.y - camera.y);
                    for (let i = 1; i < lt.points.length; i++) {
                        let pStart = lt.points[i - 1],
                            pEnd = lt.points[i];
                        let dx = pEnd.x - pStart.x,
                            dy = pEnd.y - pStart.y;
                        let dist = Math.hypot(dx, dy),
                            segments = Math.max(3, Math.floor(dist / 22));
                        for (let s = 1; s < segments; s++) {
                            let t = s / segments,
                                px = pStart.x + dx * t,
                                py = pStart.y + dy * t;
                            let nx = -dy / dist,
                                ny = dx / dist,
                                offset = (Math.random() - 0.5) * 14;
                            ctx.lineTo(
                                px + nx * offset - camera.x,
                                py + ny * offset - camera.y,
                            );
                        }
                        ctx.lineTo(pEnd.x - camera.x, pEnd.y - camera.y);
                    }
                    ctx.stroke();
                });
            }

            function renderUI() {
                ctx.fillStyle = "#FFFFFF";
                ctx.fillText(
                    `УРОВЕНЬ: ${player.level} ${pendingUpgrades > 0 ? `(+${pendingUpgrades})` : ""}`,
                    20,
                    48,
                );
                ctx.fillText(`СЧЕТ: ${score}`, 20, 66);

                // Отрисовка шкалы прогресса до портала
                const barWidth = 200;
                const barHeight = 8;
                const barX = canvas.width / 2 - barWidth / 2;
                const barY = 20;
                const progress = Math.min(gameTimer / WORLD_DURATION, 1);

                ctx.strokeStyle = "#FFFFFF";
                ctx.strokeRect(barX, barY, barWidth, barHeight);
                ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                ctx.fillRect(barX, barY, barWidth, barHeight);
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(barX, barY, barWidth * progress, barHeight);
                ctx.textAlign = "center";
                ctx.font = "10px monospace";
                ctx.fillText("ПРОГРЕСС СЕТИ", canvas.width / 2, barY - 6);

                let bw = 180,
                    bh = 8,
                    bx = canvas.width / 2 - bw / 2,
                    by = canvas.height - 25;
                ctx.strokeStyle = "#FFFFFF";
                ctx.strokeRect(bx, by, bw, bh);
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(
                    bx,
                    by,
                    bw * (Math.max(0, player.hp) / player.maxHp),
                    bh,
                );

                if (
                    gameState === STATES.BOSS_FIGHT &&
                    activeBossRef &&
                    activeBossRef.active
                ) {
                    let bbw = canvas.width * 0.6,
                        bbh = 12,
                        bbx = canvas.width / 2 - bbw / 2,
                        bby = 55;
                    ctx.fillStyle = "rgba(255,0,0,0.15)";
                    ctx.fillRect(bbx, bby, bbw, bbh);
                    ctx.fillStyle = "#FF0000";
                    ctx.fillRect(
                        bbx,
                        bby,
                        bbw *
                            (Math.max(0, activeBossRef.hp) /
                                activeBossRef.maxHp),
                        bbh,
                    );
                    ctx.strokeStyle = "#FFFFFF";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(bbx, bby, bbw, bbh);
                    ctx.fillStyle = "#FFFFFF";
                    ctx.font = "11px monospace";
                    ctx.fillText(activeBossRef.name, canvas.width / 2, bby - 6);
                }

                if (worldPortal.active) {
                    let dx = worldPortal.x - player.x,
                        dy = worldPortal.y - player.y;
                    if (Math.hypot(dx, dy) > canvas.width / 2.4) {
                        let angle = Math.atan2(dy, dx);
                        let ax = canvas.width / 2 + Math.cos(angle) * 140,
                            ay = canvas.height / 2 + Math.sin(angle) * 140;
                        ctx.fillStyle = "#FFFFFF";
                        ctx.beginPath();
                        ctx.moveTo(ax, ay);
                        ctx.lineTo(
                            ax - 12 * Math.cos(angle - 0.38),
                            ay - 12 * Math.sin(angle - 0.38),
                        );
                        ctx.lineTo(
                            ax - 12 * Math.cos(angle + 0.38),
                            ay - 12 * Math.sin(angle + 0.38),
                        );
                        ctx.closePath();
                        ctx.fill();
                    }
                }

                if (joystick.active) {
                    ctx.strokeStyle = "rgba(255,255,255,0.08)";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(
                        joystick.startX,
                        joystick.startY,
                        45,
                        0,
                        Math.PI * 2,
                    );
                    ctx.stroke();
                    ctx.fillStyle = "rgba(255,255,255,0.25)";
                    ctx.beginPath();
                    ctx.arc(
                        joystick.currentX,
                        joystick.currentY,
                        15,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fill();
                }

                for (let i = toasts.length - 1; i >= 0; i--) {
                    let t = toasts[i];
                    t.timer--;
                    if (t.timer <= 0) {
                        toasts.splice(i, 1);
                        continue;
                    }
                    let alpha = Math.min(1, t.timer / 25);
                    ctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.9})`;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = 1.5;
                    let tw = 260,
                        th = 46,
                        tx = canvas.width - tw - 15,
                        ty = 20 + i * (th + 10);
                    ctx.fillRect(tx, ty, tw, th);
                    ctx.strokeRect(tx, ty, tw, th);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.font = "bold 11px monospace";
                    ctx.textAlign = "left";
                    ctx.fillText(t.title, tx + 12, ty + 18);
                    ctx.font = "10px monospace";
                    ctx.fillStyle = `rgba(180, 180, 180, ${alpha})`;
                    ctx.fillText(t.desc, tx + 12, ty + 33);
                }
            }

            function gameTick() {
                if (
                    pendingUpgrades > 0 &&
                    gameState !== STATES.UPGRADE &&
                    gameState !== STATES.BOSS_SPAWN &&
                    gameState !== STATES.PAUSED
                ) {
                    triggerUpgradeScreen();
                }

                if (
                    gameState !== STATES.UPGRADE &&
                    gameState !== STATES.BOSS_SPAWN &&
                    gameState !== STATES.PAUSED
                ) {
                    secondsTimer++;
                    if (secondsTimer >= 60) {
                        secondsTimer = 0;
                        if (gameState === STATES.PLAYING) {
                            gameTimer++;
                            if (gameTimer >= WORLD_DURATION)
                                triggerPortalPhase();
                        }
                    }

                    player.update();
                    Object.keys(WEAPONS).forEach((k) => {
                        let w = WEAPONS[k];
                        if (w.level > 0) {
                            if (w.fire) {
                                w.timer++;
                                if (w.timer >= w.cd) {
                                    w.timer = 0;
                                    w.fire();
                                }
                            }
                            if (w.update) w.update();
                        }
                    });

                    enemyPool.updateAll();
                    bulletPool.updateAll();
                    enemyBulletPool.updateAll();
                    xpPool.updateAll();
                    effectPool.updateAll();
                    floatingTextPool.updateAll();
                    worldPortal.update();
                    if (!bossArena.active) spawnWave();

                    for (let i = activeLightnings.length - 1; i >= 0; i--) {
                        activeLightnings[i].life--;
                        if (activeLightnings[i].life <= 0)
                            activeLightnings.splice(i, 1);
                    }
                }

                if (gameState === STATES.BOSS_SPAWN) {
                    bossSpawnTimer--;
                    if (bossSpawnTimer <= 0) gameState = STATES.BOSS_FIGHT;
                }
            }

            function gameLoop(currentTime) {
                if (gameState === STATES.LOADING) {
                    requestAnimationFrame(gameLoop);
                    return;
                }

                let elapsed = currentTime - lastTime;
                if (elapsed > 1000) elapsed = STEP;
                lastTime = currentTime;
                dtAccumulator += elapsed;

                while (dtAccumulator >= STEP) {
                    if (
                        [
                            STATES.PLAYING,
                            STATES.PORTAL_OPEN,
                            STATES.BOSS_SPAWN,
                            STATES.BOSS_FIGHT,
                            STATES.UPGRADE,
                            STATES.PAUSED,
                        ].indexOf(gameState) !== -1
                    ) {
                        gameTick();
                    }
                    dtAccumulator -= STEP;
                }

                ctx.fillStyle = "#1A1A1A";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (
                    [
                        STATES.PLAYING,
                        STATES.PORTAL_OPEN,
                        STATES.BOSS_SPAWN,
                        STATES.BOSS_FIGHT,
                        STATES.UPGRADE,
                        STATES.PAUSED,
                    ].indexOf(gameState) !== -1
                ) {
                    camera.x +=
                        (player.x - canvas.width / zoom / 2 - camera.x) * 0.1;
                    camera.y +=
                        (player.y - canvas.height / zoom / 2 - camera.y) * 0.1;

                    ctx.save();
                    ctx.scale(zoom, zoom);
                    renderBackground();
                    xpPool.drawAll();
                    worldPortal.draw();
                    player.draw();
                    enemyPool.drawAll();
                    bulletPool.drawAll();
                    enemyBulletPool.drawAll();
                    effectPool.drawAll();
                    if (WEAPONS.Orbit.draw) WEAPONS.Orbit.draw();
                    if (WEAPONS.Aura.draw) WEAPONS.Aura.draw();
                    drawLightnings();
                    floatingTextPool.drawAll();
                    ctx.restore();

                    renderUI();

                    if (gameState === STATES.BOSS_SPAWN) {
                        if (bossSpawnTimer > 76) {
                            ctx.fillStyle = "#FFFFFF";
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                        ctx.fillStyle = "rgba(26,26,26,0.95)";
                        ctx.fillRect(
                            0,
                            canvas.height / 2 - 60,
                            canvas.width,
                            120,
                        );
                        ctx.fillStyle = "#FF0000";
                        ctx.font = "bold 20px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText(
                            "ВХОД НА АРЕНУ СМЕРТИ",
                            canvas.width / 2,
                            canvas.height / 2 - 12,
                        );
                        ctx.fillStyle = "#FFFFFF";
                        ctx.font = "15px monospace";
                        ctx.fillText(
                            activeBossRef ? activeBossRef.name : "",
                            canvas.width / 2,
                            canvas.height / 2 + 24,
                        );
                    }

                    if (gameState === STATES.PAUSED) {
                        ctx.fillStyle = "rgba(26, 26, 26, 0.82)";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = "#FFFFFF";
                        ctx.textAlign = "center";
                        ctx.font = "bold 26px monospace";
                        ctx.fillText(
                            "ПАУЗА СИСТЕМЫ",
                            canvas.width / 2,
                            canvas.height / 2 - 15,
                        );
                        ctx.fillStyle = "rgba(255,255,255,0.4)";
                        ctx.font = "12px monospace";
                        ctx.fillText(
                            "НАЖМИТЕ ESC ИЛИ P ДЛЯ ПРОДОЛЖЕНИЯ",
                            canvas.width / 2,
                            canvas.height / 2 + 20,
                        );
                    }
                } else if (gameState === STATES.MENU) {
                    ctx.fillStyle = "#FFFFFF";
                    ctx.font = "28px monospace";
                    ctx.textAlign = "center";
                    ctx.fillText(
                        "WHITE VS RED",
                        canvas.width / 2,
                        canvas.height / 2 - 120,
                    );
                    ctx.font = "12px monospace";
                    ctx.fillText(
                        "КЛИКНИТЕ ЭКРАН ДЛЯ ЗАПУСКА",
                        canvas.width / 2,
                        canvas.height / 2 - 85,
                    );
                    ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                    ctx.font = "11px monospace";
                    ctx.fillText(
                        "— МЕТА-ДОСТИЖЕНИЯ И РАЗБЛОКИРОВКА —",
                        canvas.width / 2,
                        canvas.height / 2 - 35,
                    );

                    let startY = canvas.height / 2 - 10;
                    ACHIEVEMENT_LIST.forEach((ach, index) => {
                        let isUnl =
                            unlockedWeapons.includes(ach.id) ||
                            ach.id === "Секреты";
                        ctx.fillStyle = isUnl
                            ? "#FFFFFF"
                            : "rgba(255, 255, 255, 0.15)";
                        ctx.textAlign = index % 2 === 0 ? "right" : "left";
                        let posX =
                            canvas.width / 2 + (index % 2 === 0 ? -20 : 20);
                        let posY = startY + Math.floor(index / 2) * 22;
                        let symbol = isUnl ? "✔" : "🔒";
                        ctx.fillText(
                            `${symbol} ${ach.cond} -> ${ach.id}`,
                            posX,
                            posY,
                        );
                    });
                } else if (gameState === STATES.GAMEOVER) {
                    ctx.fillStyle = "#FF0000";
                    ctx.font = "34px monospace";
                    ctx.textAlign = "center";
                    ctx.fillText(
                        "АННИГИЛЯЦИЯ",
                        canvas.width / 2,
                        canvas.height / 2 - 15,
                    );
                    ctx.fillStyle = "#FFFFFF";
                    ctx.font = "14px monospace";
                    ctx.fillText(
                        `Пройдено миров: ${currentWorld} | Очки: ${score}`,
                        canvas.width / 2,
                        canvas.height / 2 + 25,
                    );
                    ctx.fillText(
                        "Кликни для перезапуска",
                        canvas.width / 2,
                        canvas.height / 2 + 65,
                    );
                }

                requestAnimationFrame(gameLoop);
            }

            const keys = {};
            window.addEventListener("keydown", (e) => {
                keys[e.code] = true;
                if (e.code === "Escape" || e.code === "KeyP") {
                    if (
                        [
                            STATES.PLAYING,
                            STATES.PORTAL_OPEN,
                            STATES.BOSS_SPAWN,
                            STATES.BOSS_FIGHT,
                        ].includes(gameState)
                    ) {
                        previousState = gameState;
                        gameState = STATES.PAUSED;
                    } else if (gameState === STATES.PAUSED) {
                        gameState = previousState;
                    }
                }
            });
            window.addEventListener("keyup", (e) => (keys[e.code] = false));

            const joystick = {
                active: false,
                startX: 0,
                startY: 0,
                currentX: 0,
                currentY: 0,
                vx: 0,
                vy: 0,
            };
            window.addEventListener(
                "touchstart",
                (e) => {
                    if (
                        [
                            STATES.PLAYING,
                            STATES.PORTAL_OPEN,
                            STATES.BOSS_FIGHT,
                        ].indexOf(gameState) === -1
                    )
                        return;
                    const touch = e.touches[0];
                    if (touch.clientX < canvas.width / 2) {
                        joystick.active = true;
                        joystick.startX = touch.clientX;
                        joystick.startY = touch.clientY;
                        joystick.currentX = touch.clientX;
                        joystick.currentY = touch.clientY;
                    }
                },
                { passive: true },
            );

            window.addEventListener(
                "touchmove",
                (e) => {
                    if (!joystick.active) return;
                    const touch = e.touches[0];
                    joystick.currentX = touch.clientX;
                    joystick.currentY = touch.clientY;
                    let dx = joystick.currentX - joystick.startX,
                        dy = joystick.currentY - joystick.startY;
                    let dist = Math.hypot(dx, dy),
                        maxDist = 50;
                    if (dist > maxDist) {
                        dx = (dx / dist) * maxDist;
                        dy = (dy / dist) * maxDist;
                    }
                    joystick.vx = dx / maxDist;
                    joystick.vy = dy / maxDist;
                },
                { passive: true },
            );

            window.addEventListener("touchend", () => {
                joystick.active = false;
                joystick.vx = 0;
                joystick.vy = 0;
            });

            function resetGame() {
                player.x = 0;
                player.y = 0;
                player.hp = 100;
                player.level = 1;
                player.xp = 0;
                player.xpNeeded = 12;
                gameTimer = 0;
                secondsTimer = 0;
                currentWorld = 1;
                difficultyMultiplier = 1.0;
                score = 0;
                pendingUpgrades = 0;
                activeBossRef = null;
                bossArena.active = false;

                Object.keys(WEAPONS).forEach((k) => {
                    WEAPONS[k].level = k === "Dart" ? 1 : 0;
                    if (WEAPONS[k].timer) WEAPONS[k].timer = 0;
                    if (k === "Dart") {
                        WEAPONS[k].baseCd = 42;
                        WEAPONS[k].dmg = 20;
                    }
                    if (k === "Orbit") {
                        WEAPONS[k].speed = 0.04;
                        WEAPONS[k].size = 9;
                    }
                    if (k === "Aura") WEAPONS[k].radius = 70;
                    if (k === "Cross") {
                        WEAPONS[k].baseCd = 60;
                        WEAPONS[k].size = 5;
                    }
                    if (k === "Blast") WEAPONS[k].baseCd = 85;
                    if (k === "Beam") WEAPONS[k].baseCd = 150;
                    if (k === "Bounce") WEAPONS[k].baseCd = 75;
                    if (k === "Pulse") WEAPONS[k].baseCd = 60;
                    if (k === "Rain") WEAPONS[k].baseCd = 28;
                    if (k === "Mine") WEAPONS[k].baseCd = 95;
                    if (k === "Chain") WEAPONS[k].baseCd = 80;
                    if (k === "Spiral") WEAPONS[k].baseCd = 65;
                    if (k === "Vortex") WEAPONS[k].baseCd = 120;
                    if (k === "Echo") WEAPONS[k].baseCd = 180;
                    if (k === "Crystal") WEAPONS[k].baseCd = 85;
                });
                syncWeaponSpecs();

                enemyPool.clear();
                bulletPool.clear();
                enemyBulletPool.clear();
                xpPool.clear();
                effectPool.clear();
                floatingTextPool.clear();
                worldPortal.active = false;
                activeLightnings = [];
            }

            function spawnWave() {
                if (gameState !== STATES.PLAYING) return;
                let thirtySecSteps = Math.floor(gameTimer / 30);
                let baseRate = 45;
                let spawnInterval = Math.max(
                    8,
                    baseRate * Math.pow(0.82, thirtySecSteps),
                );

                if (Math.random() * 100 < 100 / spawnInterval) {
                    let angle = Math.random() * Math.PI * 2,
                        dist = Math.max(canvas.width, canvas.height) / 2 + 60;
                    let rx = player.x + Math.cos(angle) * dist,
                        ry = player.y + Math.sin(angle) * dist;
                    let typeRand = Math.random(),
                        variant = "normal";
                    if (currentWorld >= 2 && typeRand > 0.82)
                        variant =
                            currentWorld >= 3 && typeRand > 0.92
                                ? "shooter"
                                : "exploder";
                    enemyPool.get()?.spawn(rx, ry, variant);
                }
            }

            function triggerPortalPhase() {
                gameState = STATES.PORTAL_OPEN;
                for (let i = 0; i < enemyPool.activeCount; i++) {
                    let e = enemyPool.objects[i];
                    effectPool.get()?.spawn(e.x, e.y, 25, 10, "enemy_exp");
                }
                enemyPool.clear();
                for (let i = 0; i < xpPool.activeCount; i++) addXP(1);
                xpPool.clear();
                worldPortal.spawn(
                    player.x + (Math.random() - 0.5) * 180,
                    player.y + (Math.random() - 0.5) * 180,
                );
            }

            function prepareBossSpawn() {
                gameState = STATES.BOSS_SPAWN;
                bossSpawnTimer = 90;
                bossArena.x = player.x;
                bossArena.y = player.y;
                bossArena.active = true;
                enemyPool.clear();
                enemyBulletPool.clear();
                enemyPool.get()?.spawn(bossArena.x, bossArena.y - 120, "boss");
            }

            function handleBossDeath() {
                enemyBulletPool.clear();
                activeBossRef = null;
                unlockWeapon("Chain");
                worldPortal.spawn(bossArena.x, bossArena.y);
            }

            function goToNextWorld() {
                currentWorld++;
                difficultyMultiplier *= 1.5;
                gameTimer = 0;
                secondsTimer = 0;
                gameState = STATES.PLAYING;
                bossArena.active = false;
                if (currentWorld >= 2) unlockWeapon("Pulse");
                if (currentWorld >= 3) unlockWeapon("Beam");
                enemyPool.clear();
                bulletPool.clear();
                enemyBulletPool.clear();
                effectPool.clear();
                activeLightnings = [];
            }

            function loadMetaProgress() {
                try {
                    let saved = localStorage.getItem("wvr_unlocked_weapons");
                    if (saved) {
                        let parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) {
                            parsed.forEach((w) => {
                                if (!unlockedWeapons.includes(w) && WEAPONS[w])
                                    unlockedWeapons.push(w);
                            });
                        }
                    }
                } catch (e) {}
            }

            // Инициализация загрузки картинок
            loadMetaProgress();
            preloadImages();

            // Запускаем игровой цикл
            requestAnimationFrame((timestamp) => {
                lastTime = timestamp;
                gameLoop(timestamp);
            });
        </script>
    </body>
</html>
