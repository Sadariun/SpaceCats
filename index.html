            function getClosestEnemy() {
                let target = null;
                let minDist = Infinity;
                for (let i = 0; i < enemyPool.activeCount; i++) {
                    let e = enemyPool.objects[i];
                    let d = Math.hypot(e.x - player.x, e.y - player.y);
                    if (d < minDist) {
                        minDist = d;
                        target = e;
                    }
                }
                return target;
            }

            function syncWeaponSpecs() {
                Object.keys(WEAPONS).forEach((k) => {
                    let w = WEAPONS[k];
                    if (w.baseCd) w.cd = w.baseCd;
                });
            }

            // --- СИСТЕМА ИКОНОК ---
            function renderWeaponIcon(canvasElement, type) {
                const iconCtx = canvasElement.getContext("2d");
                iconCtx.clearRect(0, 0, 80, 80);
                iconCtx.strokeStyle = "#FFFFFF";
                iconCtx.fillStyle = "#FFFFFF";
                iconCtx.lineWidth = 2.5;
                iconCtx.translate(40, 40);

                if (type === "Dart") {
                    iconCtx.beginPath();
                    iconCtx.moveTo(-15, 15);
                    iconCtx.lineTo(15, -15);
                    iconCtx.lineTo(3, -15);
                    iconCtx.moveTo(15, -15);
                    iconCtx.lineTo(15, -3);
                    iconCtx.stroke();
                } else if (type === "Orbit") {
                    iconCtx.beginPath();
                    iconCtx.arc(0, 0, 20, 0, Math.PI * 2);
                    iconCtx.setLineDash([4, 4]);
                    iconCtx.stroke();
                    iconCtx.setLineDash([]);
                    iconCtx.fillRect(16, -4, 8, 8);
                    iconCtx.fillRect(-24, -4, 8, 8);
                } else if (type === "Aura") {
                    iconCtx.beginPath();
                    iconCtx.arc(0, 0, 10, 0, Math.PI * 2);
                    iconCtx.stroke();
                    iconCtx.beginPath();
                    iconCtx.arc(0, 0, 22, 0, Math.PI * 2);
                    iconCtx.stroke();
                    iconCtx.beginPath();
                    iconCtx.arc(0, 0, 32, 0, Math.PI * 2);
                    iconCtx.stroke();
                } else if (type === "Cross") {
                    iconCtx.beginPath();
                    iconCtx.moveTo(-20, 0);
                    iconCtx.lineTo(20, 0);
                    iconCtx.moveTo(0, -20);
                    iconCtx.lineTo(0, 20);
                    iconCtx.stroke();
                } else if (type === "Blast") {
                    for (let i = 0; i < 8; i++) {
                        iconCtx.rotate(Math.PI / 4);
                        iconCtx.beginPath();
                        iconCtx.moveTo(0, 8);
                        iconCtx.lineTo(0, 24);
                        iconCtx.stroke();
                    }
                } else if (type === "Beam") {
                    iconCtx.fillRect(-30, -5, 60, 10);
                    iconCtx.clearRect(-26, -1, 52, 2);
                } else if (type === "Bounce") {
                    iconCtx.beginPath();
                    iconCtx.moveTo(-25, -15);
                    iconCtx.lineTo(-12, 15);
                    iconCtx.lineTo(12, -15);
                    iconCtx.lineTo(25, 15);
                    iconCtx.stroke();
                } else if (type === "Pulse") {
                    iconCtx.beginPath();
                    iconCtx.arc(0, 0, 8, 0, Math.PI * 2);
                    iconCtx.stroke();
                    iconCtx.beginPath();
                    iconCtx.arc(0, 0, 20, 0, Math.PI * 2);
                    iconCtx.stroke();
                    iconCtx.beginPath();
                    iconCtx.arc(0, 0, 32, 0, Math.PI * 2);
                    iconCtx.stroke();
                } else if (type === "Rain") {
                    for (let i = 0; i < 3; i++) {
                        let ox = (i - 1) * 15;
                        iconCtx.beginPath();
                        iconCtx.moveTo(ox, -20);
                        iconCtx.lineTo(ox, 2);
                        iconCtx.stroke();
                        iconCtx.beginPath();
                        iconCtx.moveTo(ox - 6, 12);
                        iconCtx.lineTo(ox - 6, 22);
                        iconCtx.stroke();
                    }
                } else if (type === "Mine") {
                    iconCtx.beginPath();
                    iconCtx.moveTo(0, -18);
                    iconCtx.lineTo(16, 12);
                    iconCtx.lineTo(-16, 12);
                    iconCtx.closePath();
                    iconCtx.stroke();
                    iconCtx.beginPath();
                    iconCtx.arc(0, 3, 4, 0, Math.PI * 2);
                    iconCtx.fill();
                } else if (type === "Chain") {
                    iconCtx.beginPath();
                    iconCtx.moveTo(-10, -25);
                    iconCtx.lineTo(10, -3);
                    iconCtx.lineTo(-5, 2);
                    iconCtx.lineTo(15, 25);
                    iconCtx.stroke();
                } else if (type === "Spiral") {
                    iconCtx.beginPath();
                    for (let a = 0; a < Math.PI * 5; a += 0.1) {
                        let r = a * 1.9;
                        let x = Math.cos(a) * r;
                        let y = Math.sin(a) * r;
                        if (a === 0) iconCtx.moveTo(x, y);
                        else iconCtx.lineTo(x, y);
                    }
                    iconCtx.stroke();
                } else if (type === "Vortex") {
                    for (let i = 0; i < 3; i++) {
                        iconCtx.rotate((Math.PI * 2) / 3);
                        iconCtx.beginPath();
                        iconCtx.arc(10, 0, 16, 0, Math.PI, true);
                        iconCtx.stroke();
                    }
                } else if (type === "Echo") {
                    iconCtx.strokeRect(-22, -22, 22, 22);
                    iconCtx.strokeRect(-4, -4, 22, 22);
                } else if (type === "Crystal") {
                    iconCtx.beginPath();
                    iconCtx.moveTo(0, -25);
                    iconCtx.lineTo(16, 0);
                    iconCtx.lineTo(0, 25);
                    iconCtx.lineTo(-16, 0);
                    iconCtx.closePath();
                    iconCtx.stroke();
                    iconCtx.beginPath();
                    iconCtx.moveTo(0, -12);
                    iconCtx.lineTo(8, 0);
                    iconCtx.lineTo(0, 12);
                    iconCtx.lineTo(-8, 0);
                    iconCtx.closePath();
                    iconCtx.stroke();
                }
                iconCtx.setTransform(1, 0, 0, 1, 0, 0);
            }

            function triggerUpgradeScreen() {
                previousState = gameState;
                gameState = STATES.UPGRADE;
                const screen = document.getElementById("upgrade-screen");
                const container = document.getElementById("options-container");
                container.innerHTML = "";
                screen.style.display = "block";

                let options = [];
                Object.keys(WEAPONS).forEach((key) => {
                    if (!unlockedWeapons.includes(key)) return;
                    let w = WEAPONS[key];
                    if (w.level < 5) {
                        options.push({
                            key: key,
                            weapon: w,
                            isNew: w.level === 0,
                            action: () => {
                                w.level++;
                                if (w.upgrade) w.upgrade(w);
                                syncWeaponSpecs();
                                screen.style.display = "none";
                                pendingUpgrades--;
                                gameState = previousState;
                                checkArsenalProgression();
                            },
                        });
                    }
                });

                options.sort(() => Math.random() - 0.5);
                let choices = options.slice(0, 3);
                if (choices.length === 0) {
                    pendingUpgrades = 0;
                    gameState = previousState;
                    screen.style.display = "none";
                    return;
                }

                choices.forEach((opt) => {
                    let card = document.createElement("div");
                    card.className = "upgrade-option";
                    let iconCont = document.createElement("div");
                    iconCont.className = "icon-container";
                    let iconCanvas = document.createElement("canvas");
                    iconCanvas.className = "icon-canvas";
                    iconCanvas.width = 80;
                    iconCanvas.height = 80;
                    iconCont.appendChild(iconCanvas);

                    let badge = document.createElement("div");
                    badge.className = "level-badge";
                    badge.innerText = opt.isNew
                        ? "NEW"
                        : `➔ ${opt.weapon.level + 1}`;
                    iconCont.appendChild(badge);

                    let nameLabel = document.createElement("div");
                    nameLabel.className = "weapon-name";
                    nameLabel.innerText = opt.weapon.name;
                    card.appendChild(iconCont);
                    card.appendChild(nameLabel);
                    card.onclick = opt.action;
                    container.appendChild(card);
                    renderWeaponIcon(iconCanvas, opt.key);
                });
            }

            // --- УПРАВЛЕНИЕ ИГРОВЫМИ ЦИКЛАМИ ---
            function resetGame() {
                player.x = 0;
                player.y = 0;
                player.hp = 100;
                player.level = 1;
                player.xp = 0;
                player.xpNeeded = 12;
                gameTimer = 0;
                secondsTimer = 0;
                currentWorld = 1;
                difficultyMultiplier = 1.0;
                score = 0;
                pendingUpgrades = 0;
                activeBossRef = null;
                bossArena.active = false;

                Object.keys(WEAPONS).forEach((k) => {
                    WEAPONS[k].level = k === "Dart" ? 1 : 0;
                    if (WEAPONS[k].timer) WEAPONS[k].timer = 0;
                    if (k === "Dart") {
                        WEAPONS[k].baseCd = 42;
                        WEAPONS[k].dmg = 20;
                    }
                    if (k === "Orbit") {
                        WEAPONS[k].speed = 0.04;
                        WEAPONS[k].size = 9;
                    }
                    if (k === "Aura") WEAPONS[k].radius = 70;
                    if (k === "Cross") {
                        WEAPONS[k].baseCd = 60;
                        WEAPONS[k].size = 5;
                    }
                    if (k === "Blast") WEAPONS[k].baseCd = 85;
                    if (k === "Beam") WEAPONS[k].baseCd = 150;
                    if (k === "Bounce") WEAPONS[k].baseCd = 75;
                    if (k === "Pulse") WEAPONS[k].baseCd = 60;
                    if (k === "Rain") WEAPONS[k].baseCd = 28;
                    if (k === "Mine") WEAPONS[k].baseCd = 95;
                    if (k === "Chain") WEAPONS[k].baseCd = 80;
                    if (k === "Spiral") WEAPONS[k].baseCd = 65;
                    if (k === "Vortex") WEAPONS[k].baseCd = 120;
                    if (k === "Echo") WEAPONS[k].baseCd = 180;
                    if (k === "Crystal") WEAPONS[k].baseCd = 85;
                });
                syncWeaponSpecs();

                enemyPool.clear();
                bulletPool.clear();
                enemyBulletPool.clear();
                xpPool.clear();
                effectPool.clear();
                worldPortal.active = false;
            }

            function spawnWave() {
                if (gameState !== STATES.PLAYING) return;
                let thirtySecSteps = Math.floor(gameTimer / 30);
                let baseRate = 45;
                let spawnInterval = Math.max(
                    8,
                    baseRate * Math.pow(0.82, thirtySecSteps),
                );

                if (Math.random() * 100 < 100 / spawnInterval) {
                    let angle = Math.random() * Math.PI * 2;
                    let dist = Math.max(canvas.width, canvas.height) / 2 + 60;
                    let rx = player.x + Math.cos(angle) * dist;
                    let ry = player.y + Math.sin(angle) * dist;
                    let typeRand = Math.random();
                    let variant = "normal";

                    if (currentWorld >= 2 && typeRand > 0.82) {
                        variant =
                            currentWorld >= 3 && typeRand > 0.92
                                ? "shooter"
                                : "exploder";
                    }
                    enemyPool.get()?.spawn(rx, ry, variant);
                }
            }

            function triggerPortalPhase() {
                gameState = STATES.PORTAL_OPEN;
                for (let i = 0; i < enemyPool.activeCount; i++) {
                    let e = enemyPool.objects[i];
                    effectPool.get()?.spawn(e.x, e.y, 25, 10, "enemy_exp");
                }
                enemyPool.clear();
                for (let i = 0; i < xpPool.activeCount; i++) addXP(1);
                xpPool.clear();
                worldPortal.spawn(
                    player.x + (Math.random() - 0.5) * 180,
                    player.y + (Math.random() - 0.5) * 180,
                );
            }

            function prepareBossSpawn() {
                gameState = STATES.BOSS_SPAWN;
                bossSpawnTimer = 90;

                // Создаем и замыкаем арену вокруг игрока
                bossArena.x = player.x;
                bossArena.y = player.y;
                bossArena.active = true;

                enemyPool.clear();
                enemyBulletPool.clear();
                // Спавним одного супер-босса в центре новой арены
                enemyPool.get()?.spawn(bossArena.x, bossArena.y - 120, "boss");
            }

            function handleBossDeath() {
                enemyBulletPool.clear();
                activeBossRef = null;
                unlockWeapon("Chain");
                // Портал появляется строго в центре арены
                worldPortal.spawn(bossArena.x, bossArena.y);
            }

            function goToNextWorld() {
                currentWorld++;
                difficultyMultiplier *= 1.5;
                gameTimer = 0;
                secondsTimer = 0;
                gameState = STATES.PLAYING;
                bossArena.active = false; // Открываем мир заново

                if (currentWorld >= 2) unlockWeapon("Pulse");
                if (currentWorld >= 3) unlockWeapon("Beam");

                enemyPool.clear();
                bulletPool.clear();
                enemyBulletPool.clear();
                effectPool.clear();
            }

            // --- ОТРИСОВКА СТРУКТУРНЫХ ЭЛЕМЕНТОВ ---
            function renderBackground() {
                // Отрисовка неоновых стен арены босса
                if (bossArena.active) {
                    ctx.strokeStyle = "#FF0000";
                    ctx.lineWidth = 4;
                    let half = bossArena.size / 2;
                    ctx.strokeRect(
                        bossArena.x - half - camera.x,
                        bossArena.y - half - camera.y,
                        bossArena.size,
                        bossArena.size,
                    );

                    // Фоновая сетка внутри арены
                    ctx.strokeStyle = "rgba(255, 0, 0, 0.02)";
                    ctx.lineWidth = 1;
                    for (let i = -half; i <= half; i += 40) {
                        ctx.beginPath();
                        ctx.moveTo(
                            bossArena.x + i - camera.x,
                            bossArena.y - half - camera.y,
                        );
                        ctx.lineTo(
                            bossArena.x + i - camera.x,
                            bossArena.y + half - camera.y,
                        );
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(
                            bossArena.x - half - camera.x,
                            bossArena.y + i - camera.y,
                        );
                        ctx.lineTo(
                            bossArena.x + half - camera.x,
                            bossArena.y + i - camera.y,
                        );
                        ctx.stroke();
                    }
                    return;
                }

                // Сетка свободного мира
                ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
                ctx.lineWidth = 1;
                let gridSize = 60 + ((currentWorld * 8) % 32);
                let sX =
                    Math.floor((camera.x - canvas.width / 2) / gridSize) *
                    gridSize;
                let sY =
                    Math.floor((camera.y - canvas.height / 2) / gridSize) *
                    gridSize;
                for (
                    let x = sX;
                    x < sX + canvas.width + gridSize * 2;
                    x += gridSize
                ) {
                    ctx.beginPath();
                    ctx.moveTo(x - camera.x, 0);
                    ctx.lineTo(x - camera.x, canvas.height);
                    ctx.stroke();
                }
                for (
                    let y = sY;
                    y < sY + canvas.height + gridSize * 2;
                    y += gridSize
                ) {
                    ctx.beginPath();
                    ctx.moveTo(0, y - camera.y);
                    ctx.lineTo(canvas.width, y - camera.y);
                    ctx.stroke();
                }
            }

            function renderUI() {
                ctx.fillStyle = "rgba(255,255,255,0.12)";
                ctx.fillRect(0, 0, canvas.width, 4);
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(
                    0,
                    0,
                    canvas.width * (player.xp / player.xpNeeded),
                    4,
                );

                ctx.fillStyle = "#FFFFFF";
                ctx.font = "13px monospace";
                ctx.textAlign = "left";
                ctx.fillText(`МИР: ${currentWorld}`, 20, 30);
                ctx.fillText(
                    `УРОВЕНЬ: ${player.level} ${pendingUpgrades > 0 ? `(+${pendingUpgrades})` : ""}`,
                    20,
                    48,
                );
                ctx.fillText(`СЧЕТ: ${score}`, 20, 66);

                let rem = Math.max(0, WORLD_DURATION - gameTimer);
                let m = Math.floor(rem / 60);
                let s = rem % 60;
                ctx.textAlign = "center";
                if (
                    gameState === STATES.BOSS_FIGHT ||
                    gameState === STATES.BOSS_SPAWN
                ) {
                    ctx.fillStyle = "#FF0000";
                    ctx.fillText(
                        `КЛЮЧЕВОЙ ПРОТОКОЛ ОЧИСТКИ`,
                        canvas.width / 2,
                        30,
                    );
                } else {
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillText(
                        `ДО ПОРТАЛА: ${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`,
                        canvas.width / 2,
                        30,
                    );
                }

                let bw = 180;
                let bh = 8;
                let bx = canvas.width / 2 - bw / 2;
                let by = canvas.height - 25;
                ctx.strokeStyle = "#FFFFFF";
                ctx.strokeRect(bx, by, bw, bh);
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(
                    bx,
                    by,
                    bw * (Math.max(0, player.hp) / player.maxHp),
                    bh,
                );

                if (
                    gameState === STATES.BOSS_FIGHT &&
                    activeBossRef &&
                    activeBossRef.active
                ) {
                    let bbw = canvas.width * 0.6;
                    let bbh = 12;
                    let bbx = canvas.width / 2 - bbw / 2;
                    let bby = 55;
                    ctx.fillStyle = "rgba(255,0,0,0.15)";
                    ctx.fillRect(bbx, bby, bbw, bbh);
                    ctx.fillStyle = "#FF0000";
                    ctx.fillRect(
                        bbx,
                        bby,
                        bbw *
                            (Math.max(0, activeBossRef.hp) /
                                activeBossRef.maxHp),
                        bbh,
                    );
                    ctx.strokeStyle = "#FFFFFF";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(bbx, bby, bbw, bbh);
                    ctx.fillStyle = "#FFFFFF";
                    ctx.font = "11px monospace";
                    ctx.fillText(activeBossRef.name, canvas.width / 2, bby - 6);
                }

                if (worldPortal.active) {
                    let dx = worldPortal.x - player.x;
                    let dy = worldPortal.y - player.y;
                    if (Math.hypot(dx, dy) > canvas.width / 2.4) {
                        let angle = Math.atan2(dy, dx);
                        let ax = canvas.width / 2 + Math.cos(angle) * 140;
                        let ay = canvas.height / 2 + Math.sin(angle) * 140;
                        ctx.fillStyle = "#FFFFFF";
                        ctx.beginPath();
                        ctx.moveTo(ax, ay);
                        ctx.lineTo(
                            ax - 12 * Math.cos(angle - 0.38),
                            ay - 12 * Math.sin(angle - 0.38),
                        );
                        ctx.lineTo(
                            ax - 12 * Math.cos(angle + 0.38),
                            ay - 12 * Math.sin(angle + 0.38),
                        );
                        ctx.closePath();
                        ctx.fill();
                    }
                }

                if (joystick.active) {
                    ctx.strokeStyle = "rgba(255,255,255,0.08)";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(
                        joystick.startX,
                        joystick.startY,
                        45,
                        0,
                        Math.PI * 2,
                    );
                    ctx.stroke();
                    ctx.fillStyle = "rgba(255,255,255,0.25)";
                    ctx.beginPath();
                    ctx.arc(
                        joystick.currentX,
                        joystick.currentY,
                        15,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fill();
                }

                for (let i = toasts.length - 1; i >= 0; i--) {
                    let t = toasts[i];
                    t.timer--;
                    if (t.timer <= 0) {
                        toasts.splice(i, 1);
                        continue;
                    }
                    let alpha = Math.min(1, t.timer / 25);
                    ctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.9})`;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = 1.5;
                    let tw = 260;
                    let th = 46;
                    let tx = canvas.width - tw - 15;
                    let ty = 20 + i * (th + 10);
                    ctx.fillRect(tx, ty, tw, th);
                    ctx.strokeRect(tx, ty, tw, th);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.font = "bold 11px monospace";
                    ctx.textAlign = "left";
                    ctx.fillText(t.title, tx + 12, ty + 18);
                    ctx.font = "10px monospace";
                    ctx.fillStyle = `rgba(180, 180, 180, ${alpha})`;
                    ctx.fillText(t.desc, tx + 12, ty + 33);
                }
            }

            // --- ГЛАВНЫЙ ИГРОВОЙ ЦИКЛ ---
            function gameLoop() {
                ctx.fillStyle = "#1A1A1A";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (
                    [
                        STATES.PLAYING,
                        STATES.PORTAL_OPEN,
                        STATES.BOSS_SPAWN,
                        STATES.BOSS_FIGHT,
                        STATES.UPGRADE,
                        STATES.PAUSED,
                    ].indexOf(gameState) !== -1
                ) {
                    if (
                        pendingUpgrades > 0 &&
                        gameState !== STATES.UPGRADE &&
                        gameState !== STATES.BOSS_SPAWN &&
                        gameState !== STATES.PAUSED
                    ) {
                        triggerUpgradeScreen();
                    }

                    if (
                        gameState !== STATES.UPGRADE &&
                        gameState !== STATES.BOSS_SPAWN &&
                        gameState !== STATES.PAUSED
                    ) {
                        secondsTimer++;
                        if (secondsTimer >= 60) {
                            secondsTimer = 0;
                            if (gameState === STATES.PLAYING) {
                                gameTimer++;
                                if (gameTimer >= WORLD_DURATION)
                                    triggerPortalPhase();
                            }
                        }

                        player.update();

                        Object.keys(WEAPONS).forEach((k) => {
                            let w = WEAPONS[k];
                            if (w.level > 0) {
                                if (w.fire) {
                                    w.timer++;
                                    if (w.timer >= w.cd) {
                                        w.timer = 0;
                                        w.fire();
                                    }
                                }
                                if (w.update) w.update();
                            }
                        });

                        enemyPool.updateAll();
                        bulletPool.updateAll();
                        enemyBulletPool.updateAll();
                        xpPool.updateAll();
                        effectPool.updateAll();
                        worldPortal.update();
                        if (!bossArena.active) spawnWave();
                    }

                    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
                    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

                    renderBackground();
                    xpPool.drawAll();
                    worldPortal.draw();
                    player.draw();
                    enemyPool.drawAll();
                    bulletPool.drawAll();
                    enemyBulletPool.drawAll();
                    effectPool.drawAll();
                    renderUI();

                    if (gameState === STATES.BOSS_SPAWN) {
                        bossSpawnTimer--;
                        if (bossSpawnTimer > 76) {
                            ctx.fillStyle = "#FFFFFF";
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                        ctx.fillStyle = "rgba(26,26,26,0.95)";
                        ctx.fillRect(
                            0,
                            canvas.height / 2 - 60,
                            canvas.width,
                            120,
                        );
                        ctx.fillStyle = "#FF0000";
                        ctx.font = "bold 20px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText(
                            "ВХОД НА АРЕНУ СМЕРТИ",
                            canvas.width / 2,
                            canvas.height / 2 - 12,
                        );
                        ctx.fillStyle = "#FFFFFF";
                        ctx.font = "15px monospace";
                        ctx.fillText(
                            activeBossRef ? activeBossRef.name : "",
                            canvas.width / 2,
                            canvas.height / 2 + 24,
                        );
                        if (bossSpawnTimer <= 0) gameState = STATES.BOSS_FIGHT;
                    }

                    if (gameState === STATES.PAUSED) {
                        ctx.fillStyle = "rgba(26, 26, 26, 0.82)";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = "#FFFFFF";
                        ctx.textAlign = "center";
                        ctx.font = "bold 26px monospace";
                        ctx.fillText(
                            "ПАУЗА СИСТЕМЫ",
                            canvas.width / 2,
                            canvas.height / 2 - 15,
                        );
                        ctx.fillStyle = "rgba(255,255,255,0.4)";
                        ctx.font = "12px monospace";
                        ctx.fillText(
                            "НАЖМИТЕ ESC ИЛИ P ДЛЯ ПРОДОЛЖЕНИЯ",
                            canvas.width / 2,
                            canvas.height / 2 + 20,
                        );
                    }
                } else if (gameState === STATES.MENU) {
                    ctx.fillStyle = "#FFFFFF";
                    ctx.font = "28px monospace";
                    ctx.textAlign = "center";
                    ctx.fillText(
                        "WHITE VS RED",
                        canvas.width / 2,
                        canvas.height / 2 - 120,
                    );
                    ctx.font = "12px monospace";
                    ctx.fillText(
                        "КЛИКНИТЕ ЭКРАН ДЛЯ ЗАПУСКА",
                        canvas.width / 2,
                        canvas.height / 2 - 85,
                    );

                    ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                    ctx.font = "11px monospace";
                    ctx.fillText(
                        "— МЕТА-ДОСТИЖЕНИЯ И РАЗБЛОКИРОВКА —",
                        canvas.width / 2,
                        canvas.height / 2 - 35,
                    );

                    let startY = canvas.height / 2 - 10;
                    ACHIEVEMENT_LIST.forEach((ach, index) => {
                        let isUnl = unlockedWeapons.includes(ach.id);
                        ctx.fillStyle = isUnl
                            ? "#FFFFFF"
                            : "rgba(255, 255, 255, 0.15)";
                        ctx.textAlign = index % 2 === 0 ? "right" : "left";
                        let posX =
                            canvas.width / 2 + (index % 2 === 0 ? -20 : 20);
                        let posY = startY + Math.floor(index / 2) * 22;
                        let symbol = isUnl ? "✔" : "🔒";
                        ctx.fillText(
                            `${symbol} ${ach.cond} -> ${ach.id}`,
                            posX,
                            posY,
                        );
                    });
                } else if (gameState === STATES.GAMEOVER) {
                    ctx.fillStyle = "#FF0000";
                    ctx.font = "34px monospace";
                    ctx.textAlign = "center";
                    ctx.fillText(
                        "АННИГИЛЯЦИЯ",
                        canvas.width / 2,
                        canvas.height / 2 - 15,
                    );
                    ctx.fillStyle = "#FFFFFF";
                    ctx.font = "14px monospace";
                    ctx.fillText(
                        `Пройдено миров: ${currentWorld} | Очки: ${score}`,
                        canvas.width / 2,
                        canvas.height / 2 + 25,
                    );
                    ctx.fillText(
                        "Кликни для перезапуска",
                        canvas.width / 2,
                        canvas.height / 2 + 65,
                    );
                }

                requestAnimationFrame(gameLoop);
            }

            loadMetaProgress();
            gameLoop();
        </script>
    </body>
</html>
