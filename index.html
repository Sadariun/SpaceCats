                                this.laserAngle + (3 * Math.PI) / 2,
                            ];
                            angles.forEach((angle) => {
                                ctx.save();
                                ctx.rotate(angle);
                                if (this.antivirusPhase === 13) {
                                    ctx.strokeStyle =
                                        "rgba(255, 255, 255, 0.45)";
                                    ctx.lineWidth = 1.5;
                                    ctx.setLineDash([4, 6]);
                                    ctx.beginPath();
                                    ctx.moveTo(0, 0);
                                    ctx.lineTo(600, 0);
                                    ctx.stroke();
                                } else {
                                    ctx.strokeStyle = "rgba(255, 0, 0, 0.4)";
                                    ctx.lineWidth =
                                        12 + Math.sin(Date.now() / 20) * 4;
                                    ctx.beginPath();
                                    ctx.moveTo(0, 0);
                                    ctx.lineTo(600, 0);
                                    ctx.stroke();

                                    ctx.strokeStyle = "#FFFFFF";
                                    ctx.lineWidth = 3;
                                    ctx.beginPath();
                                    ctx.moveTo(0, 0);
                                    ctx.lineTo(600, 0);
                                    ctx.stroke();
                                }
                                ctx.restore();
                            });
                            ctx.restore();
                        }

                        if (
                            (this.antivirusPhase === 2 ||
                                this.antivirusPhase === 12) &&
                            this.gridCells
                        ) {
                            ctx.save();
                            for (let i = 0; i < 36; i++) {
                                let cell = this.gridCells[i];
                                if (cell.state > 0) {
                                    let cellX =
                                        bossArena.x -
                                        300 +
                                        (i % 6) * 100 -
                                        camera.x;
                                    let cellY =
                                        bossArena.y -
                                        300 +
                                        Math.floor(i / 6) * 100 -
                                        camera.y;

                                    if (cell.state === 1) {
                                        ctx.fillStyle =
                                            "rgba(255, 165, 0, 0.15)";
                                        ctx.fillRect(cellX, cellY, 100, 100);
                                        ctx.strokeStyle =
                                            "rgba(255, 165, 0, 0.5)";
                                        ctx.lineWidth = 1.5;
                                        ctx.strokeRect(cellX, cellY, 100, 100);
                                    } else if (cell.state === 2) {
                                        ctx.fillStyle = "rgba(255, 0, 0, 0.45)";
                                        ctx.fillRect(cellX, cellY, 100, 100);
                                        ctx.strokeStyle = "#FF0000";
                                        ctx.lineWidth = 2.5;
                                        ctx.strokeRect(cellX, cellY, 100, 100);
                                    }
                                }
                            }
                            ctx.restore();
                        }

                        ctx.save();
                        ctx.translate(drawX, drawY);
                        ctx.rotate(this.visualAngle);
                        ctx.strokeStyle = isFlashing ? "#ffffff" : "#ff3333";
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                        ctx.stroke();

                        ctx.rotate(-this.visualAngle * 1.8);
                        ctx.strokeStyle = "#ffffff";
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(
                            -this.radius * 0.5,
                            -this.radius * 0.5,
                            this.radius,
                            this.radius,
                        );
                        ctx.restore();
                        ctx.restore();
                        return;
                    }

                    if (this.variant === "boss_kernel_panic") {
                        if (
                            (this.antivirusPhase === 2 ||
                                this.antivirusPhase === 12) &&
                            this.panicSectors
                        ) {
                            this.panicSectors.forEach((sector) => {
                                let cellVal =
                                    sector.val -
                                    (sector.isHoriz ? camera.y : camera.x);
                                ctx.save();
                                if (sector.active) {
                                    ctx.fillStyle = "rgba(255, 0, 255, 0.35)";
                                    if (sector.isHoriz)
                                        ctx.fillRect(
                                            0,
                                            cellVal - 22,
                                            canvas.width,
                                            44,
                                        );
                                    else
                                        ctx.fillRect(
                                            cellVal - 22,
                                            0,
                                            44,
                                            canvas.height,
                                        );

                                    ctx.strokeStyle = "#FF00FF";
                                    ctx.lineWidth = 3;
                                    ctx.beginPath();
                                    if (sector.isHoriz) {
                                        ctx.moveTo(0, cellVal);
                                        ctx.lineTo(canvas.width, cellVal);
                                    } else {
                                        ctx.moveTo(cellVal, 0);
                                        ctx.lineTo(cellVal, canvas.height);
                                    }
                                    ctx.stroke();
                                } else {
                                    ctx.strokeStyle = "rgba(255, 0, 255, 0.4)";
                                    ctx.lineWidth = 1.5;
                                    ctx.setLineDash([5, 5]);
                                    ctx.beginPath();
                                    if (sector.isHoriz) {
                                        ctx.moveTo(0, cellVal);
                                        ctx.lineTo(canvas.width, cellVal);
                                    } else {
                                        ctx.moveTo(cellVal, 0);
                                        ctx.lineTo(cellVal, canvas.height);
                                    }
                                    ctx.stroke();
                                }
                                ctx.restore();
                            });
                        }

                        ctx.save();
                        ctx.translate(drawX, drawY);
                        ctx.rotate(this.visualAngle);
                        ctx.strokeStyle = isFlashing ? "#ffffff" : "#ff00ff";
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        for (let i = 0; i < 6; i++) {
                            let angle = (Math.PI / 3) * i;
                            let px = Math.cos(angle) * this.radius;
                            let py = Math.sin(angle) * this.radius;
                            if (i === 0) ctx.moveTo(px, py);
                            else ctx.lineTo(px, py);
                        }
                        ctx.closePath();
                        ctx.stroke();
                        ctx.restore();
                        ctx.restore();
                        return;
                    }

                    if (this.variant === "panic_decoy") {
                        ctx.save();
                        ctx.translate(drawX, drawY);
                        ctx.rotate(Date.now() * 0.005);
                        ctx.strokeStyle = "#ff00ff";
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.moveTo(0, -this.radius);
                        ctx.lineTo(this.radius, this.radius);
                        ctx.lineTo(-this.radius, this.radius);
                        ctx.closePath();
                        ctx.stroke();
                        ctx.restore();
                        ctx.restore();
                        return;
                    }

                    if (this.variant === "normal") {
                        ctx.save();
                        ctx.translate(drawX, drawY);
                        ctx.rotate(Date.now() * 0.002);
                        ctx.lineWidth = 2;
                        ctx.strokeRect(
                            -this.radius,
                            -this.radius,
                            this.radius * 2,
                            this.radius * 2,
                        );
                        ctx.restore();
                    } else if (this.variant === "shooter") {
                        ctx.save();
                        ctx.translate(drawX, drawY);
                        let dx = player.x - this.x;
                        let dy = player.y - this.y;
                        ctx.rotate(Math.atan2(dy, dx));
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(this.radius * 1.5, 0);
                        ctx.lineTo(-this.radius, -this.radius);
                        ctx.lineTo(-this.radius, this.radius);
                        ctx.closePath();
                        ctx.stroke();
                        ctx.restore();
                    } else if (this.variant === "exploder") {
                        ctx.save();
                        ctx.translate(drawX, drawY);
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(0, 0, this.radius * 0.7, 0, Math.PI * 2);
                        ctx.stroke();
                        for (let i = 0; i < 8; i++) {
                            let a = (Math.PI / 4) * i + Date.now() * 0.003;
                            ctx.beginPath();
                            ctx.moveTo(
                                Math.cos(a) * (this.radius * 0.7),
                                Math.sin(a) * (this.radius * 0.7),
                            );
                            ctx.lineTo(
                                Math.cos(a) * this.radius,
                                Math.sin(a) * this.radius,
                            );
                            ctx.stroke();
                        }
                        ctx.restore();
                    }
                    ctx.restore();
                }
            }

            class Bullet {
                constructor() {
                    this.active = false;
                    this.poolIndex = -1;
                }
                spawn(
                    x,
                    y,
                    vx,
                    vy,
                    size,
                    isPlayer,
                    life,
                    type = "normal",
                    extra = 0,
                    damage = 20,
                ) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.radius = size;
                    this.isPlayer = isPlayer;
                    this.life = life;
                    this.maxLife = life;
                    this.type = type;
                    this.extra = extra;
                    this.damage = damage;
                    this.active = true;
                    this.pierce = 1;
                }
                update() {
                    if (
                        [
                            "normal",
                            "bounce",
                            "boomerang",
                            "crystal",
                            "dart",
                            "cross",
                            "rain",
                        ].includes(this.type)
                    ) {
                        this.x += this.vx;
                        this.y += this.vy;
                    }
                    if (this.type === "boomerang") {
                        if (this.life === Math.floor(this.maxLife / 2)) {
                            this.vx = -this.vx;
                            this.vy = -this.vy;
                        }
                    } else if (this.type === "spiral") {
                        this.extra += 0.06;
                        let radiusFactor = (this.maxLife - this.life) * 2.8;
                        this.x = player.x + Math.cos(this.extra) * radiusFactor;
                        this.y = player.y + Math.sin(this.extra) * radiusFactor;
                    }

                    this.life--;
                    if (this.life <= 0) {
                        if (this.type === "crystal") this.shatter();
                        removeBullet(this);
                        return;
                    }

                    if (this.isPlayer) {
                        let rangeSize = this.radius + 32;
                        let range = new QT_Rectangle(
                            this.x,
                            this.y,
                            rangeSize,
                            rangeSize,
                        );
                        let candidateEnemies = [];
                        enemyQuadTree.query(range, candidateEnemies);

                        for (let i = 0; i < candidateEnemies.length; i++) {
                            let enemy = candidateEnemies[i];
                            if (!enemy.active) continue;

                            let dx = enemy.x - this.x;
                            let dy = enemy.y - this.y;
                            let minDist = enemy.radius + this.radius;

                            if (dx * dx + dy * dy < minDist * minDist) {
                                damageEnemy(enemy, this.damage);
                                if (this.type === "crystal") {
                                    this.shatter();
                                    removeBullet(this);
                                    return;
                                }
                                if (this.type === "bounce" && this.extra > 0) {
                                    this.extra--;

                                    let bounceRange = new QT_Rectangle(
                                        this.x,
                                        this.y,
                                        250,
                                        250,
                                    );
                                    let candidatesForBounce = [];
                                    enemyQuadTree.query(
                                        bounceRange,
                                        candidatesForBounce,
                                    );

                                    let next = null,
                                        bestDSqr = 250 * 250;
                                    for (
                                        let j = 0;
                                        j < candidatesForBounce.length;
                                        j++
                                    ) {
                                        let e = candidatesForBounce[j];
                                        if (e !== enemy && e.active) {
                                            let bDx = e.x - this.x;
                                            let bDy = e.y - this.y;
                                            let dSqr = bDx * bDx + bDy * bDy;
                                            if (dSqr < bestDSqr) {
                                                bestDSqr = dSqr;
                                                next = e;
                                            }
                                        }
                                    }
                                    if (next) {
                                        let a = Math.atan2(
                                            next.y - this.y,
                                            next.x - this.x,
                                        );
                                        let spd = Math.hypot(this.vx, this.vy);
                                        this.vx = Math.cos(a) * spd;
                                        this.vy = Math.sin(a) * spd;
                                    } else {
                                        this.vx = -this.vx;
                                        this.vy = -this.vy;
                                    }
                                } else {
                                    if (this.type !== "crystal") {
                                        this.pierce--;
                                        if (this.pierce <= 0) {
                                            removeBullet(this);
                                            return;
                                        }
                                    }
                                }
                                break;
                            }
                        }
                    } else {
                        let dx = player.x - this.x;
                        let dy = player.y - this.y;
                        let minDist = player.radius + this.radius;
                        if (dx * dx + dy * dy < minDist * minDist) {
                            player.hp -= 6;
                            sfx.playHit();
                            removeBullet(this);
                            if (player.hp <= 0) handlePlayerDeath();
                        }
                    }
                }
                shatter() {
                    let frags = this.extra === 5 ? 12 : 3 + this.extra;
                    for (let j = 0; j < frags; j++) {
                        let fa = ((Math.PI * 2) / frags) * j;
                        let b = bulletPool.get();
                        if (b) {
                            b.spawn(
                                this.x,
                                this.y,
                                Math.cos(fa) * 5.5,
                                Math.sin(fa) * 5.5,
                                3,
                                true,
                                45,
                                "normal",
                                0,
                                16,
                            );
                            if (this.extra === 5) b.pierce = 2;
                        }
                    }
                }
                draw() {
                    ctx.save();
                    ctx.shadowBlur = 10;

                    if (!this.isPlayer) {
                        ctx.shadowColor = "#ff3333";
                        ctx.fillStyle = "#ff3333";
                        ctx.beginPath();
                        ctx.arc(
                            this.x - camera.x,
                            this.y - camera.y,
                            this.radius,
                            0,
                            Math.PI * 2,
                        );
                        ctx.fill();
                        ctx.restore();
                        return;
                    }

                    ctx.shadowColor = "#00ffff";
                    ctx.strokeStyle = "#00ffff";
                    ctx.fillStyle = "#00ffff";
                    ctx.lineWidth = 2;

                    let rot = 0;
                    if (this.type === "dart")
                        rot = Math.atan2(this.vy, this.vx);
                    if (this.type === "spiral") rot = this.extra * 2.5;

                    ctx.translate(this.x - camera.x, this.y - camera.y);
                    if (rot !== 0) ctx.rotate(rot);

                    if (this.type === "mine") {
                        ctx.beginPath();
                        ctx.moveTo(0, -this.radius);
                        ctx.lineTo(this.radius, this.radius);
                        ctx.lineTo(-this.radius, this.radius);
                        ctx.closePath();
                        ctx.fill();
                    } else if (this.type === "dart") {
                        ctx.beginPath();
                        ctx.moveTo(this.radius * 1.5, 0);
                        ctx.lineTo(-this.radius, -this.radius * 0.8);
                        ctx.lineTo(-this.radius * 0.4, 0);
                        ctx.lineTo(-this.radius, this.radius * 0.8);
                        ctx.closePath();
                        ctx.fill();
                    } else if (
                        this.type === "cross" ||
                        this.type === "boomerang"
                    ) {
                        ctx.beginPath();
                        ctx.moveTo(-this.radius, 0);
                        ctx.lineTo(this.radius, 0);
                        ctx.moveTo(0, -this.radius);
                        ctx.lineTo(0, this.radius);
                        ctx.stroke();
                    } else if (this.type === "bounce") {
                        ctx.strokeRect(
                            -this.radius,
                            -this.radius,
                            this.radius * 2,
                            this.radius * 2,
                        );
                    } else if (this.type === "rain") {
                        ctx.beginPath();
                        ctx.moveTo(0, -this.radius * 1.5);
                        ctx.lineTo(0, this.radius * 1.5);
                        ctx.stroke();
                    } else if (this.type === "crystal") {
                        ctx.beginPath();
                        ctx.moveTo(0, -this.radius * 1.3);
                        ctx.lineTo(this.radius * 0.8, 0);
                        ctx.lineTo(0, this.radius * 1.3);
                        ctx.lineTo(-this.radius * 0.8, 0);
                        ctx.closePath();
                        ctx.fill();
                    } else if (this.type === "spiral") {
                        ctx.strokeRect(
                            -this.radius,
                            -this.radius,
                            this.radius * 2,
                            this.radius * 2,
                        );
                    } else {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }

            function removeBullet(b) {
                if (b.isPlayer) bulletPool.release(b);
                else enemyBulletPool.release(b);
            }

            class XP {
                constructor() {
                    this.active = false;
                    this.poolIndex = -1;
                }
                spawn(x, y) {
                    this.x = x;
                    this.y = y;
                    this.radius = 3.5;
                    this.active = true;
                }
                update() {
                    let dx = player.x - this.x,
                        dy = player.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < 150) {
                        this.x += (dx / dist) * 7.5;
                        this.y += (dy / dist) * 7.5;
                    }
                    if (dist < player.radius + this.radius) {
                        xpPool.release(this);
                        addXP(1);
                    }
                }
                draw() {
                    ctx.save();
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = "#00ffff";
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(
                        this.x - camera.x - this.radius,
                        this.y - camera.y - this.radius,
                        this.radius * 2,
                        this.radius * 2,
                    );
                    ctx.restore();
                }
            }

            class FloatingText {
                constructor() {
                    this.active = false;
                    this.poolIndex = -1;
                }
                spawn(x, y, text, color = "#FFFFFF") {
                    this.x = x;
                    this.y = y;
                    this.text = text;
                    this.color = color;
                    this.life = 35;
                    this.maxLife = 35;
                    this.active = true;
                    this.vx = (Math.random() - 0.5) * 1.6;
                    this.vy = -1.5 - Math.random() * 1.2;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy *= 0.95;
                    this.life--;
                    if (this.life <= 0) floatingTextPool.release(this);
                }
                draw() {
                    let alpha = Math.min(1, this.life / 10);
                    ctx.save();
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = alpha;
                    ctx.font = "bold 13px monospace";
                    ctx.textAlign = "center";
                    ctx.fillText(
                        this.text,
                        this.x - camera.x,
                        this.y - camera.y,
                    );
                    ctx.restore();
                }
            }

            class StaticEffect {
                constructor() {
                    this.active = false;
                    this.poolIndex = -1;
                }
                spawn(x, y, radius, duration, type = "blast") {
                    this.x = x;
                    this.y = y;
                    this.radius = radius;
                    this.duration = duration;
                    this.maxDuration = duration;
                    this.type = type;
                    this.active = true;
                }
                update() {
                    this.duration--;
                    if (this.duration <= 0) {
                        effectPool.release(this);
                        return;
                    }
                    if (this.type === "vortex") {
                        let range = new QT_Rectangle(
                            this.x,
                            this.y,
                            this.radius,
                            this.radius,
                        );
                        let candidates = [];
                        enemyQuadTree.query(range, candidates);

                        for (let i = 0; i < candidates.length; i++) {
                            let e = candidates[i];
                            if (!e.active) continue;
                            let dx = this.x - e.x;
                            let dy = this.y - e.y;
                            let dSqr = dx * dx + dy * dy;
                            let radiusSqr = this.radius * this.radius;

                            if (dSqr < radiusSqr && dSqr > 0.01) {
                                let d = Math.sqrt(dSqr);
                                e.x += (dx / d) * 2.5;
                                e.y += (dy / d) * 2.5;
                            }
                        }
                        if (this.duration === 1) {
                            effectPool
                                .get()
                                ?.spawn(
                                    this.x,
                                    this.y,
                                    this.radius * 1.2,
                                    15,
                                    "blast",
                                );
                            dealAreaDamage(
                                this.x,
                                this.y,
                                this.radius * 1.2,
                                45,
                            );
                        }
                    }
                    if (this.type === "pulse_wave") {
                        let p = 1 - this.duration / this.maxDuration;
                        let currentRadius = this.radius * p;

                        let range = new QT_Rectangle(
                            player.x,
                            player.y,
                            this.radius,
                            this.radius,
                        );
                        let candidates = [];
                        enemyQuadTree.query(range, candidates);

                        for (let i = 0; i < candidates.length; i++) {
                            let e = candidates[i];
                            if (!e.active) continue;

                            let dx = player.x - e.x;
                            let dy = player.y - e.y;
                            let dSqr = dx * dx + dy * dy;
                            let d = Math.sqrt(dSqr);

                            if (Math.abs(d - currentRadius) < 24) {
                                if (WEAPONS.Pulse.level === 5) e.slowTimer = 75;
                                damageEnemy(e, 0.4 + WEAPONS.Pulse.level * 0.3);
                            }
                        }
                    }
                }
                draw() {
                    let p = 1 - this.duration / this.maxDuration;
                    ctx.save();
                    ctx.shadowBlur = 15;

                    if (this.type === "beam_visual") {
                        let alpha = 1,
                            maxW = 32;
                        if (p < 0.2) {
                            maxW = (p / 0.2) * 32;
                            alpha = 0.4 + Math.random() * 0.6;
                        } else if (p > 0.6) {
                            maxW = ((1 - p) / 0.4) * 32;
                            alpha = (1 - p) / 0.4;
                        }
                        ctx.shadowColor = "#ffffff";
                        ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.22})`;
                        ctx.fillRect(
                            0,
                            player.y - camera.y - maxW / 2,
                            canvas.width,
                            maxW,
                        );
                        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.fillRect(
                            0,
                            player.y - camera.y - maxW / 6,
                            canvas.width,
                            maxW / 3,
                        );
                        if (WEAPONS.Beam.level === 5) {
                            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.22})`;
                            ctx.fillRect(
                                player.x - camera.x - maxW / 2,
                                0,
                                maxW,
                                canvas.height,
                            );
                            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                            ctx.fillRect(
                                player.x - camera.x - maxW / 6,
                                0,
                                maxW / 3,
                                canvas.height,
                            );
                        }
                        ctx.restore();
                        return;
                    }

                    if (this.type === "enemy_exp") {
                        ctx.shadowColor = "#ff3333";
                        ctx.strokeStyle = `rgba(255, 51, 51, ${1 - p})`;
                    } else if (this.type === "blast") {
                        ctx.shadowColor = "#00ffff";
                        ctx.strokeStyle = `rgba(0, 255, 255, ${1 - p})`;
                    } else if (this.type === "vortex") {
                        ctx.shadowColor = "#ff00ff";
                        ctx.strokeStyle = `rgba(255, 0, 255, ${1 - p})`;
                    } else {
                        ctx.shadowColor = "#ffffff";
                        ctx.strokeStyle = `rgba(255, 255, 255, ${1 - p})`;
                    }

                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    if (
                        this.type === "blast" ||
                        this.type === "enemy_exp" ||
                        this.type === "pulse_wave"
                    ) {
                        let cx = this.type === "pulse_wave" ? player.x : this.x;
                        let cy = this.type === "pulse_wave" ? player.y : this.y;
                        ctx.arc(
                            cx - camera.x,
                            cy - camera.y,
                            this.radius * p,
                            0,
                            Math.PI * 2,
                        );
                        ctx.stroke();
                    } else if (this.type === "vortex") {
                        ctx.arc(
                            this.x - camera.x,
                            this.y - camera.y,
                            this.radius * (1 - p * 0.15),
                            0,
                            Math.PI * 2,
                        );
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            class Portal {
                constructor() {
                    this.active = false;
                    this.x = 0;
                    this.y = 0;
                    this.radius = 35;
                }
                spawn(x, y) {
                    this.x = x;
                    this.y = y;
                    this.active = true;
                }
                update() {
                    if (!this.active) return;
                    let dx = player.x - this.x;
                    let dy = player.y - this.y;
                    let minDist = player.radius + this.radius;
                    if (dx * dx + dy * dy < minDist * minDist) {
                        this.active = false;
                        if (gameState === STATES.PORTAL_OPEN)
                            prepareBossSpawn();
                        else if (gameState === STATES.BOSS_FIGHT)
                            goToNextWorld();
                    }
                }
                draw() {
                    if (!this.active) return;
                    ctx.save();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = "#ffffff";
                    ctx.strokeStyle = "#ffffff";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(
                        this.x - camera.x,
                        this.y - camera.y,
                        this.radius + Math.sin(Date.now() / 110) * 4,
                        0,
                        Math.PI * 2,
                    );
                    ctx.stroke();

                    ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(
                        this.x - camera.x,
                        this.y - camera.y,
                        this.radius * 0.6,
                        Date.now() * 0.003,
                        Date.now() * 0.003 + Math.PI,
                    );
                    ctx.stroke();
                    ctx.restore();
                }
            }

            const enemyPool = new FastPool(Enemy, 600);
            const bulletPool = new FastPool(Bullet, 1500);
            const enemyBulletPool = new FastPool(Bullet, 800);
            const xpPool = new FastPool(XP, 1000);
            const effectPool = new FastPool(StaticEffect, 400);
            const floatingTextPool = new FastPool(FloatingText, 300);
            const worldPortal = new Portal();
            let reviveAnimationActive = false;
            let reviveAnimationProgress = 0;

            function createSpawnWarning(x, y, variant, duration = 90) {
                spawnWarnings.push({
                    x: x,
                    y: y,
                    variant: variant,
                    timer: duration,
                    maxTimer: duration,
                });
            }

            function getClosestEnemy() {
                let range = new QT_Rectangle(player.x, player.y, 800, 800);
                let candidates = [];
                enemyQuadTree.query(range, candidates);

                let closest = null;
                let bestDSqr = Infinity;
                for (let i = 0; i < candidates.length; i++) {
                    let e = candidates[i];
                    if (!e.active) continue;
                    let dx = e.x - player.x;
                    let dy = e.y - player.y;
                    let dSqr = dx * dx + dy * dy;
                    if (dSqr < bestDSqr) {
                        bestDSqr = dSqr;
                        closest = e;
                    }
                }
                return closest;
            }

            function checkLevelProgression() {
                if (player.level === 5) {
                    unlockWeapon("Blast");
                    unlockWeapon("Spiral");
                }
                if (player.level === 10) {
                    unlockWeapon("Mine");
                    unlockWeapon("Vortex");
                }
                if (player.level === 15) {
                    unlockWeapon("Echo");
                }
            }

            function renderProceduralIcon(cvs, type) {
                let c = cvs.getContext("2d");
                let w = cvs.width,
                    h = cvs.height;
                c.clearRect(0, 0, w, h);
                c.save();
                c.translate(w / 2, h / 2);
                c.shadowBlur = 8;
                c.shadowColor = "#00ffff";
                c.strokeStyle = "#00ffff";
                c.fillStyle = "#00ffff";
                c.lineWidth = 2;

                if (type === "Dart") {
                    c.beginPath();
                    c.moveTo(15, 0);
                    c.lineTo(-10, -10);
                    c.lineTo(-4, 0);
                    c.lineTo(-10, 10);
                    c.closePath();
                    c.fill();
                } else if (type === "Orbit") {
                    c.beginPath();
                    c.arc(0, 0, 4, 0, Math.PI * 2);
                    c.fill();
                    c.strokeStyle = "rgba(0, 255, 255, 0.4)";
                    c.beginPath();
                    c.arc(0, 0, 15, 0, Math.PI * 2);
                    c.stroke();
                    c.beginPath();
                    c.arc(10, -10, 3, 0, Math.PI * 2);
                    c.fill();
                } else if (type === "Aura") {
                    c.beginPath();
                    c.arc(0, 0, 14, 0, Math.PI * 2);
                    c.stroke();
                    c.setLineDash([4, 4]);
                    c.beginPath();
                    c.arc(0, 0, 20, 0, Math.PI * 2);
                    c.stroke();
                } else if (type === "Cross") {
                    c.beginPath();
                    c.moveTo(-15, 0);
                    c.lineTo(15, 0);
                    c.moveTo(0, -15);
                    c.lineTo(0, 15);
                    c.stroke();
                } else if (type === "Blast") {
                    c.beginPath();
                    c.arc(0, 0, 8, 0, Math.PI * 2);
                    c.stroke();
                    for (let i = 0; i < 4; i++) {
                        c.rotate(Math.PI / 2);
                        c.beginPath();
                        c.moveTo(12, 0);
                        c.lineTo(18, 0);
                        c.stroke();
                    }
                } else if (type === "Beam") {
                    c.fillRect(-20, -3, 40, 6);
                } else if (type === "Bounce") {
                    c.strokeRect(-10, -10, 20, 20);
                } else if (type === "Pulse") {
                    c.beginPath();
                    c.arc(0, 0, 5, 0, Math.PI * 2);
                    c.fill();
                    c.beginPath();
                    c.arc(0, 0, 12, 0, Math.PI * 2);
                    c.stroke();
                    c.beginPath();
                    c.arc(0, 0, 20, 0, Math.PI * 2);
                    c.stroke();
                } else if (type === "Rain") {
                    c.beginPath();
                    c.moveTo(-10, -12);
                    c.lineTo(-10, 12);
                    c.moveTo(10, -12);
                    c.lineTo(10, 12);
                    c.moveTo(0, -12);
                    c.lineTo(0, 12);
                    c.stroke();
                } else if (type === "Mine") {
                    c.beginPath();
                    c.moveTo(0, -12);
                    c.lineTo(10, 8);
                    c.lineTo(-10, 8);
                    c.closePath();
                    c.fill();
                } else if (type === "Chain") {
                    c.beginPath();
                    c.moveTo(-15, -15);
                    c.lineTo(-3, -2);
                    c.lineTo(3, 2);
                    c.lineTo(15, 15);
                    c.stroke();
                } else if (type === "Spiral") {
                    c.beginPath();
                    for (let i = 0; i < 30; i++) {
                        let a = 0.2 * i;
                        let r = 0.8 * i;
                        c.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                    }
                    c.stroke();
                } else if (type === "Vortex") {
                    c.shadowColor = "#ff00ff";
                    c.strokeStyle = "#ff00ff";
                    c.beginPath();
                    c.arc(0, 0, 12, 0, Math.PI * 2);
                    c.stroke();
                    c.setLineDash([2, 5]);
                    c.beginPath();
                    c.arc(0, 0, 18, 0, Math.PI * 2);
                    c.stroke();
                } else if (type === "Echo") {
                    c.beginPath();
                    c.arc(-6, 0, 8, 0, Math.PI * 2);
                    c.stroke();
                    c.beginPath();
                    c.arc(6, 0, 8, 0, Math.PI * 2);
                    c.stroke();
                } else if (type === "Crystal") {
                    c.beginPath();
                    c.moveTo(0, -15);
                    c.lineTo(10, 0);
                    c.lineTo(0, 15);
                    c.lineTo(-10, 0);
                    c.closePath();
                    c.fill();
                }
                c.restore();
            }

            function checkScoreProgression() {
                if (score >= 40000 && !unlockedWeapons.includes("Crystal"))
                    unlockWeapon("Crystal");
                else if (score >= 65000 && !unlockedWeapons.includes("Rain"))
                    unlockWeapon("Rain");
                else if (score >= 25000 && !unlockedWeapons.includes("Bounce"))
                    unlockWeapon("Bounce");
            }

            function unlockWeapon(id) {
                if (!unlockedWeapons.includes(id)) {
                    unlockedWeapons.push(id);
                    toasts.push({
                        title: "НОВАЯ ФУНКЦИЯ ЯДРА",
                        desc: `Разблокировано: [${id}]`,
                        timer: 150,
                    });
                }
            }

            function triggerUpgradeScreen() {
                gameState = STATES.UPGRADE;
                updatePauseButtonVisibility();
                const screen = document.getElementById("upgrade-screen");
                const container = document.getElementById("options-container");
                screen.style.display = "block";
                container.innerHTML = "";

                let available = Object.keys(WEAPONS).filter(
                    (k) => WEAPONS[k].level < 5 && unlockedWeapons.includes(k),
                );
                if (available.length === 0) {
                    pendingUpgrades = 0;
                    screen.style.display = "none";
                    gameState = STATES.PLAYING;
                    return;
                }

                let options = [];
                while (options.length < Math.min(3, available.length)) {
                    let rand =
                        available[Math.floor(Math.random() * available.length)];
                    if (!options.includes(rand)) options.push(rand);
                }

                options.forEach((opt) => {
                    let div = document.createElement("div");
                    div.className = "upgrade-option";
                    let nextLevel = WEAPONS[opt].level + 1;

                    div.innerHTML = `
                        <div class="icon-container">
                            <canvas class="weapon-preview-canvas" width="60" height="60"></canvas>
                            <div class="level-badge font-mono">LVL ${nextLevel}</div>
                        </div>
                        <div class="flex-1">
                            <div class="font-bold tracking-wider text-xs md:text-sm font-mono text-cyan-200">${WEAPONS[opt].name.toUpperCase()}</div>
                            <div class="text-[9px] text-gray-400 font-mono mt-1">+ Модификация функций ядра</div>
                        </div>
                    `;
                    container.appendChild(div);

                    let cvs = div.querySelector(".weapon-preview-canvas");
                    renderProceduralIcon(cvs, opt);

                    div.onclick = () => {
                        WEAPONS[opt].level++;
                        sfx.playUpgrade();
                        if (WEAPONS[opt].upgrade)
                            WEAPONS[opt].upgrade(WEAPONS[opt]);
                        pendingUpgrades--;
                        screen.style.display = "none";
                        if (pendingUpgrades > 0) triggerUpgradeScreen();
                        else {
                            gameState = STATES.PLAYING;
                            lastTime = performance.now();
                        }
                    };
                });
            }

            function damageEnemy(enemy, damageAmount) {
                if (!enemy.active) return false;

                if (enemy.variant === "panic_decoy" && Math.random() < 0.15) {
                    let a = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                    enemyBulletPool
                        .get()
                        ?.spawn(
                            enemy.x,
                            enemy.y,
                            Math.cos(a) * 3.5,
                            Math.sin(a) * 3.5,
                            4,
                            false,
                            90,
                            "normal",
                        );
                }

                enemy.hp -= damageAmount;
                enemy.flashTimer = 5;
                let textStr =
                    damageAmount < 1
                        ? damageAmount.toFixed(1)
                        : Math.round(damageAmount).toString();
                let color = damageAmount >= 30 ? "#00ffff" : "#FFFFFF";
                let rx = enemy.x + (Math.random() - 0.5) * 16,
                    ry = enemy.y - enemy.radius - Math.random() * 8;
                floatingTextPool.get()?.spawn(rx, ry, textStr, color);
                if (enemy.hp <= 0) {
                    destroyEnemy(enemy);
                    return true;
                }
                return false;
            }

            function dealAreaDamage(x, y, radius, damage) {
                let range = new QT_Rectangle(x, y, radius, radius);
                let candidates = [];
                enemyQuadTree.query(range, candidates);

                for (let i = 0; i < candidates.length; i++) {
                    let e = candidates[i];
                    if (!e.active) continue;
                    let dx = e.x - x;
                    let dy = e.y - y;
                    let minDist = radius + e.radius;
                    if (dx * dx + dy * dy < minDist * minDist) {
                        damageEnemy(e, damage);
                    }
                }
            }

            function destroyEnemy(enemy) {
                enemyPool.release(enemy);
                score += 100;
                sfx.playExplode();
                checkScoreProgression();

                if (gameState === STATES.PLAYING) gameTimer += 0.6;

                if (
                    enemy.variant === "boss_rat_king" ||
                    enemy.variant === "boss_antivirus" ||
                    enemy.variant === "boss_kernel_panic"
                ) {
                    handleBossDeath();
                } else {
                    if (!bossArena.active)
                        xpPool.get()?.spawn(enemy.x, enemy.y);
                    if (enemy.variant === "exploder") {
                        effectPool
                            .get()
                            ?.spawn(enemy.x, enemy.y, 55, 15, "enemy_exp");
                        let dx = player.x - enemy.x,
                            dy = player.y - enemy.y;
                        let minDist = 55 + player.radius;
                        if (dx * dx + dy * dy < minDist * minDist) {
                            player.hp -= 12;
                            sfx.playHit();
                            if (player.hp <= 0) handlePlayerDeath();
                        }
                    }
                }
            }

            function addXP(amount) {
                player.xp += amount;
                while (player.xp >= player.xpNeeded) {
                    player.xp -= player.xpNeeded;
                    player.level++;
                    player.xpNeeded = Math.floor(player.xpNeeded * 1.35);
                    pendingUpgrades++;
                    sfx.playLevelUp();
                    checkLevelProgression();
                }
            }

                    },
                    draw: () => {

                        for (let i = 0; i < count; i++) {
                            let rOffset =
                                WEAPONS.Orbit.level === 5
                                    ? i % 2 === 0
                                        ? 32
                                        : 0
                                    : 0;
                            let a =
                                WEAPONS.Orbit.angle +
                                ((Math.PI * 2) / count) * i;
                            let ox =
                                player.x +
                                Math.cos(a) * (WEAPONS.Orbit.radius + rOffset);
                            let oy =
                                player.y +
                                Math.sin(a) * (WEAPONS.Orbit.radius + rOffset);

                            ctx.save();
                            ctx.translate(ox - camera.x, oy - camera.y);
                            ctx.rotate(WEAPONS.Orbit.angle * 2.5);

            function renderBackground() {
                if (bossArena.active) {
                    ctx.save();
                    ctx.strokeStyle = "#ff0000";
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#ff0000";
                    ctx.lineWidth = 4;
                    let half = bossArena.size / 2;
                    ctx.strokeRect(
                        bossArena.x - half - camera.x,
                        bossArena.y - half - camera.y,
                        bossArena.size,
                        bossArena.size,
                    );
                    ctx.strokeStyle = "rgba(255, 0, 0, 0.08)";
                    ctx.lineWidth = 1;
                    for (let i = -half; i <= half; i += 50) {
                        ctx.beginPath();
                        ctx.moveTo(
                            bossArena.x + i - camera.x,
                            bossArena.y - half - camera.y,
                        );
                        ctx.lineTo(
                            bossArena.x + i - camera.x,
                            bossArena.y + half - camera.y,
                        );
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.moveTo(
                            bossArena.x - half - camera.x,
                            bossArena.y + i - camera.y,
                        );
                        ctx.lineTo(
                            bossArena.x + half - camera.x,
                            bossArena.y + i - camera.y,
                        );
                        ctx.stroke();
                    }
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.strokeStyle = "rgba(0, 255, 255, 0.05)";
                ctx.lineWidth = 1;
                let gridSize = 80;
                let sX = Math.floor(camera.x / gridSize) * gridSize;
                let sY = Math.floor(camera.y / gridSize) * gridSize;

                for (
                    let x = sX - gridSize;
                    x < sX + canvas.width / zoom + gridSize;
                    x += gridSize
                ) {
                    ctx.beginPath();
                    ctx.moveTo(x - camera.x, 0);
                    ctx.lineTo(x - camera.x, canvas.height / zoom);
                    ctx.stroke();
                }
                for (
                    let y = sY - gridSize;
                    y < sY + canvas.height / zoom + gridSize;
                    y += gridSize
                ) {
                    ctx.beginPath();
                    ctx.moveTo(0, y - camera.y);
                    ctx.lineTo(canvas.width / zoom, y - camera.y);
                    ctx.stroke();
                }
                ctx.restore();
            }

            function drawLightnings() {
                activeLightnings.forEach((lt) => {
                    let alpha = lt.life / lt.maxLife;
                    ctx.save();
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#00ffff";
                    ctx.strokeStyle = `rgba(0, 255, 255, ${alpha})`;
                    ctx.lineWidth = 3.5 * alpha;
                    ctx.beginPath();
                    let p0 = lt.points[0];
                    ctx.moveTo(p0.x - camera.x, p0.y - camera.y);
                    for (let i = 1; i < lt.points.length; i++) {
                        let pStart = lt.points[i - 1],
                            pEnd = lt.points[i];
                        let dx = pEnd.x - pStart.x,
                            dy = pEnd.y - pStart.y;
                        let dist = Math.hypot(dx, dy),
                            segments = Math.max(3, Math.floor(dist / 22));
                        for (let s = 1; s < segments; s++) {
                            let t = s / segments,
                                px = pStart.x + dx * t,
                                py = pStart.y + dy * t;
                            let nx = -dy / dist,
                                ny = dx / dist,
                                offset = (Math.random() - 0.5) * 14;
                            ctx.lineTo(
                                px + nx * offset - camera.x,
                                py + ny * offset - camera.y,
                            );
                        }
                        ctx.lineTo(pEnd.x - camera.x, pEnd.y - camera.y);
                    }
                    ctx.stroke();
                    ctx.restore();
                });
            }

            function renderUI() {
                ctx.save();
                ctx.fillStyle = "#FFFFFF";
                ctx.shadowBlur = 5;
                ctx.shadowColor = "#ffffff";
                ctx.font = "bold 13px monospace";
                ctx.textAlign = "left";
