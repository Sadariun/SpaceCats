<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover,  height=device-height"
        />
        <title>Система // Выживание</title>
        <script src="https://yandex.ru/games/sdk/v2"></script>

        <style>
            * {
                box-sizing: border-box;
                user-select: none;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                -webkit-touch-callout: none;
                margin: 0;
                padding: 0;
            }
            body,
            html {
                width: 100%;
                height: 100%;
                min-height: 100dvh;
                overflow: hidden;
                background-color: #070709;
                font-family: "Courier New", Courier, monospace;
            }

            #gameCanvas {
                display: block;
                width: 100vw;
                height: 100vh;
                height: 100dvh;
            }

            /* CRT scanlines effect */
            .crt::after {
                content: " ";
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                bottom: 0;
                right: 0;
                background:
                    linear-gradient(
                        rgba(18, 16, 16, 0) 50%,
                        rgba(0, 0, 0, 0.25) 50%
                    ),
                    linear-gradient(
                        90deg,
                        rgba(255, 0, 0, 0.04),
                        rgba(0, 255, 0, 0.02),
                        rgba(0, 0, 255, 0.04)
                    );
                z-index: 99;
                background-size:
                    100% 4px,
                    6px 100%;
                pointer-events: none;
            }

            #upgrade-screen {
                display: none;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(10, 10, 12, 0.98);
                border: 2px solid #00ffff;
                padding: 25px;
                width: 95%;
                max-width: 480px;
                text-align: center;
                color: #ffffff;
                z-index: 100;
                box-shadow: 0 0 25px rgba(0, 255, 255, 0.35);
                border-radius: 12px;
            }
            #options-container {
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-top: 15px;
            }
            .upgrade-option {
                background: rgba(20, 20, 25, 0.8);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: #ffffff;
                padding: 12px 15px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 15px;
                width: 100%;
                transition: all 0.25s ease;
                border-radius: 8px;
                text-align: left;
            }
            .upgrade-option:hover {
                background: rgba(0, 255, 255, 0.15);
                border-color: #00ffff;
                box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
                transform: translateX(4px);
            }
            .icon-container {
                position: relative;
                width: 60px;
                height: 60px;
                display: flex;
                justify-content: center;
                align-items: center;
                background: #000;
                border: 1px solid rgba(0, 255, 255, 0.3);
                border-radius: 6px;
            }
            .weapon-preview-canvas {
                width: 60px !important;
                height: 60px !important;
                display: block;
            }
            .level-badge {
                position: absolute;
                bottom: -4px;
                right: -4px;
                background: #00ffff;
                color: #000;
                font-size: 9px;
                font-weight: bold;
                padding: 1px 4px;
                font-family: monospace;
                border-radius: 3px;
            }
            #preloader {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #070709;
                z-index: 1000;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                color: #ffffff;
            }
            #loader-bar-bg {
                width: 80%;
                max-width: 400px;
                height: 8px;
                border: 1px solid rgba(0, 255, 255, 0.3);
                background: #111;
                border-radius: 4px;
                padding: 2px;
                margin-top: 24px;
            }
            #loader-bar-fill {
                width: 0%;
                height: 100%;
                background-color: #00ffff;
                box-shadow: 0 0 10px #00ffff;
                transition: width 0.05s linear;
                border-radius: 2px;
            }
            .terminal-text {
                font-family: monospace;
                color: #00ff00;
                text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
            }

            #menu-screen {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(7, 7, 9, 0.85);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                display: none;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 80;
                color: #ffffff;
            }
            #arsenal-screen {
                display: none;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(10, 10, 12, 0.98);
                border: 2px solid #00ffff;
                padding: 25px;
                width: 95%;
                max-width: 600px;
                max-height: 85vh;
                overflow-y: auto;
                color: #ffffff;
                z-index: 120;
                box-shadow: 0 0 25px rgba(0, 255, 255, 0.35);
                border-radius: 12px;
            }
            #arsenal-screen::-webkit-scrollbar {
                width: 6px;
            }
            #arsenal-screen::-webkit-scrollbar-track {
                background: rgba(10, 10, 12, 0.98);
            }
            #arsenal-screen::-webkit-scrollbar-thumb {
                background: #00ffff;
                border-radius: 3px;
            }
            .arsenal-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 12px;
                margin-top: 15px;
                margin-bottom: 20px;
            }
            .arsenal-card {
                background: rgba(20, 20, 25, 0.8);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                padding: 10px;
                display: flex;
                flex-direction: column;

                text-align: center;
                position: relative;
                transition: all 0.25s ease;
            }
            .arsenal-card.unlocked {
                border-color: rgba(0, 255, 255, 0.25);

            .arsenal-card.unlocked.hover\:border-color:hover {
                border-color: #00ffff;
                box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);

            #gameover-screen {

                left: 50%;

                background: rgba(10, 10, 12, 0.98);
                border: 2px solid #ff3333;
                padding: 30px;
                width: 95%;
                max-width: 440px;
                text-align: center;
                color: #ffffff;
                z-index: 100;
                box-shadow: 0 0 25px rgba(255, 51, 51, 0.35);
                border-radius: 12px;
            }

            #pause-menu-btn {
                display: none;
                position: absolute;
                bottom: 90px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(10, 10, 15, 0.9);
                border: 1px solid #ff4444;
                color: #ff4444;
                padding: 10px 28px;

                transition: all 0.3s ease;

                background: rgba(255, 68, 68, 0.15);
                box-shadow: 0 0 30px rgba(255, 68, 68, 0.25);
                transform: translateX(-50%) scale(1.04);
            }

                    id="restart-game-btn"
                    class="w-full py-3 bg-transparent border border-red-500 hover:bg-red-950/20 text-red-500 font-extrabold text-xs tracking-wider font-mono rounded-lg transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]"

        <script>
            let ysdkInstance = null;
            let adReviveUsedInCurrentRun = false;
            let isPlatformPaused = false;
            let isGameReady = false;

            document.addEventListener("contextmenu", (e) => e.preventDefault());
            document.addEventListener("selectstart", (e) => e.preventDefault());
            document.addEventListener("dragstart", (e) => e.preventDefault());

            function triggerYandexGameplayStart() {
                if (
                    ysdkInstance &&
                    ysdkInstance.features &&
                    ysdkInstance.features.GameplayAPI
                ) {
                    try {
                        ysdkInstance.features.GameplayAPI.start();
                        console.log(
                            "[Yandex SDK]: GameplayAPI.start() успешно отправлен.",
                        );
                    } catch (e) {
                        console.warn(
                            "[Yandex SDK]: Ошибка вызова GameplayAPI.start()",
                            e,
                        );
                    }
                }
            }

            function triggerYandexGameplayStop() {
                if (
                    ysdkInstance &&
                    ysdkInstance.features &&
                    ysdkInstance.features.GameplayAPI
                ) {
                    try {
                        ysdkInstance.features.GameplayAPI.stop();
                        console.log(
                            "[Yandex SDK]: GameplayAPI.stop() успешно отправлен.",
                        );
                    } catch (e) {
                        console.warn(
                            "[Yandex SDK]: Ошибка вызова GameplayAPI.stop()",
                            e,
                        );
                    }
                }
            }

            class AudioEngine {
                constructor() {
                    this.ctx = null;
                    this.muted = false;
                    this.musicBuffer = null;
                    this.musicSource = null;
                    this.musicGain = null;
                    this.musicLoading = false;
                }
                init() {
                    if (this.ctx) return;
                    this.ctx = new (
                        window.AudioContext || window.webkitAudioContext
                    )();
                }
                loadMusic() {
                    if (this.musicBuffer || this.musicLoading) return;
                    this.musicLoading = true;
                    this.init();
                    fetch("./music/bgmusic.mp3")
                        .then((response) => response.arrayBuffer())
                        .then((data) => this.ctx.decodeAudioData(data))
                        .then((buffer) => {
                            this.musicBuffer = buffer;
                            this.musicLoading = false;
                            console.log(
                                "[AudioEngine]: Фоновая музыка успешно загружена и декодирована.",
                            );
                            if (isMusicPlaying) {
                                this.playMusic();
                            }
                        })
                        .catch((err) => {
                            console.warn(
                                "[AudioEngine]: Ошибка загрузки или декодирования музыки",
                                err,
                            );
                            this.musicLoading = false;
                        });
                }
                playMusic() {
                    if (!this.ctx || !this.musicBuffer) return;
                    this.stopMusic();

                    this.musicSource = this.ctx.createBufferSource();
                    this.musicSource.buffer = this.musicBuffer;
                    this.musicSource.loop = true;

                    this.musicGain = this.ctx.createGain();
                    this.musicGain.gain.setValueAtTime(0, this.ctx.currentTime);

                    this.musicSource.connect(this.musicGain);
                    this.musicGain.connect(this.ctx.destination);

                    this.musicSource.start(0);
                }
                stopMusic() {
                    if (this.musicSource) {
                        try {
                            this.musicSource.stop(0);
                        } catch (e) {}
                        this.musicSource = null;
                    }
                    this.musicGain = null;
                }
                playShoot() {
                    if (this.muted || !this.ctx) return;
                    this.init();
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.type = "triangle";
                    osc.frequency.setValueAtTime(440, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(
                        110,
                        this.ctx.currentTime + 0.12,
                    );
                    gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(
                        0.01,
                        this.ctx.currentTime + 0.12,
                    );
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.12);
                }
                playExplode() {
                    if (this.muted || !this.ctx) return;
                    this.init();
                    let bufferSize = this.ctx.sampleRate * 0.15,
                        buffer = this.ctx.createBuffer(
                            1,
                            bufferSize,
                            this.ctx.sampleRate,
                        ),
                        data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    let noise = this.ctx.createBufferSource();
                    noise.buffer = buffer;
                    let filter = this.ctx.createBiquadFilter();
                    filter.type = "lowpass";
                    filter.frequency.setValueAtTime(400, this.ctx.currentTime);
                    filter.frequency.exponentialRampToValueAtTime(
                        10,
                        this.ctx.currentTime + 0.15,
                    );
                    let gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(0.18, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(
                        0.01,
                        this.ctx.currentTime + 0.15,
                    );
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.ctx.destination);
                    noise.start();
                }
                playHit() {
                    if (this.muted || !this.ctx) return;
                    this.init();
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.type = "sawtooth";
                    osc.frequency.setValueAtTime(120, this.ctx.currentTime);
                    osc.frequency.setValueAtTime(
                        60,
                        this.ctx.currentTime + 0.08,
                    );
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(
                        0.01,
                        this.ctx.currentTime + 0.15,
                    );
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.15);
                }
                playLevelUp() {
                    if (this.muted || !this.ctx) return;
                    this.init();
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.type = "sine";
                    let notes = [261.63, 329.63, 392.0, 523.25];
                    notes.forEach((freq, idx) => {
                        let time = this.ctx.currentTime + idx * 0.1;
                        osc.frequency.setValueAtTime(freq, time);
                    });
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(
                        0.15,
                        this.ctx.currentTime + 0.3,
                    );
                    gain.gain.linearRampToValueAtTime(
                        0.01,
                        this.ctx.currentTime + 0.5,
                    );
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.5);
                }
                playUpgrade() {
                    if (this.muted || !this.ctx) return;
                    this.init();
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.type = "square";
                    osc.frequency.setValueAtTime(300, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(
                        1200,
                        this.ctx.currentTime + 0.25,
                    );
                    gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(
                        0.01,
                        this.ctx.currentTime + 0.25,
                    );
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.25);
                }
                playWarning() {
                    if (this.muted || !this.ctx) return;
                    this.init();
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.type = "sawtooth";
                    osc.frequency.setValueAtTime(220, this.ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(
                        330,
                        this.ctx.currentTime + 0.2,
                    );
                    osc.frequency.linearRampToValueAtTime(
                        220,
                        this.ctx.currentTime + 0.4,
                    );
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(
                        0.01,
                        this.ctx.currentTime + 0.45,
                    );
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.45);
                }
            }
            const sfx = new AudioEngine();

            const initAudioOnFirstClick = () => {
                sfx.init();
                sfx.loadMusic();
                window.removeEventListener("click", initAudioOnFirstClick);
                window.removeEventListener("touchstart", initAudioOnFirstClick);
            };
            window.addEventListener("click", initAudioOnFirstClick);
            window.addEventListener("touchstart", initAudioOnFirstClick);

            let isMusicPlaying = false;
            const TARGET_VOLUME = 0.25;

            function startMusic() {
                if (sfx.muted) return;
                if (isTabHidden) return;
                if (isPlatformPaused) return;
                isMusicPlaying = true;
                sfx.playMusic();

            function fadeInMusic() {
                if (sfx.musicGain && sfx.ctx) {

                    sfx.musicGain.gain.cancelScheduledValues(currTime);
                    sfx.musicGain.gain.setValueAtTime(
                        sfx.musicGain.gain.value,
                        currTime,
                    );
                    sfx.musicGain.gain.linearRampToValueAtTime(
                        TARGET_VOLUME,
                        currTime + 1.5,
                    );

            }

            function fadeOutMusic(callback, forceInstant = false) {
                if (forceInstant) {
                    if (sfx.musicGain && sfx.ctx) {
                        sfx.musicGain.gain.cancelScheduledValues(
                            sfx.ctx.currentTime,
                        );
                        sfx.musicGain.gain.setValueAtTime(
                            0,
                            sfx.ctx.currentTime,
                        );
                    }
                    if (callback) callback();
                    return;

                if (sfx.musicGain && sfx.ctx) {
                    const currTime = sfx.ctx.currentTime;
                    sfx.musicGain.gain.cancelScheduledValues(currTime);
                    sfx.musicGain.gain.setValueAtTime(
                        sfx.musicGain.gain.value,
                        currTime,
                    );
                    sfx.musicGain.gain.linearRampToValueAtTime(
                        0,

                    setTimeout(() => {
                        if (callback) callback();

                } else {
                    if (callback) callback();

            class QT_Rectangle {
                constructor(x, y, w, h) {
                    this.x = x;
                    this.y = y;
                    this.w = w;
                    this.h = h;
                }
                contains(obj) {
                    return (
                        obj.x >= this.x - this.w &&
                        obj.x <= this.x + this.w &&
                        obj.y >= this.y - this.h &&
                        obj.y <= this.y + this.h
                    );
                }
                intersects(range) {
                    return !(
                        range.x - range.w > this.x + this.w ||
                        range.x + range.w < this.x - this.w ||
                        range.y - range.h > this.y + this.h ||
                        range.y + range.h < this.y - this.h
                    );
                }
            }

            class QuadTree {
                constructor(boundary, capacity) {
                    this.boundary = boundary;
                    this.capacity = capacity;
                    this.objects = [];
                    this.divided = false;
                }
                subdivide() {
                    let x = this.boundary.x;
                    let y = this.boundary.y;
                    let w = this.boundary.w / 2;
                    let h = this.boundary.h / 2;

                    let ne = new QT_Rectangle(x + w, y - h, w, h);
                    this.northeast = new QuadTree(ne, this.capacity);
                    let nw = new QT_Rectangle(x - w, y - h, w, h);
                    this.northwest = new QuadTree(nw, this.capacity);
                    let se = new QT_Rectangle(x + w, y + h, w, h);
                    this.southeast = new QuadTree(se, this.capacity);
                    let sw = new QT_Rectangle(x - w, y + h, w, h);
                    this.southwest = new QuadTree(sw, this.capacity);

                    this.divided = true;
                }
                insert(obj) {
                    if (!this.boundary.contains(obj)) return false;

                    if (this.objects.length < this.capacity) {
                        this.objects.push(obj);
                        return true;
                    }

                    if (!this.divided) this.subdivide();

                    if (this.northeast.insert(obj)) return true;
                    if (this.northwest.insert(obj)) return true;
                    if (this.southeast.insert(obj)) return true;
                    if (this.southwest.insert(obj)) return true;

                    return false;
                }
                query(range, found) {
                    if (!found) found = [];
                    if (!this.boundary.intersects(range)) return found;

                    for (let i = 0; i < this.objects.length; i++) {
                        let obj = this.objects[i];
                        if (this.boundary.contains(obj)) found.push(obj);
                    }

                    if (this.divided) {
                        this.northeast.query(range, found);
                        this.northwest.query(range, found);
                        this.southeast.query(range, found);
                        this.southwest.query(range, found);
                    }
                    return found;
                }
            }

            class FastPool {
                constructor(ClassRef, size) {
                    this.objects = [];
                    this.activeCount = 0;
                    for (let i = 0; i < size; i++) {
                        let obj = new ClassRef();
                        obj.poolIndex = i;
                        this.objects.push(obj);
                    }
                }
                get() {
                    if (this.activeCount < this.objects.length) {
                        let obj = this.objects[this.activeCount];
                        this.activeCount++;
                        return obj;
                    }
                    return null;
                }
                release(obj) {
                    if (obj.poolIndex < this.activeCount) {
                        this.activeCount--;
                        let lastObj = this.objects[this.activeCount];
                        this.objects[obj.poolIndex] = lastObj;
                        this.objects[this.activeCount] = obj;
                        lastObj.poolIndex = obj.poolIndex;
                        obj.poolIndex = this.activeCount;
                        obj.active = false;
                    }
                }
                updateAll() {
                    for (let i = 0; i < this.activeCount; i++)
                        this.objects[i].update();
                }
                drawAll() {
                    for (let i = 0; i < this.activeCount; i++)
                        this.objects[i].draw();
                }
                clear() {
                    while (this.activeCount > 0) {
                        this.objects[this.activeCount - 1].active = false;
                        this.activeCount--;
                    }
                }
            }

            const WORLD_DURATION = 180;

            function updateZoom() {
                const minDim = Math.min(window.innerWidth, window.innerHeight);
                if (minDim < 600) {

            class Player {
                constructor() {
                    this.x = 0;
                    this.y = 0;
                    this.radius = 12;
                    this.speed = 3.6;
                    this.hp = 100;
                    this.maxHp = 100;
                    this.level = 1;
                    this.xp = 0;
                    this.xpNeeded = 12;
                    this.lastVx = 1;
                    this.lastVy = 0;
                }
                update() {
                    let moveX = 0,
                        moveY = 0;
                    if (keys["KeyW"] || keys["ArrowUp"]) moveY -= 1;
                    if (keys["KeyS"] || keys["ArrowDown"]) moveY += 1;
                    if (keys["KeyA"] || keys["ArrowLeft"]) moveX -= 1;
                    if (keys["KeyD"] || keys["ArrowRight"]) moveX += 1;
                    if (joystick.active) {
                        moveX = joystick.vx;
                        moveY = joystick.vy;
                    }

                    if (moveX !== 0 && moveY !== 0 && !joystick.active) {
                        moveX *= 0.7071;
                        moveY *= 0.7071;
                    }
                    this.x += moveX * this.speed;
                    this.y += moveY * this.speed;

                    if (bossArena.active) {
                        let half = bossArena.size / 2;
                        if (this.x < bossArena.x - half + this.radius)
                            this.x = bossArena.x - half + this.radius;
                        if (this.x > bossArena.x + half - this.radius)
                            this.x = bossArena.x + half - this.radius;
                        if (this.y < bossArena.y - half + this.radius)
                            this.y = bossArena.y - half + this.radius;
                        if (this.y > bossArena.y + half - this.radius)
                            this.y = bossArena.y + half - this.radius;
                    }

                    if (moveX !== 0 || moveY !== 0) {
                        let len = Math.hypot(moveX, moveY);
                        this.lastVx = moveX / len;
                        this.lastVy = moveY / len;
                    }
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x - camera.x, this.y - camera.y);
                    let rot = Math.atan2(this.lastVy, this.lastVx);
                    ctx.rotate(rot);

                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#ffffff";
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.moveTo(this.radius * 1.5, 0);
                    ctx.lineTo(-this.radius, -this.radius);
                    ctx.lineTo(-this.radius * 0.4, 0);
                    ctx.lineTo(-this.radius, this.radius);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = "#00ffff";
                    ctx.shadowColor = "#00ffff";
                    ctx.beginPath();
                    ctx.arc(
                        -this.radius * 0.5,
                        0,
                        4 + Math.sin(Date.now() / 50) * 2,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fill();
                    ctx.restore();

                    let hpRingRadius = this.radius + 8;
                    ctx.save();
                    ctx.translate(this.x - camera.x, this.y - camera.y);
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = "rgba(0, 255, 255, 0.4)";
                    ctx.strokeStyle = "rgba(0, 255, 255, 0.1)";
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, hpRingRadius, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.strokeStyle = "#00ffff";
                    ctx.beginPath();
                    let hpPct = Math.max(0, this.hp) / this.maxHp;
                    ctx.arc(
                        0,
                        0,
                        hpRingRadius,
                        -Math.PI / 2,
                        -Math.PI / 2 + Math.PI * 2 * hpPct,
                    );
                    ctx.stroke();
                    ctx.restore();
                }
            }
            const player = new Player();

            class Enemy {
                constructor() {
                    this.active = false;
                    this.poolIndex = -1;
                }
                spawn(x, y, variant = "normal") {
                    this.x = x;
                    this.y = y;
                    this.variant = variant;
                    this.active = true;
                    this.shootTimer = 0;

                    this.phaseTimer = 0;

                        this.name = "ВИНЛОК [SYSTEM.WIN_LOCK]";

                        this.hp = 2000 + 10000 * (difficultyMultiplier - 1);

                        this.speed = 0.0;
                        activeBossRef = this;
                    } else if (variant === "boss_kernel_panic") {
                        this.name = "СБОЙ ЯДРА [SYSTEM.KERNEL_PANIC]";
                        this.radius = 50;
                        this.hp = 16000 + 15000 * (difficultyMultiplier - 1);
                        this.speed = 1.2;
                        activeBossRef = this;
                    } else if (variant === "panic_decoy") {
                        this.radius = 16;
                        this.hp = 600 * difficultyMultiplier;
                        this.speed = 1.6;
                        this.shootTimer = 0;
                    } else if (variant === "dasher") {
                        this.radius = 11;
                        this.hp = 25 + 150 * (difficultyMultiplier - 1);
                        this.speed = 1.8;
                        this.dashState = 0;
                        this.dashCooldown = Math.floor(Math.random() * 60);
                        this.dashTimer = 0;
                    } else if (variant === "shooter") {
                        this.radius = 9;
                        this.hp = 50 * difficultyMultiplier;
                        this.speed = 1.6;
                    } else if (variant === "exploder") {
                        this.radius = 11;
                        this.hp = 9 * difficultyMultiplier;
                        this.speed = 2.4;
                    } else {
                        this.radius = 10;
                        this.hp = 40 * difficultyMultiplier;
                        this.speed = 2.0;
                    }
                    this.maxHp = this.hp;
                }
                update() {
                    let dx = player.x - this.x,
                        dy = player.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    let currentSpeed = this.speed;
                    if (this.slowTimer > 0) {
                        this.slowTimer--;
                        currentSpeed *= 0.5;
                    }
                    if (this.flashTimer > 0) this.flashTimer--;

                    if (this.variant === "dasher") {
                        this.dashCooldown++;
                        if (this.dashState === 0) {
                            let angle = Math.atan2(
                                player.y - this.y,
                                player.x - this.x,
                            );
                            this.vx = Math.cos(angle) * currentSpeed;
                            this.vy = Math.sin(angle) * currentSpeed;
                            this.x += this.vx;
                            this.y += this.vy;

                            if (this.dashCooldown > 120) {
                                this.dashState = 1;
                                this.dashTimer = 40;
                                this.vx = 0;
                                this.vy = 0;
                            }
                        } else if (this.dashState === 1) {
                            this.dashTimer--;
                            this.flashTimer = 2;
                            if (this.dashTimer <= 0) {
                                this.dashState = 2;
                                this.dashTimer = 20;
                                let angle = Math.atan2(
                                    player.y - this.y,
                                    player.x - this.x,
                                );
                                this.dashVx = Math.cos(angle) * 11.0;
                                this.dashVy = Math.sin(angle) * 11.0;
                            }
                        } else if (this.dashState === 2) {
                            this.x += this.dashVx;
                            this.y += this.dashVy;
                            this.dashTimer--;

                            if (this.dashTimer % 4 === 0) {
                                effectPool
                                    .get()
                                    ?.spawn(
                                        this.x,
                                        this.y,
                                        this.radius * 1.5,
                                        12,
                                        "enemy_exp",
                                    );
                            }

                            if (this.dashTimer <= 0) {
                                this.dashState = 0;
                                this.dashCooldown = 0;
                            }
                        }

                        let distSqr = dx * dx + dy * dy;
                        let minDist = player.radius + this.radius;
                        if (distSqr < minDist * minDist) {
                            player.hp -= this.dashState === 2 ? 1.5 : 0.4;
                            sfx.playHit();
                            if (player.hp <= 0) handlePlayerDeath();
                        }
                    } else if (
                        this.variant !== "boss_rat_king" &&
                        this.variant !== "boss_antivirus" &&
                        this.variant !== "boss_kernel_panic"
                    ) {
                        this.aiTimer++;
                        if (this.aiTimer >= 10) {
                            this.aiTimer = 0;
                            let angle =
                                Math.atan2(dy, dx) +
                                (Math.random() - 0.5) * 0.3;
                            if (this.variant === "shooter" && dist < 220) {
                                this.vx = -Math.cos(angle) * currentSpeed;
                                this.vy = -Math.sin(angle) * currentSpeed;
                            } else {
                                this.vx = Math.cos(angle) * currentSpeed;
                                this.vy = Math.sin(angle) * currentSpeed;
                            }
                        }
                        if (this.variant === "shooter") {
                            this.shootTimer++;
                            if (this.shootTimer >= 100) {
                                this.shootTimer = 0;
                                let a = Math.atan2(dy, dx);
                                sfx.playShoot();
                                enemyBulletPool
                                    .get()
                                    ?.spawn(
                                        this.x,
                                        this.y,
                                        Math.cos(a) * 3.5,
                                        Math.sin(a) * 3.5,
                                        4,
                                        false,
                                        90,
                                        "normal",
                                    );
                            }
                        }
                        this.x += this.vx;
                        this.y += this.vy;

                        let distSqr = dx * dx + dy * dy;
                        let minDist = player.radius + this.radius;
                        if (distSqr < minDist * minDist) {
                            player.hp -= 0.3;
                            if (Math.random() < 0.1) sfx.playHit();
                            if (player.hp <= 0) handlePlayerDeath();
                        }
                    } else if (this.variant === "boss_rat_king") {
                        this.visualAngle += 0.02;
                        this.phaseTimer++;

                        let totalCycle = 900;
                        let currentCycleTime = this.phaseTimer % totalCycle;

                        let a = Math.atan2(dy, dx);
                        this.vx = Math.cos(a) * currentSpeed;
                        this.vy = Math.sin(a) * currentSpeed;
                        this.x += this.vx;
                        this.y += this.vy;

                        if (currentCycleTime < 300) {
                            this.antivirusPhase = 1;
                        } else if (currentCycleTime < 600) {
                            let t = currentCycleTime - 300;
                            if (t < 90) {
                                this.antivirusPhase = 12;
                                if (t % 30 === 0) sfx.playWarning();
                            } else {
                                this.antivirusPhase = 2;
                                if (t % 8 === 0) {
                                    sfx.playShoot();
                                    let angleOffset = t * 0.12;
                                    let bulletSpeed = 4.0;
                                    enemyBulletPool
                                        .get()
                                        ?.spawn(
                                            this.x,
                                            this.y,
                                            Math.cos(angleOffset) * bulletSpeed,
                                            Math.sin(angleOffset) * bulletSpeed,

                                            false,
                                            120,
                                            "normal",
                                        );
                                    enemyBulletPool
                                        .get()
                                        ?.spawn(
                                            this.x,
                                            this.y,
                                            Math.cos(angleOffset + Math.PI) *
                                                bulletSpeed,
                                            Math.sin(angleOffset + Math.PI) *
                                                bulletSpeed,
                                            4,
                                            false,
                                            120,
                                            "normal",
                                        );
                                }
                            }
                        } else {
                            let t = currentCycleTime - 600;
                            if (t < 90) {
                                this.antivirusPhase = 13;
                                if (t % 30 === 0) sfx.playWarning();
                            } else {
                                if (this.antivirusPhase !== 3) {
                                    this.antivirusPhase = 3;
                                    this.spawnCooldown = 0;
                                }
                                this.spawnCooldown++;
                                if (this.spawnCooldown % 80 === 1) {
                                    sfx.playWarning();
                                    let side = Math.floor(Math.random() * 4);
                                    let rx = 0,
                                        ry = 0;
                                    let offset = (Math.random() - 0.5) * 500;
                                    if (side === 0) {
                                        rx = bossArena.x + offset;
                                        ry = bossArena.y - 290;
                                    } else if (side === 1) {
                                        rx = bossArena.x + offset;
                                        ry = bossArena.y + 290;
                                    } else if (side === 2) {
                                        rx = bossArena.x - 290;
                                        ry = bossArena.y + offset;

                                        ry = bossArena.y + offset;

                                    createSpawnWarning(rx, ry, "normal", 90);

                            }
                        }

                        let distSqr = dx * dx + dy * dy;
                        let minDist = player.radius + this.radius;
                        if (distSqr < minDist * minDist) {

                            if (player.hp <= 0) handlePlayerDeath();

                    } else if (this.variant === "boss_antivirus") {

                        this.phaseTimer++;

                        let totalCycle = 1200;

                        if (currentCycleTime < 400) {
                            let t = currentCycleTime;
                            if (
                                this.antivirusPhase !== 2 &&

                                if (

                                    let patternType = Math.floor(

                                    for (let i = 0; i < 36; i++) {

                                        ry = bossArena.y - 300;

                                        rx = bossArena.x + offset;
                                        ry = bossArena.y + 300;

                                        rx = bossArena.x - 300;
                                        ry = bossArena.y + offset;

                                        rx = bossArena.x + 300;
                                        ry = bossArena.y + offset;

                    } else if (this.variant === "boss_kernel_panic") {

                        if (currentCycleTime < 400) {
                            let t = currentCycleTime;

                                this.antivirusPhase !== 2 &&
                                this.antivirusPhase !== 12
                            ) {
                                this.panicSectors = [];

                                this.antivirusPhase = 12;

                                                ? player.x
                                                : sector.val,

                                                ? sector.val
                                                : player.y,

                                }
                            });
                            this.panicSectors = this.panicSectors.filter(
                                (s) => s.timer > 0 || !s.active,
                            );
                        } else if (currentCycleTime < 800) {
                            let t = currentCycleTime - 400;
                            if (t < 90) {
                                this.antivirusPhase = 13;
                                if (t % 30 === 0) sfx.playWarning();
                            } else {
                                if (this.antivirusPhase !== 3) {
                                    this.antivirusPhase = 3;
                                    this.decoySpawned = false;
                                }
                                if (!this.decoySpawned) {
                                    this.decoySpawned = true;
                                    sfx.playWarning();
                                    for (let i = 0; i < 3; i++) {
                                        let angle = ((Math.PI * 2) / 3) * i;
                                        let rx = this.x + Math.cos(angle) * 120;
                                        let ry = this.y + Math.sin(angle) * 120;
                                        enemyPool
                                            .get()
                                            ?.spawn(rx, ry, "panic_decoy");
                                    }
                                }
                            }
                        } else {
                            let t = currentCycleTime - 800;
                            if (t < 90) {
                                this.antivirusPhase = 14;
                                if (t % 30 === 0) sfx.playWarning();
                            } else {
                                if (this.antivirusPhase !== 4) {
                                    this.antivirusPhase = 4;
                                    this.meltTimer = 0;
                                }
                                this.meltTimer++;
                                let distToBoss = Math.hypot(
                                    this.x - player.x,
                                    this.y - player.y,
                                );
                                if (distToBoss > 10) {
                                    let pullAngle = Math.atan2(
                                        this.y - player.y,
                                        this.x - player.x,
                                    );
                                    player.x += Math.cos(pullAngle) * 1.5;
                                    player.y += Math.sin(pullAngle) * 1.5;
                                }

                                if (this.meltTimer % 40 === 0) {
                                    sfx.playWarning();
                                    effectPool
                                        .get()
                                        ?.spawn(
                                            this.x,
                                            this.y,
                                            240,
                                            24,
                                            "pulse_wave",
                                        );
                                    let count = 8;
                                    for (let i = 0; i < count; i++) {
                                        let angle =
                                            ((Math.PI * 2) / count) * i +
                                            this.meltTimer * 0.05;
                                        enemyBulletPool
                                            .get()
                                            ?.spawn(
                                                this.x,
                                                this.y,
                                                Math.cos(angle) * 3.8,
                                                Math.sin(angle) * 3.8,
                                                4,
                                                false,
                                                120,
                                                "normal",
                                            );
                                    }
                                }
                            }
                        }

                        let distSqr = dx * dx + dy * dy;
                        let minDist = player.radius + this.radius;
                        if (distSqr < minDist * minDist) {
                            player.hp -= 1.2;
                            sfx.playHit();
                            if (player.hp <= 0) handlePlayerDeath();
                        }
                    } else if (this.variant === "panic_decoy") {
                        this.aiTimer++;
                        if (this.aiTimer >= 15) {
                            this.aiTimer = 0;
                            let angle = Math.atan2(
                                player.y - this.y,
                                player.x - this.x,
                            );
                            this.vx = Math.cos(angle) * currentSpeed;
                            this.vy = Math.sin(angle) * currentSpeed;
                        }
                        this.x += this.vx;
                        this.y += this.vy;

                        this.shootTimer++;
                        if (this.shootTimer >= 100) {
                            this.shootTimer = 0;
                            let a = Math.atan2(
                                player.y - this.y,
                                player.x - this.x,
                            );
                            sfx.playShoot();
                            enemyBulletPool
                                .get()
                                ?.spawn(
                                    this.x,
                                    this.y,
                                    Math.cos(a) * 3.5,
                                    Math.sin(a) * 3.5,
                                    4,
                                    false,
                                    90,
                                    "normal",
                                );
                        }

                        let distSqr = dx * dx + dy * dy;
                        let minDist = player.radius + this.radius;
                        if (distSqr < minDist * minDist) {
                            player.hp -= 0.5;
                            sfx.playHit();
                            if (player.hp <= 0) handlePlayerDeath();
                        }
                    }
                }
                draw() {
                    let isFlashing = this.flashTimer > 0;
                    let drawX = this.x - camera.x;
                    let drawY = this.y - camera.y;

                    ctx.save();
                    if (isFlashing) {
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = "#ffffff";
                        ctx.fillStyle = "#ffffff";
                        ctx.strokeStyle = "#ffffff";
                    } else {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = "#ff3333";
                        ctx.fillStyle = "#ff3333";
                        ctx.strokeStyle = "#ff3333";
                    }

                    if (this.variant === "dasher") {
                        ctx.save();
                        ctx.translate(drawX, drawY);
                        let angle = Math.atan2(
                            this.vy || this.dashVy,
                            this.vx || this.dashVx,
                        );
                        ctx.rotate(angle);
                        ctx.beginPath();
                        ctx.moveTo(this.radius * 1.5, 0);
                        ctx.lineTo(-this.radius, -this.radius);
                        ctx.lineTo(-this.radius / 2, 0);
                        ctx.lineTo(-this.radius, this.radius);
                        ctx.closePath();
                        ctx.fill();
                        ctx.restore();
                        ctx.restore();

                    }

                    if (this.variant === "boss_rat_king") {

                        ctx.strokeStyle = isFlashing ? "#ffffff" : "#ff3333";
                        ctx.lineWidth = 3;

                        for (let i = 0; i < 5; i++) {
                            let nodeAngle = ((Math.PI * 2) / 5) * i;
                            let nx = Math.cos(nodeAngle) * (this.radius * 0.8);
                            let ny = Math.sin(nodeAngle) * (this.radius * 0.8);

                            ctx.beginPath();
                            ctx.arc(nx, ny, 10, 0, Math.PI * 2);
                            ctx.stroke();

                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.lineTo(nx, ny);
                            ctx.stroke();
                        }

                        ctx.fillStyle = isFlashing ? "#ffffff" : "#aa0000";
                        ctx.beginPath();
                        ctx.arc(0, 0, 18, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();

                        if (this.antivirusPhase === 1) {
                            ctx.save();
                            ctx.translate(drawX, drawY);
                            ctx.rotate(-this.visualAngle * 1.5);
                            ctx.strokeStyle = "rgba(255, 51, 51, 0.8)";
                            ctx.lineWidth = 4;
                            for (let i = 0; i < 4; i++) {

                                ctx.beginPath();
                                ctx.arc(

                    }

                    if (this.variant === "boss_antivirus") {
                        if (

                        ) {
                            ctx.save();
                            ctx.translate(this.x - camera.x, this.y - camera.y);
                            let angles = [
